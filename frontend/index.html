<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>ydkball</title>
<meta name="description" content="NBA scores, stats, and game reviews.">

<meta property="og:title" content="ydkball">
<meta property="og:description" content="NBA scores, stats, and game reviews.">
<meta property="og:image" content="https://ydkball.net/logo.png">
<meta property="og:url" content="https://ydkball.net">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="ydkball">
<meta name="twitter:description" content="NBA scores, stats, and game reviews.">
<meta name="twitter:image" content="https://ydkball.net/logo.png">
<!-- Kick off scoreboard fetch before any JS parses -->
<script>window._sbPreload = fetch('/api/scoreboard');</script>
<link rel="icon" type="image/png" href="/logo.png">
<link rel="apple-touch-icon" href="/logo-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset & tokens ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:       #0c0c0d;
  --ink2:      #2a2a2e;
  --ink3:      #6b6b78;
  --ink4:      #a8a8b3;
  --paper:     #F5F0E8;
  --paper2:    #eeecea;
  --paper3:    #e5e2dc;
  --rule:      #d8d5cf;
  --orange:    #e8530a;
  --orange-lt: #fff0ea;
  --green:     #1a7a4a;
  --red:       #c0392b;

  --ff-serif: 'DM Serif Display', Georgia, serif;
  --ff-sans:  'Instrument Sans', system-ui, sans-serif;
  --ff-mono:  'DM Mono', 'Courier New', monospace;
  --nav-h: 56px;
  font-size: 15px;
}

html { scroll-behavior: smooth; overflow-x: clip; }

body {
  position: relative;
  font-family: var(--ff-sans);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: clip;
}

/* grain */
body::before {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.022;
  pointer-events: none;
  z-index: 9999;
}

/* ── Nav ────────────────────────────────────────────────────── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 24px;
  z-index: 100;
  will-change: transform;
}

.nav-wordmark {
  font-family: var(--ff-serif);
  font-size: 20px;
  color: var(--ink);
  letter-spacing: -0.01em;
  text-decoration: none;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 0;
}
.nav-logo { height: 26px; width: auto; margin-right: 8px; }
.nav-wordmark span { color: var(--orange); }

.nav-links {
  display: flex;
  gap: 2px;
  flex: 1 1 0;
  min-width: 0;
  overflow: hidden;
}
.nav-link {
  font-family: var(--ff-mono);
  font-size: 11px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--ink3);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
}
.nav-link:hover { color: var(--ink); background: var(--paper2); }
.nav-link.active { color: var(--ink); background: var(--paper3); }

/* ── Page layout ────────────────────────────────────────────── */
.page { padding-top: var(--nav-h); }

/* ── Scoreboard section ─────────────────────────────────────── */
.scoreboard-section {
  padding: 0px 32px 0;
  border-bottom: 1px solid var(--rule);
}

.section-title {
  font-family: var(--ff-serif);
  font-size: 26px;
  letter-spacing: -0.02em;
  color: var(--ink);
}

/* ── Calendar date strip ─────────────────────────────────────── */
.cal-strip-wrap {
  border-bottom: 1px solid var(--paper3);
  margin: 0 -32px 16px;
  overflow: hidden;
}
.cal-strip {
  display: flex;
  gap: 0;
  overflow-x: auto;
  scroll-behavior: smooth;
  scrollbar-width: none;
  padding: 0 32px;
}
.cal-strip::-webkit-scrollbar { display: none; }

.cal-day {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 10px 14px 9px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.12s, border-color 0.12s, background 0.12s;
  min-width: 52px;
}
.cal-day:hover { background: var(--paper2); }
.cal-day.active {
  border-bottom-color: var(--orange);
}
.cal-day.active .cal-day-num { color: var(--ink); font-weight: 700; }
.cal-day.active .cal-month { color: var(--orange); }

.cal-month {
  font-family: var(--ff-mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink4);
  line-height: 1;
}
.cal-day-num {
  font-family: var(--ff-mono);
  font-size: 16px;
  font-weight: 500;
  color: var(--ink3);
  line-height: 1;
}
.cal-dow {
  font-family: var(--ff-mono);
  font-size: 8px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink4);
  line-height: 1;
}
/* dot under days that have games */
.cal-day-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--rule);
  margin-top: 2px;
}
.cal-day.active .cal-day-dot { background: var(--orange); opacity: 0.5; }

/* Scroll strip */
.scoreboard-strip {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--rule) transparent;
}
.scoreboard-strip::-webkit-scrollbar { height: 4px; }
.scoreboard-strip::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }
.scoreboard-strip::-webkit-scrollbar-thumb:hover { background: var(--ink4); }

/* ── Game card ───────────────────────────────────────────────── */
.game-card {
  flex-shrink: 0;
  width: 152px;
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 13px 12px 12px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.12s, box-shadow 0.15s;
  user-select: none;
}
.game-card:hover {
  border-color: var(--orange);
  box-shadow: 0 4px 16px rgba(0,0,0,0.07);
}
.game-card.is-live { border-color: rgba(231,76,60,0.4); }
.game-card.is-live:hover { border-color: #e74c3c; }

.card-status {
  font-family: var(--ff-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 11px;
  color: var(--ink4);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  min-height: 13px;
}
.card-status.live { color: #e74c3c; }
.card-status.upcoming { color: var(--orange); }

.live-pip {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #e74c3c;
  flex-shrink: 0;
  animation: pip 1.4s ease-in-out infinite;
}
@keyframes pip {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.4; transform:scale(0.75); }
}

.card-team {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 0;
}
.card-logo {
  width: 26px; height: 26px;
  object-fit: contain;
  flex-shrink: 0;
}
.card-logo-fallback {
  width: 26px; height: 26px;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-abbr {
  font-family: var(--ff-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.04em;
  flex: 1;
  color: var(--ink3);
}
.card-abbr.winner { color: var(--ink); }
.card-abbr.loser  { color: var(--ink4); }
.card-score {
  font-family: var(--ff-mono);
  font-size: 15px;
  font-weight: 600;
  min-width: 24px;
  text-align: right;
  color: var(--ink3);
  letter-spacing: -0.5px;
}
.card-score.winner { color: var(--ink); }
.card-score.loser  { color: var(--ink4); }

.card-divider {
  height: 1px;
  background: var(--paper3);
  margin: 4px 0;
}

/* loading / empty state inside strip */
.strip-state {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 20px 0 24px;
  font-family: var(--ff-mono);
  font-size: 11px;
  color: var(--ink4);
}

/* ── Body grid (performers + news) ──────────────────────────── */
.body-grid {
  display: grid;
  grid-template-columns: 1fr 280px;
  min-height: 0;
}
@media (max-width: 860px) {
  .body-grid { grid-template-columns: 1fr; }
  .news-aside { border-left: none; border-top: 1px solid var(--rule); }
}

/* ── Top Performers (main column) ───────────────────────────── */
.performers-col {
  padding: 28px 32px 48px;
  border-right: 1px solid var(--rule);
}

.col-title {
  font-family: var(--ff-serif);
  font-size: 22px;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  color: var(--ink);
}
.col-subtitle {
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--ink4);
  letter-spacing: 0.05em;
  margin-bottom: 20px;
}

/* Performer rows */
.performer-list { display: flex; flex-direction: column; gap: 0; }

.performer-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--paper3);
  cursor: pointer;
  transition: background 0.1s;
  text-decoration: none;
  color: inherit;
}
.performer-row:last-child { border-bottom: none; }
.performer-row:hover .performer-name { color: var(--orange); }

.performer-rank {
  font-family: var(--ff-mono);
  font-size: 13px;
  color: var(--ink4);
  width: 18px;
  flex-shrink: 0;
  text-align: right;
}
.performer-rank.r1 { color: #c4922a; font-weight: 700; }
.performer-rank.r2 { color: #888;    font-weight: 700; }
.performer-rank.r3 { color: #a0684a; font-weight: 700; }

.performer-headshot {
  width: 48px; height: 36px;
  border-radius: 6px;
  object-fit: cover;
  object-position: top center;
  background: var(--paper3);
  flex-shrink: 0;
}

.performer-info { flex: 1; min-width: 0; }
.performer-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  transition: color 0.12s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.performer-meta {
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--ink4);
  margin-top: 2px;
  letter-spacing: 0.03em;
  display: flex; align-items: center; gap: 5px;
}
.performer-live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--red); flex-shrink: 0;
  animation: pulse-dot 1.4s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.35; }
}

.performer-stats {
  display: flex;
  gap: 12px;
  flex-shrink: 0;
}
.performer-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  min-width: 32px;
}
.performer-stat-val {
  font-family: var(--ff-mono);
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1;
}
.performer-stat-lbl {
  font-family: var(--ff-mono);
  font-size: 8px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink4);
}

.performer-total {
  font-family: var(--ff-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink3);
  min-width: 36px;
  text-align: right;
  flex-shrink: 0;
}

.performers-loading, .performers-empty {
  font-family: var(--ff-mono);
  font-size: 11px;
  color: var(--ink4);
  padding: 20px 0;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── News aside (right column) ───────────────────────────────── */
.news-aside {
  padding: 28px 20px 48px;
  border-left: 1px solid var(--rule);
}

.aside-title {
  font-family: var(--ff-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink4);
  margin-bottom: 16px;
}

.news-list { display: flex; flex-direction: column; gap: 0; }

.news-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 12px 0;
  border-bottom: 1px solid var(--paper3);
  text-decoration: none;
  color: inherit;
  cursor: pointer;
}
.news-item:last-child { border-bottom: none; }
.news-item:hover .news-title { color: var(--orange); }

.news-source {
  font-family: var(--ff-mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--orange);
}
.news-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.4;
  transition: color 0.12s;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.news-meta {
  font-family: var(--ff-mono);
  font-size: 9px;
  color: var(--ink4);
}
#news-container {
  max-height: 340px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--rule) transparent;
}
#news-container::-webkit-scrollbar { width: 4px; }
#news-container::-webkit-scrollbar-track { background: transparent; }
#news-container::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

.news-loading-msg, .news-error-msg {
  font-family: var(--ff-mono);
  font-size: 11px;
  color: var(--ink4);
  padding: 16px 0;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── Loading spinner ─────────────────────────────────────────── */
.spin {
  display: inline-block;
  width: 13px; height: 13px;
  border: 2px solid var(--rule);
  border-top-color: var(--orange);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Scrollbar ───────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink4); }

/* ── Nav auth ─────────────────────────────────────────────── */
.nav-auth {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.nav-auth-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  object-fit: cover;
  border: 1.5px solid var(--rule);
}
.nav-auth-name {
  font-family: var(--ff-mono);
  font-size: 11px;
  color: var(--ink3);
  letter-spacing: 0.03em;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.nav-signin-btn {
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 5px 12px;
  background: var(--orange);
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  text-decoration: none;
  transition: opacity 0.15s;
  white-space: nowrap;
}
.nav-signin-btn:hover { opacity: 0.85; }
.nav-signout-btn {
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: 0.04em;
  color: var(--ink3);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 6px;
  transition: color 0.15s;
}
.nav-signout-btn:hover { color: var(--ink); }


/* ── Game card review row ─────────────────────────────────── */
.card-review-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
  padding-top: 7px;
  border-top: 1px solid var(--paper3);
  gap: 6px;
}
.card-stars {
  font-size: 11px;
  color: #00C030;
  letter-spacing: -1px;
  line-height: 1;
  flex-shrink: 0;
}
.card-stars-val {
  font-family: var(--ff-mono);
  font-size: 9px;
  color: var(--ink3);
  margin-left: 2px;
}
.card-review-btn {
  font-family: var(--ff-mono);
  font-size: 9px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 3px 8px;
  background: none;
  border: 1px solid var(--rule);
  border-radius: 3px;
  color: var(--ink3);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.card-review-btn:hover {
  border-color: var(--orange);
  color: var(--orange);
}
.card-review-btn:disabled {
  cursor: default;
  opacity: 0.35;
}
.card-review-btn:disabled:hover {
  border-color: var(--rule);
  color: var(--ink3);
}
.card-stars-skeleton {
  color: var(--rule);
  letter-spacing: -1px;
}

/* ── Mobile ──────────────────────────────────────────────────── */
@media (max-width: 640px) {
  :root { --nav-h: 100px; }
  nav { position: fixed; top: 0; left: 0; right: 0; height: auto; padding: 0 16px; flex-wrap: wrap; gap: 0; align-items: center; }
  .nav-wordmark { padding: 13px 0; }
  .nav-auth { padding: 13px 0; }
  .nav-auth-name { display: none; }
  .nav-links {
    order: 10; flex: 0 0 100%; overflow-x: auto; scrollbar-width: none;
    flex-wrap: nowrap; border-top: 1px solid var(--rule);
    padding: 7px 0 9px; gap: 0;
  }
  .nav-links::-webkit-scrollbar { display: none; }
  .nav-link { white-space: nowrap; padding: 5px 12px; }
  .scoreboard-section { padding: 0 16px 0; }
  .cal-strip-wrap { margin: 0 -16px 14px; }
  .cal-strip { padding: 0 16px; }
  .performers-col { padding: 20px 16px 40px; overflow-x: auto; }
  .performer-list { min-width: 480px; padding-right: 16px; }
  .news-aside { padding: 20px 16px 40px; overflow-x: auto; }
  .news-list { min-width: 320px; }
  .section-title { font-size: 20px; }
  .install-btn { display: flex; }
}

/* ── Install button (mobile only) ───────────────────────────── */
.install-btn {
  display: none;
  align-items: center;
  gap: 6px;
  font-family: var(--ff-mono);
  font-size: 11px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--ink3);
  background: none;
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 5px 10px;
  margin-left: 20px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.install-btn:hover { color: var(--ink); border-color: var(--ink3); background: var(--paper2); }
.install-btn svg { flex-shrink: 0; }

/* ── Install modal ───────────────────────────────────────────── */
.install-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(12,12,13,0.55);
  z-index: 9000;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.install-overlay.open { display: flex; }

.install-sheet {
  background: var(--paper);
  border-radius: 16px 16px 0 0;
  padding: 24px 24px 36px;
  width: 100%;
  max-width: 480px;
  border-top: 1px solid var(--rule);
  animation: sheetUp 0.22s ease;
}
@keyframes sheetUp {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.install-sheet-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.install-sheet-title {
  font-family: var(--ff-serif);
  font-size: 20px;
  color: var(--ink);
}
.install-sheet-close {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--ink3);
  padding: 4px;
  line-height: 1;
  font-size: 20px;
}

.install-steps {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.install-step {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.install-step-num {
  flex-shrink: 0;

<body>

<!-- ── Nav ─────────────────────────────────────────────────── -->

<!-- ── Page ────────────────────────────────────────────────── -->
<div class="page">

  <!-- Scoreboard -->
  <div class="scoreboard-section">
    <!-- Calendar date strip -->
    <div class="cal-strip-wrap">
      <div class="cal-strip" id="cal-strip"></div>
    </div>

  <!-- Body: Performers + News -->

      </div>
    </div>

  </div>
</div>

<script>
const API = window.location.protocol === 'file:' ? 'http://localhost:5000' : '';

// ── NBA team ID map ───────────────────────────────────────────
const TEAM_IDS = {
  ATL:1610612737, BOS:1610612738, BKN:1610612751, CHA:1610612766,
  CHI:1610612741, CLE:1610612739, DAL:1610612742, DEN:1610612743,
  DET:1610612765, GSW:1610612744, HOU:1610612745, IND:1610612754,
  LAC:1610612746, LAL:1610612747, MEM:1610612763, MIA:1610612748,
  MIL:1610612749, MIN:1610612750, NOP:1610612740, NYK:1610612752,
  OKC:1610612760, ORL:1610612753, PHI:1610612755, PHX:1610612756,
  POR:1610612757, SAC:1610612758, SAS:1610612759, TOR:1610612761,
  UTA:1610612762, WAS:1610612764,
};
function teamLogoUrl(abbr) {
  const id = TEAM_IDS[abbr];
  return id ? `https://cdn.nba.com/logos/nba/${id}/global/L/logo.svg` : null;
}

// ── Date helpers ──────────────────────────────────────────────
function todayStr() {
  // NBA "game day" switches at 6 AM ET: before 6 AM ET we're still on yesterday's slate
  const now = new Date();
  const etParts = new Intl.DateTimeFormat('en-CA', {
    timeZone: 'America/New_York',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', hour12: false,
  }).formatToParts(now);
  const get = type => etParts.find(p => p.type === type).value;
  const etHour = parseInt(get('hour'), 10);
  const etDateStr = `${get('year')}-${get('month')}-${get('day')}`;
  if (etHour < 6) {
    // Before 6 AM ET — roll back one day
    const [y, m, d] = etDateStr.split('-').map(Number);
    const prev = new Date(y, m - 1, d - 1);
    const z = n => String(n).padStart(2, '0');
    return `${prev.getFullYear()}-${z(prev.getMonth()+1)}-${z(prev.getDate())}`;
  }
  return etDateStr;
}

function addDays(dateStr, n) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + n);
  const z = v => String(v).padStart(2,'0');
  return `${dt.getFullYear()}-${z(dt.getMonth()+1)}-${z(dt.getDate())}`;
}

function fmtClock(s) {
  if (!s) return '';
  const m = s.match(/PT(\d+)M([\d.]+)S/);
  if (m) return `${m[1]}:${String(Math.floor(parseFloat(m[2]))).padStart(2,'0')}`;
  if (s.includes(':')) return s;
  return '';
}

function fmtTipoff(utcStr) {
  try {
    const d = new Date(utcStr);
    if (isNaN(d)) return '';
    return d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', timeZoneName:'short'});
  } catch(e) { return ''; }
}

// ── Scoreboard state ──────────────────────────────────────────
const SB = {
  today: todayStr(),
  date: null,          // null = today; 'YYYY-MM-DD' = specific day
  loading: false,
  liveTimer: null,
};

// ── Calendar strip ────────────────────────────────────────────
const CAL_DAYS_BACK = 14;   // how many past days to show
const CAL_DAYS_FWD  = 14;    // how many future days to show

const DAYS_SHORT  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function buildCalStrip() {
  const strip = document.getElementById('cal-strip');
  if (!strip) return;

  const today = SB.today;
  const start = addDays(today, -CAL_DAYS_BACK);
  const end   = addDays(today,  CAL_DAYS_FWD);

  let html = '';
  let cursor = start;
  while (cursor <= end) {
    const [y,m,d] = cursor.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    const dow = DAYS_SHORT[dt.getDay()];
    const mon = MONTHS_SHORT[m-1];
    const isToday = cursor === today;
    const isActive = (SB.date === null && isToday) || SB.date === cursor;

    html += `<div class="cal-day ${isActive ? 'active' : ''}" data-date="${cursor}">
      <span class="cal-month">${mon}</span>
      <span class="cal-day-num">${d}</span>
      <span class="cal-dow">${dow}</span>
      <div class="cal-day-dot"></div>
    </div>`;
    cursor = addDays(cursor, 1);
  }
  strip.innerHTML = html;

  strip.querySelectorAll('.cal-day').forEach(el => {
    el.addEventListener('click', () => {
      const date = el.dataset.date;
      SB.date = date === SB.today ? null : date;
      // Update active state
      strip.querySelectorAll('.cal-day').forEach(d => {
        const isActive = (SB.date === null && d.dataset.date === SB.today) || d.dataset.date === SB.date;
        d.classList.toggle('active', isActive);
      });
      loadScoreboard();
      loadPerformers();
    });
  });

  // Scroll today into center view
  const todayEl = strip.querySelector(`[data-date="${today}"]`);
  if (todayEl) {
    requestAnimationFrame(() => {
      const stripWidth = strip.offsetWidth;
      const elLeft = todayEl.offsetLeft;
      const elWidth = todayEl.offsetWidth;
      strip.scrollLeft = elLeft - stripWidth/2 + elWidth/2;
    });
  }
}

// ── Scoreboard ────────────────────────────────────────────────
async function loadScoreboard() {
  if (SB.loading) return;
  SB.loading = true;
  clearTimeout(SB.liveTimer);

  const gameStrip = document.getElementById('scoreboard-strip');
  gameStrip.innerHTML = '<div class="strip-state"><span class="spin"></span> Loading…</div>';

  try {
    const qs = SB.date ? `?date=${SB.date}` : '';
    // For today, reuse the preload promise fired in <head> (already in-flight or resolved)
    const fetchPromise = (!SB.date && window._sbPreload)
      ? window._sbPreload.then(r => r.clone())
      : fetch(`${API}/api/scoreboard${qs}`);
    const res = await fetchPromise;
    const data = await res.json();
    const games = data.games || [];

    if (!games.length) {
      gameStrip.innerHTML = '<div class="strip-state">No games on this date.</div>';
      return;
    }

    // Sort: live first, upcoming next, final last
    const rank = {2:0, 1:1, 3:2};
    games.sort((a,b) => (rank[a.gameStatus]??9) - (rank[b.gameStatus]??9));

    gameStrip.innerHTML = games.map(buildCard).join('');
    gameStrip.querySelectorAll('.game-card').forEach(card => {
      card.addEventListener('click', () => {
        const gid    = card.dataset.gameId;
        const status = parseInt(card.dataset.gameStatus || '3', 10);
        if (!gid) return;
        if (status === 1) {
          // Upcoming → preview page
          const away    = card.dataset.away || '';
          const home    = card.dataset.home || '';
          const time    = card.dataset.time || '';
          const awayRec = card.dataset.awayRec || '';
          const homeRec = card.dataset.homeRec || '';
          const qs = new URLSearchParams({ gameId: gid, away, home, time, awayRec, homeRec });
          window.location.href = `/preview?${qs}`;
        } else {
          // Live or final → game detail page
          window.location.href = `/game?gameId=${gid}`;
        }
      });
    });

    // Load ratings for final games
    loadCardRatings(games.filter(g => g.gameStatus === 3).map(g => g.gameId));

    // Auto-refresh live games
    if (games.some(g => g.gameStatus === 2) && !SB.date) {
      SB.liveTimer = setTimeout(() => { SB.loading = false; loadScoreboard(); }, 30000);
    }

  } catch(e) {
    gameStrip.innerHTML = '<div class="strip-state">Could not load scoreboard.</div>';
  } finally {
    SB.loading = false;
  }
}

function buildCard(g) {
  const away = g.away || {};
  const home = g.home || {};
  const status = g.gameStatus;
  const isLive = status === 2;
  const isFinal = status === 3;
  const isUpcoming = status === 1;
  // Always show scores for live and final; historical past days are always final
  const showScore = isLive || isFinal;
  const awayScore = away.score ?? 0;
  const homeScore = home.score ?? 0;
  const awayWon = isFinal && awayScore > homeScore;
  const homeWon = isFinal && homeScore > awayScore;

  // Status line
  let statusHtml;
  if (isLive) {
    const period = g.period || 1;
    const pLabel = period > 4 ? `OT${period-4}` : `Q${period}`;
    const clock = fmtClock(g.gameClock || '');
    statusHtml = `<div class="card-status live"><div class="live-pip"></div>${pLabel}${clock ? ' · '+clock : ''}</div>`;
  } else if (isFinal) {
    statusHtml = `<div class="card-status">Final</div>`;
  } else {
    // Upcoming — show tip-off time
    const tip = fmtTipoff(g.gameTimeUTC || '');
    statusHtml = `<div class="card-status upcoming">${tip || g.gameStatusText || 'Upcoming'}</div>`;
  }

  function teamRow(abbr, score, won, lost) {
    const logoUrl = teamLogoUrl(abbr);
    const logoHtml = logoUrl
      ? `<img class="card-logo" src="${logoUrl}" alt="${abbr}" onerror="this.outerHTML='<div class=\\'card-logo-fallback\\'>🏀</div>'">`
      : `<div class="card-logo-fallback">🏀</div>`;
    const abbrClass = showScore ? (won ? 'winner' : lost ? 'loser' : '') : '';
    const scoreClass = showScore ? (won ? 'winner' : lost ? 'loser' : '') : '';
    return `<div class="card-team">
      ${logoHtml}
      <span class="card-abbr ${abbrClass}">${abbr || '???'}</span>
      ${showScore ? `<span class="card-score ${scoreClass}">${score}</span>` : ''}
    </div>`;
  }

  const awayRec = away.wins != null ? `${away.wins}-${away.losses}` : '';
  const homeRec = home.wins != null ? `${home.wins}-${home.losses}` : '';
  const tipText = isUpcoming ? fmtTipoff(g.gameTimeUTC || '') : '';

  // Review row — always shown; disabled/greyed for non-final games
  const reviewRow = `
    <div class="card-review-row"${isFinal ? ` id="card-review-${g.gameId}"` : ''}>
      <span class="card-stars${isFinal ? ' card-stars-display' : ''}" style="${isFinal ? '' : 'opacity:0.3'}">
        <span class="card-stars-skeleton">★★★★★</span><span class="card-stars-val">${isFinal ? ' 0.0' : ''}</span>
      </span>
      <button class="card-review-btn"${isFinal ? ` onclick="event.stopPropagation();window.location.href='/game?gameId=${g.gameId}&tab=reviews'"` : ' disabled'}>Review</button>
    </div>`;

  return `<div class="game-card ${isLive ? 'is-live' : ''}"
    data-game-id="${g.gameId}"
    data-game-status="${g.gameStatus}"
    data-away="${away.abbr || ''}"
    data-home="${home.abbr || ''}"
    data-time="${tipText}"
    data-away-rec="${awayRec}"
    data-home-rec="${homeRec}">
    ${statusHtml}
    ${teamRow(away.abbr, awayScore, awayWon, homeWon)}
    <div class="card-divider"></div>
    ${teamRow(home.abbr, homeScore, homeWon, awayWon)}
    ${reviewRow}
  </div>`;
}

// ── Top Performers ────────────────────────────────────────────
async function loadPerformers() {
  const container  = document.getElementById('performers-container');
  const subtitle   = document.getElementById('performers-subtitle');
  if (!container) return;

  container.innerHTML = '<div class="performers-loading"><span class="spin"></span> Loading…</div>';

  const qs = SB.date ? `?date=${SB.date}` : '';
  try {
    const res  = await fetch(`${API}/api/top-performers${qs}`);
    const data = await res.json();
    const players = data.players || [];

    if (subtitle && data.date) {
      const [y,m,d] = data.date.split('-').map(Number);
      const label = new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      subtitle.textContent = `PTS + REB + AST · ${label}`;
    }

    if (!players.length) {
      container.innerHTML = '<div class="performers-empty">No games yet today!</div>';
      return;
    }

    const rankClass = i => i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';

    container.innerHTML = `<div class="performer-list">${
      players.map((p, i) => {
        const headshot = p.player_id
          ? `<img class="performer-headshot" src="https://cdn.nba.com/headshots/nba/latest/260x190/${p.player_id}.png" alt="${p.name}" onerror="this.style.opacity=0">`
          : '';
        return `<div class="performer-row" onclick="window.location.href='/game?gameId=${p.game_id}'">
          <span class="performer-rank ${rankClass(i)}">${i+1}</span>
          ${headshot}
          <div class="performer-info">
            <div class="performer-name">${p.name}</div>
            <div class="performer-meta">
              ${p.is_live ? '<span class="performer-live-dot"></span>' : ''}${p.team} · ${p.matchup}
            </div>
          </div>
          <div class="performer-stats">
            <div class="performer-stat">
              <span class="performer-stat-val">${p.pts}</span>
              <span class="performer-stat-lbl">PTS</span>
            </div>
            <div class="performer-stat">
              <span class="performer-stat-val">${p.reb}</span>
              <span class="performer-stat-lbl">REB</span>
            </div>
            <div class="performer-stat">
              <span class="performer-stat-val">${p.ast}</span>
              <span class="performer-stat-lbl">AST</span>
            </div>
          </div>
          <div class="performer-total">${p.total}</div>
        </div>`;
      }).join('')
    }</div>`;

  } catch(e) {
    container.innerHTML = '<div class="performers-empty">Could not load performers.</div>';
  }
}

// ── News ──────────────────────────────────────────────────────
const NEWS_URL = 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.espn.com%2Fespn%2Frss%2Fnba%2Fnews';

async function loadNews() {
  const container = document.getElementById('news-container');
  if (!container) return;
  try {
    const res  = await fetch(NEWS_URL);
    const data = await res.json();
    if (data.status !== 'ok' || !data.items?.length) {
      container.innerHTML = '<div class="news-error-msg">Unavailable.</div>';
      return;
    }
    function timeAgo(pub) {
      if (!pub) return '';
      const diff = Date.now() - new Date(pub).getTime();
      const h = Math.floor(diff / 3600000);
      if (h < 1) return 'Just now';
      if (h < 24) return `${h}h ago`;
      return `${Math.floor(h/24)}d ago`;
    }
    container.innerHTML = `<div class="news-list">${
      data.items.slice(0, 8).map(item => `
        <a class="news-item" href="${item.link}" target="_blank" rel="noopener noreferrer">
          <div class="news-source">ESPN</div>
          <div class="news-title">${item.title || ''}</div>
          <div class="news-meta">${timeAgo(item.pubDate)}</div>
        </a>`).join('')
    }</div>`;
  } catch(e) {
    container.innerHTML = '<div class="news-error-msg">Unavailable.</div>';
  }
}

// ── Card ratings ─────────────────────────────────────────────
async function loadCardRatings(gameIds) {
  if (!gameIds || !gameIds.length) return;
  // Fetch all in parallel
  await Promise.all(gameIds.map(async gid => {
    try {
      const res = await fetch(`/api/games/${gid}`);
      if (!res.ok) return;
      const data = await res.json();
      updateCardRating(gid, data.game);
    } catch { /* silently skip */ }
  }));
}

function updateCardRating(gameId, g) {
  const row = document.getElementById(`card-review-${gameId}`);
  if (!row) return;
  const starsEl = row.querySelector('.card-stars-display');
  if (!starsEl) return;
  if (g && g.review_count > 0) {
    const stars = g.avg_stars;
    const full  = Math.floor(stars);
    const half  = stars - full >= 0.25 ? 1 : 0;
    const empty = 5 - full - half;
    starsEl.innerHTML =
      '<span style="color:var(--star,#00C030)">' + '★'.repeat(full) + (half ? '½' : '') + '</span>' +
      '<span style="color:var(--rule)">' + '★'.repeat(empty) + '</span>' +
      `<span class="card-stars-val"> ${stars.toFixed(1)}</span>`;
  } else {
    // No reviews yet — keep grey skeleton, update count to show "—"
    starsEl.innerHTML = '<span class="card-stars-skeleton">★★★★★</span><span class="card-stars-val"> —</span>';
  }
}

// Refresh card rating after a review is submitted
document.addEventListener('rm:reviewed', e => {
  fetch(`/api/games/${e.detail.gameId}`)
    .then(r => r.json())
    .then(data => updateCardRating(e.detail.gameId, data.game))
    .catch(() => {});
});

// ── Init ──────────────────────────────────────────────────────
buildCalStrip();
loadScoreboard();
loadPerformers();
loadNews();
</script>
<script>
// ── Nav auth (shared across all pages) ───────────────────────
async function initNavAuth() {
  const slot = document.getElementById('nav-auth-slot');
  if (!slot) return;
  try {
    const res = await fetch('/auth/me');
    const data = await res.json();
    const user = data.user;
    if (user) {
      slot.innerHTML = `
        <a href="/profile" style="text-decoration:none;cursor:pointer">${user.avatar_url ? `<img class="nav-auth-avatar" src="${user.avatar_url}" alt="">` : ''}</a>
        <button class="nav-signout-btn" onclick="navSignOut()">Sign out</button>
      `;
    } else {
      slot.innerHTML = `<a class="nav-signin-btn" href="/auth/google/login?next=${encodeURIComponent(window.location.pathname)}">Sign in</a>`;
    }
  } catch {
    slot.innerHTML = `<a class="nav-signin-btn" href="/auth/google/login">Sign in</a>`;
  }
}
async function navSignOut() {
  await fetch('/auth/logout', { method: 'POST' });
  window.location.reload();
}
initNavAuth();

</script>
<script>
// ── Install modal ─────────────────────────────────────────────
const isIOS     = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isAndroid = /android/i.test(navigator.userAgent);
const isMobile  = isIOS || isAndroid;
const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;

if (isMobile && !isStandalone) {
  document.getElementById('install-btn').style.display = 'flex';
}

function openInstallModal() {
  const steps = document.getElementById('install-steps');
  if (isIOS) {
    steps.innerHTML = `
      <li class="install-step"><div class="install-step-num">1</div><div class="install-step-text">Tap the <strong>Share</strong> button (the box with an arrow) at the bottom of Safari.</div></li>
      <li class="install-step"><div class="install-step-num">2</div><div class="install-step-text">Scroll down and tap <strong>Add to Home Screen</strong>.</div></li>
      <li class="install-step"><div class="install-step-num">3</div><div class="install-step-text">Tap <strong>Add</strong> in the top right — done!</div></li>
    `;
  } else {
    steps.innerHTML = `
      <li class="install-step"><div class="install-step-num">1</div><div class="install-step-text">Tap the <strong>menu</strong> button (three dots) in the top right of Chrome.</div></li>
      <li class="install-step"><div class="install-step-num">2</div><div class="install-step-text">Tap <strong>Add to Home screen</strong>.</div></li>
      <li class="install-step"><div class="install-step-num">3</div><div class="install-step-text">Tap <strong>Add</strong> to confirm — done!</div></li>
    `;
  }
  document.getElementById('install-overlay').classList.add('open');
}

function closeInstallModal(e) {
  if (e && e.target !== document.getElementById('install-overlay')) return;
  document.getElementById('install-overlay').classList.remove('open');
}
</script>
