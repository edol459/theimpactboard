<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Impact Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bg4:#222;
  --border:#1e1e1e;--border2:#2a2a2a;--border3:#333;
  --text:#e8e8e8;--text2:#999;--text3:#555;--text4:#333;
  --accent:#f97316;--accent2:#ea580c;--accent-dim:rgba(249,115,22,0.08);
  --green:#22c55e;--red:#ef4444;--blue:#60a5fa;--purple:#a78bfa;
  --fh:'Barlow Condensed',sans-serif;
  --fb:'Barlow',sans-serif;
  --fm:'DM Mono',monospace;
  --r:3px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);font-size:14px;line-height:1.4;overflow:hidden}

/* ── App shell ───────────────────────────── */
.app{display:grid;grid-template-rows:52px 1fr;height:100vh;overflow:hidden}

/* ── Header ─────────────────────────────── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;border-bottom:1px solid var(--border);
  background:var(--bg);z-index:50;
}
.logo{font-family:var(--fh);font-size:21px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:10px}
.logo em{color:var(--accent);font-style:normal}
.logo-sep{width:1px;height:16px;background:var(--border3)}
.logo-season{font-family:var(--fm);font-size:10px;color:var(--text3);letter-spacing:.06em}
.hdr-right{display:flex;align-items:center;gap:10px}

/* ── Body split: sidebar + content ──────── */
.body{display:grid;grid-template-columns:220px 1fr;overflow:hidden;height:100%}

/* ── Sidebar ─────────────────────────────── */
.sidebar{
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;background:var(--bg);
}
.sidebar-section{padding:16px 14px 8px;flex-shrink:0}
.sidebar-label{
  font-family:var(--fm);font-size:9px;color:var(--text3);
  letter-spacing:.09em;text-transform:uppercase;
  padding:0 6px;margin-bottom:6px;
}

/* Category nav items */
.cat-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:var(--r);cursor:pointer;
  transition:all .12s;margin-bottom:2px;
  border:1px solid transparent;
}
.cat-item:hover{background:var(--bg3)}
.cat-item.active{background:var(--accent-dim);border-color:rgba(249,115,22,.2)}
.cat-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  background:var(--text3);transition:background .12s;
}
.cat-item.active .cat-dot{background:var(--accent)}
.cat-name{
  font-family:var(--fh);font-size:15px;font-weight:600;
  letter-spacing:.02em;color:var(--text2);transition:color .12s;
}
.cat-item.active .cat-name{color:var(--text)}
.cat-item:hover .cat-name{color:var(--text)}

/* Metric sub-list */
.metric-list{overflow-y:auto;flex:1;padding:0 14px 16px}
.metric-list::-webkit-scrollbar{width:3px}
.metric-list::-webkit-scrollbar-thumb{background:var(--border2)}
.metric-group-label{
  font-family:var(--fm);font-size:9px;color:var(--text4);
  letter-spacing:.08em;text-transform:uppercase;
  padding:10px 6px 4px;
}
.metric-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 10px;border-radius:var(--r);cursor:pointer;
  transition:all .1s;margin-bottom:1px;
}
.metric-item:hover{background:var(--bg3)}
.metric-item.active{background:var(--bg3);border-left:2px solid var(--accent);padding-left:8px}
.metric-item-name{font-size:12px;color:var(--text2);transition:color .1s}
.metric-item.active .metric-item-name{color:var(--text)}
.metric-item:hover .metric-item-name{color:var(--text)}
.metric-item-badge{
  font-family:var(--fm);font-size:9px;color:var(--text3);
  background:var(--bg4);padding:1px 5px;border-radius:2px;
  letter-spacing:.04em;flex-shrink:0;
}
.metric-item.active .metric-item-badge{background:var(--accent-dim);color:var(--accent)}

/* External metric badge */
.ext-badge{
  font-family:var(--fm);font-size:8px;color:var(--text3);
  border:1px solid var(--border2);padding:1px 4px;border-radius:2px;
}
.coming-soon{opacity:.4;cursor:default !important}
.coming-soon:hover{background:transparent !important}
.coming-soon .metric-item-name{color:var(--text3) !important}

/* Sidebar divider */
.sidebar-divider{height:1px;background:var(--border);margin:8px 14px}

/* ── Main content ────────────────────────── */
.content{display:grid;grid-template-rows:auto 1fr auto;overflow:hidden}

/* ── Toolbar ─────────────────────────────── */
.toolbar{
  display:flex;align-items:center;gap:10px;
  padding:10px 20px;border-bottom:1px solid var(--border);
  background:var(--bg2);flex-wrap:nowrap;overflow-x:auto;
}
.toolbar::-webkit-scrollbar{display:none}

/* Current view label */
.view-label{
  display:flex;align-items:baseline;gap:6px;flex-shrink:0;
}
.view-cat{
  font-family:var(--fh);font-size:18px;font-weight:700;
  letter-spacing:.03em;color:var(--text);text-transform:uppercase;
}
.view-metric{
  font-family:var(--fm);font-size:10px;color:var(--accent);
  letter-spacing:.05em;text-transform:uppercase;
}

.tb-sep{width:1px;height:20px;background:var(--border2);flex-shrink:0}

/* Position filter */
.pos-btns{display:flex;gap:2px;flex-shrink:0}
.pos-btn{
  font-family:var(--fh);font-size:12px;font-weight:600;letter-spacing:.04em;
  padding:4px 9px;border:1px solid var(--border2);border-radius:var(--r);
  background:transparent;color:var(--text3);cursor:pointer;transition:all .12s;
}
.pos-btn:hover{border-color:var(--text3);color:var(--text2)}
.pos-btn.active{background:var(--accent);border-color:var(--accent);color:#000}

/* Search */
.search-wrap{position:relative;flex-shrink:0}
.search-wrap svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
input[type=search]{
  width:170px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--r);color:var(--text);font-family:var(--fb);
  font-size:12px;padding:5px 8px 5px 28px;outline:none;transition:border-color .15s;
}
input[type=search]:focus{border-color:var(--accent)}
input[type=search]::placeholder{color:var(--text3)}

/* Min minutes */
.min-wrap{display:flex;align-items:center;gap:5px;flex-shrink:0}
.tb-lbl{font-family:var(--fm);font-size:9px;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
input[type=number]{
  width:58px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--r);color:var(--text);font-family:var(--fm);
  font-size:11px;padding:5px 6px;outline:none;text-align:center;
}
input[type=number]:focus{border-color:var(--accent)}

.result-count{font-family:var(--fm);font-size:10px;color:var(--text3);margin-left:auto;flex-shrink:0;white-space:nowrap}

/* ── Table ───────────────────────────────── */
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse;min-width:600px}

thead th{
  position:sticky;top:0;z-index:20;background:var(--bg2);
  border-bottom:1px solid var(--border2);
  padding:0 12px;height:30px;white-space:nowrap;
}
.th-btn{
  display:inline-flex;align-items:center;gap:4px;
  font-family:var(--fm);font-size:9px;font-weight:500;
  color:var(--text3);letter-spacing:.07em;text-transform:uppercase;
  background:none;border:none;cursor:pointer;padding:0;transition:color .12s;
}
.th-btn:hover{color:var(--text2)}
.th-btn.active{color:var(--accent)}
.th-arr{opacity:.35;font-size:8px;transition:opacity .12s}
.th-btn.active .th-arr{opacity:1}

tbody tr{
  border-bottom:1px solid var(--border);cursor:pointer;
  transition:background .08s;
}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody tr.selected{background:var(--accent-dim);border-left:2px solid var(--accent)}

td{padding:0 12px;height:42px;white-space:nowrap;vertical-align:middle}

/* Rank */
td.c-rank{width:40px;text-align:center}
.rank-n{font-family:var(--fm);font-size:10px;color:var(--text3)}
.rank-n.t1{color:#f59e0b;font-weight:500}
.rank-n.t2{color:#9ca3af;font-weight:500}
.rank-n.t3{color:#b45309;font-weight:500}

/* Player */
td.c-player{min-width:190px}
.pcell{display:flex;align-items:center;gap:9px}
.pimg{width:28px;height:28px;border-radius:50%;object-fit:cover;background:var(--bg3);border:1px solid var(--border2);flex-shrink:0}
.pname{font-family:var(--fh);font-size:15px;font-weight:600;letter-spacing:.01em;transition:color .1s}
tr:hover .pname{color:var(--accent)}

/* Tags */
.tag{font-family:var(--fm);font-size:9px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:1px 5px;border-radius:2px;letter-spacing:.04em}

/* Numbers */
.num{font-family:var(--fm);font-size:11px;color:var(--text2);text-align:right;display:block}
.num.hl{color:var(--text);font-weight:500}
.num.pos{color:var(--green)}
.num.neg{color:var(--red)}

/* Primary metric column */
td.c-primary{min-width:140px}
.prim-cell{display:flex;align-items:center;justify-content:flex-end;gap:8px}
.prim-val{font-family:var(--fm);font-size:13px;font-weight:500;color:var(--text);min-width:44px;text-align:right}
.bar{width:56px;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden;flex-shrink:0}
.bar-f{height:100%;background:var(--accent);border-radius:1px;transition:width .4s ease}

/* Overall score has bigger display */
.prim-val.overall{font-size:14px;color:var(--accent)}

/* ── Pagination ──────────────────────────── */
.pg{
  display:flex;align-items:center;justify-content:center;gap:4px;
  padding:8px 20px;border-top:1px solid var(--border);background:var(--bg);
}
.pg-btn{
  font-family:var(--fm);font-size:10px;padding:4px 9px;
  border:1px solid var(--border2);border-radius:var(--r);
  background:transparent;color:var(--text2);cursor:pointer;transition:all .12s;
}
.pg-btn:hover:not(:disabled){border-color:var(--text3);color:var(--text)}
.pg-btn.cur{background:var(--accent);border-color:var(--accent);color:#000}
.pg-btn:disabled{opacity:.3;cursor:default}

/* ── Skeletons ───────────────────────────── */
.sk-row td{padding:0}
.sk-inner{display:flex;align-items:center;padding:0 12px;gap:10px;height:42px}
.sk{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200%;animation:shimmer 1.4s infinite;border-radius:2px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-c{width:28px;height:28px;border-radius:50%;flex-shrink:0}
.sk-n{height:12px;border-radius:2px}

/* ── Drawer ──────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.on{opacity:1;pointer-events:all}
.drawer{
  position:fixed;right:0;top:0;bottom:0;width:400px;
  background:var(--bg2);border-left:1px solid var(--border2);
  z-index:101;transform:translateX(100%);
  transition:transform .22s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;overflow-x:hidden;
}
.drawer.on{transform:translateX(0)}

.d-head{padding:20px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between}
.d-name{font-family:var(--fh);font-size:26px;font-weight:700;letter-spacing:.01em;line-height:1.1}
.d-sub{font-family:var(--fm);font-size:10px;color:var(--text3);margin-top:4px;letter-spacing:.04em}
.d-close{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:28px;height:28px;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.d-close:hover{border-color:var(--text3);color:var(--text)}

.d-img-wrap{padding:16px 22px 0;display:flex;justify-content:center}
.d-img{width:96px;height:72px;object-fit:cover;object-position:top;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3)}

/* Category scores in drawer */
.d-scores{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:14px 22px;border-bottom:1px solid var(--border)}
.d-score{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;position:relative;overflow:hidden}
.d-score.best{border-color:rgba(249,115,22,.4);background:var(--accent-dim)}
.d-score-lbl{font-family:var(--fm);font-size:8px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.d-score-val{font-family:var(--fh);font-size:26px;font-weight:700;color:var(--text);line-height:1}
.d-score.best .d-score-val{color:var(--accent)}
.d-score-bar{margin-top:6px;height:2px;background:var(--border2);border-radius:1px;overflow:hidden}
.d-score-fill{height:100%;background:var(--accent);border-radius:1px}

.d-sec{padding:12px 22px;border-bottom:1px solid var(--border)}
.d-sec:last-child{border-bottom:none}
.d-sec-title{font-family:var(--fm);font-size:9px;color:var(--text3);letter-spacing:.09em;text-transform:uppercase;margin-bottom:8px}
.d-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.d-stat-val{font-family:var(--fm);font-size:16px;font-weight:500;color:var(--text)}
.d-stat-lbl{font-family:var(--fm);font-size:8px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-top:2px}
.d-rows{}
.d-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)}
.d-row:last-child{border-bottom:none}
.d-row-lbl{font-size:12px;color:var(--text2)}
.d-row-val{font-family:var(--fm);font-size:11px;font-weight:500;color:var(--text)}

/* ── Scrollbar ───────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

@media(max-width:900px){
  .body{grid-template-columns:1fr}
  .sidebar{display:none}
  .drawer{width:100vw}
}

/* Row entry animation */
@keyframes rowIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="app">

<!-- Header -->
<header>
  <div class="logo">
    The <em>Impact</em> Board
    <div class="logo-sep"></div>
    <span class="logo-season" id="season-label">2024-25</span>
  </div>
  <div class="hdr-right">
  </div>
</header>

<!-- Body -->
<div class="body">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Categories</div>

      <div class="cat-item active" data-cat="scoring">
        <div class="cat-dot"></div>
        <div class="cat-name">Scoring</div>
      </div>
      <div class="cat-item" data-cat="playmaking">
        <div class="cat-dot"></div>
        <div class="cat-name">Playmaking</div>
      </div>
      <div class="cat-item" data-cat="defense">
        <div class="cat-dot"></div>
        <div class="cat-name">Defense</div>
      </div>
      <div class="cat-item" data-cat="hustle">
        <div class="cat-dot"></div>
        <div class="cat-name">Hustle</div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="cat-item" data-cat="metrics">
        <div class="cat-dot" style="background:var(--purple);border-radius:2px;"></div>
        <div class="cat-name">Metrics</div>
      </div>
    </div>

    <!-- Metric sub-list (populated by JS) -->
    <div class="metric-list" id="metric-list"></div>
  </div>

  <!-- Main content -->
  <div class="content">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="view-label">
        <span class="view-cat" id="view-cat">Scoring</span>
        <span class="view-metric" id="view-metric">Overall</span>
      </div>

      <div class="tb-sep"></div>

      <!-- Position -->
      <div class="pos-btns" id="pos-btns">
        <button class="pos-btn active" data-pos="ALL">ALL</button>
        <button class="pos-btn" data-pos="G">G</button>
        <button class="pos-btn" data-pos="GF">G-F</button>
        <button class="pos-btn" data-pos="F">F</button>
        <button class="pos-btn" data-pos="FC">F-C</button>
        <button class="pos-btn" data-pos="C">C</button>
      </div>

      <div class="tb-sep"></div>

      <!-- Search -->
      <div class="search-wrap">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" id="search" placeholder="Search players…" autocomplete="off">
      </div>

      <div class="tb-sep"></div>

      <!-- Min minutes -->
      <div class="min-wrap">
        <span class="tb-lbl">MIN</span>
        <input type="number" id="min-min" value="1000" min="0" max="3000" step="100">
      </div>

      <span class="result-count" id="result-count"></span>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead><tr id="thead-row"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pg" id="pagination" style="display:none"></div>
  </div>
</div>
</div>

<!-- Drawer -->
<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <div class="d-head">
    <div>
      <div class="d-name" id="d-name">—</div>
      <div class="d-sub"  id="d-sub">—</div>
    </div>
    <button class="d-close" id="d-close">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="d-img-wrap"><img class="d-img" id="d-img" src="" alt=""></div>
  <div class="d-scores" id="d-scores"></div>
  <div class="d-sec"><div class="d-sec-title">Box Score</div><div class="d-grid" id="d-box"></div></div>
  <div class="d-sec"><div class="d-sec-title">Advanced</div><div class="d-rows" id="d-adv"></div></div>
  <div class="d-sec"><div class="d-sec-title">Playmaking</div><div class="d-rows" id="d-play"></div></div>
  <div class="d-sec"><div class="d-sec-title">Defense</div><div class="d-rows" id="d-def"></div></div>
  <div class="d-sec"><div class="d-sec-title">Hustle</div><div class="d-rows" id="d-hus"></div></div>
</div>

<script>
const API = 'http://localhost:5000';

// ── Category + metric definitions ─────────
const CATS = {
  scoring: {
    label: 'Scoring',
    overall: { key: 'creator_score', label: 'Overall', fmt: '1f', src: 'pm', isOverall: true },
    metrics: [
      { key: 'pts',              label: 'Points',         fmt: '1f',  src: 'ps', badge: 'PTS' },
      { key: 'ts_pct',           label: 'True Shooting',  fmt: 'pct', src: 'ps', badge: 'TS%' },
      { key: 'efg_pct',          label: 'Eff FG%',        fmt: 'pct', src: 'ps', badge: 'EFG%' },
      { key: 'shot_quality_delta',label:'Shot Quality',   fmt: '3f',  src: 'pm', badge: 'SQ' },
      { key: 'pull_up_efg_pct',  label: 'Pull-Up EFG%',  fmt: 'pct', src: 'ps', badge: 'PU' },
      { key: 'cs_efg_pct',       label: 'Catch & Shoot',  fmt: 'pct', src: 'ps', badge: 'C&S' },
      { key: 'creation_premium', label: 'Creation Delta', fmt: '3f',  src: 'pm', badge: 'CΔ' },
      { key: 'paint_scoring_rate',label:'Paint Scoring',  fmt: '2f',  src: 'pm', badge: 'PAINT' },
      { key: 'ft_rate',          label: 'FT Rate',        fmt: '2f',  src: 'pm', badge: 'FTR' },
      { key: 'pct_pts_3pt',      label: '% Points 3PT',   fmt: 'pct', src: 'ps', badge: '3PT%' },
      { key: 'pct_pts_paint',    label: '% Points Paint', fmt: 'pct', src: 'ps', badge: 'PNT%' },
      { key: 'pct_pts_mid2',     label: '% Points Mid',   fmt: 'pct', src: 'ps', badge: 'MID%' },
      { key: 'spotup_ppp',       label: 'Spot-Up PPP',    fmt: '2f',  src: 'ps', badge: 'SPOT' },
      { key: 'iso_ppp',          label: 'ISO PPP',        fmt: '2f',  src: 'ps', badge: 'ISO' },
      { key: 'clutch_net_rating',label: 'Clutch Rating',  fmt: '1f',  src: 'ps', badge: 'CLCH' },
    ],
    cols: ['pts','fg_pct','fg3_pct','ft_pct','ts_pct','usg_pct'],
  },

  playmaking: {
    label: 'Playmaking',

  isOverall: true,
  sortFmt: '1f',
};

// ── Format ────────────────────────────────
function fmt(val, f) {
  if (val === null || val === undefined) return '—';
  const n = parseFloat(val);
  if (isNaN(n)) return '—';
  switch(f) {
    case 'pct': return (n * 100).toFixed(1) + '%';
    case '1f':  return n.toFixed(1);
    case '2f':  return n.toFixed(2);
    case '3f':  return n.toFixed(3);
    default:    return n.toFixed(1);
  }
}

function numCls(key, val) {
  const n = parseFloat(val);
  if (isNaN(n)) return '';
  if (key === 'net_rating' || key === 'def_delta_overall') {
    return n > 0 ? 'pos' : n < 0 ? 'neg' : '';
  }
  if (key === 'def_rating') return n < 108 ? 'pos' : n > 114 ? 'neg' : '';
  return '';
}

// ── Sidebar rendering ─────────────────────
function renderSidebar() {
  const cat    = CATS[ST.cat];
  const list   = document.getElementById('metric-list');
  let html     = '';

  // Overall option (for non-metrics categories)
  if (cat.overall) {
    const active = ST.sort === cat.overall.key;
    html += `
      <div class="metric-item ${active ? 'active' : ''}" data-key="${cat.overall.key}" data-fmt="${cat.overall.fmt}" data-overall="true">
        <span class="metric-item-name" style="font-weight:600">Overall Score</span>
        <span class="metric-item-badge" style="${active ? '' : ''}">COMP</span>
      </div>`;
  }

  html += `<div class="metric-group-label">Individual Stats</div>`;

  for (const m of cat.metrics) {
    if (m.soon) {
      html += `
        <div class="metric-item coming-soon">
          <span class="metric-item-name">${m.label}</span>
          <span class="ext-badge">soon</span>
        </div>`;
      continue;
    }
    const active = ST.sort === m.key;
    html += `
      <div class="metric-item ${active ? 'active' : ''}" data-key="${m.key}" data-fmt="${m.fmt}" data-overall="false">
        <span class="metric-item-name">${m.label}</span>
        <span class="metric-item-badge">${m.badge}</span>
      </div>`;
  }

  list.innerHTML = html;

  // Click handlers
  list.querySelectorAll('.metric-item:not(.coming-soon)').forEach(el => {
    el.addEventListener('click', () => {
      ST.sort      = el.dataset.key;
      ST.sortFmt   = el.dataset.fmt;
      ST.isOverall = el.dataset.overall === 'true';
      ST.dir       = 'desc';
      ST.page      = 1;
      renderSidebar();
      updateViewLabel();
      renderHeader();
      fetchPlayers();
    });
  });
}

function updateViewLabel() {
  const cat = CATS[ST.cat];
  document.getElementById('view-cat').textContent = cat.label.toUpperCase();

  let metricLabel = 'Overall';
  if (!ST.isOverall) {
    const all = [...(cat.overall ? [cat.overall] : []), ...cat.metrics];
    const found = all.find(m => m.key === ST.sort);
    metricLabel = found ? found.label : ST.sort;
  }
  document.getElementById('view-metric').textContent = metricLabel.toUpperCase();
}

// ── Category switching ────────────────────
document.querySelectorAll('.cat-item').forEach(el => {
  el.addEventListener('click', () => {
    const cat = el.dataset.cat;
    document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'));
    el.classList.add('active');

    ST.cat  = cat;
    ST.page = 1;

    // Default to overall if available, else first metric
    const catDef = CATS[cat];
    if (catDef.overall) {
      ST.sort      = catDef.overall.key;
      ST.sortFmt   = catDef.overall.fmt;
      ST.isOverall = true;
    } else {
      const first  = catDef.metrics.find(m => !m.soon);
      ST.sort      = first.key;
      ST.sortFmt   = first.fmt;
      ST.isOverall = false;
    }
    ST.dir = 'desc';

    renderSidebar();
    updateViewLabel();
    renderHeader();
    fetchPlayers();
  });
});

// ── Table header ──────────────────────────
function renderHeader() {
  const cat  = CATS[ST.cat];
  const row  = document.getElementById('thead-row');
  const arr  = ST.dir === 'desc' ? '↓' : '↑';

  let html = `
    <th class="c-rank"><span class="th-btn">#</span></th>
    <th class="c-player"><span class="th-btn">Player</span></th>
    <th><button class="th-btn sortable" data-k="min_per_game">MIN<span class="th-arr"> ${ST.sort==='min_per_game'?arr:''}</span></button></th>
  `;

  for (const colKey of cat.cols) {
    const cd = COL_DEF[colKey];
    if (!cd) continue;
    const active = ST.sort === colKey;
    html += `<th><button class="th-btn sortable ${active?'active':''}" data-k="${colKey}">${cd.label}<span class="th-arr"> ${active?arr:''}</span></button></th>`;
  }

  // Primary sort column header
  const sortLabel = (() => {
    const all = [...(cat.overall ? [cat.overall] : []), ...cat.metrics];
    const found = all.find(m => m.key === ST.sort);
    return found ? found.label.toUpperCase() : ST.sort.toUpperCase();
  })();

  html += `<th style="min-width:150px"><button class="th-btn active">${sortLabel}<span class="th-arr"> ${arr}</span></button></th>`;

  row.innerHTML = html;

  row.querySelectorAll('.sortable').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.dataset.k;
      if (ST.sort === k) {
        ST.dir = ST.dir === 'desc' ? 'asc' : 'desc';
      } else {
        ST.sort      = k;
        ST.sortFmt   = COL_DEF[k]?.fmt || '1f';
        ST.isOverall = false;
        ST.dir       = 'desc';
        renderSidebar();
        updateViewLabel();
      }
      ST.page = 1;
      renderHeader();
      fetchPlayers();
    });
  });
}

// ── Fetch ─────────────────────────────────
async function fetchPlayers() {
  const params = new URLSearchParams({
    sort: ST.sort, dir: ST.dir, pos: ST.pos,
    season: ST.season, min: ST.minMin,
    page: ST.page, per_page: ST.per,
  });
  if (ST.search) params.set('search', ST.search);

  showSkeletons();

  try {
    const res  = await fetch(`${API}/api/players?${params}`);
    const data = await res.json();
    ST.data  = data.players || [];
    ST.total = data.total   || 0;

    const vals = ST.data.map(p => parseFloat(p[ST.sort])).filter(v => !isNaN(v) && v > 0);
    ST.maxVal  = vals.length ? Math.max(...vals) : 100;

    renderRows();
    renderPagination();
    document.getElementById('result-count').textContent = `${ST.total.toLocaleString()} players`;
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="20" style="text-align:center;padding:40px;font-family:var(--fm);font-size:11px;color:var(--text3)">
        Cannot connect — is the server running at ${API}?
      </td></tr>`;
  }
}

function showSkeletons() {
  const cat  = CATS[ST.cat];
  const cols = 3 + cat.cols.length + 1;
  document.getElementById('tbody').innerHTML = Array(10).fill(0).map((_, i) =>
    `<tr class="sk-row" style="animation-delay:${i*30}ms">
      <td colspan="${cols}">
        <div class="sk-inner">
          <div class="sk sk-c"></div>
          <div class="sk sk-n" style="width:${120 + Math.random()*60}px"></div>
          <div class="sk sk-n" style="width:30px;margin-left:auto"></div>
          <div class="sk sk-n" style="width:36px"></div>
          <div class="sk sk-n" style="width:44px"></div>
        </div>
      </td>
    </tr>`
  ).join('');
}

// ── Rows ──────────────────────────────────
function renderRows() {
  const tbody  = document.getElementById('tbody');
  const cat    = CATS[ST.cat];
  const offset = (ST.page - 1) * ST.per;

  if (!ST.data.length) {
    tbody.innerHTML = `<tr><td colspan="20" style="text-align:center;padding:40px;font-family:var(--fm);font-size:11px;color:var(--text3)">No players match.</td></tr>`;
    return;
  }

  tbody.innerHTML = ST.data.map((p, i) => {
    const rank    = offset + i + 1;
    const rankCls = rank === 1 ? 't1' : rank === 2 ? 't2' : rank === 3 ? 't3' : '';
    const val     = p[ST.sort];
    const barPct  = (ST.maxVal && val != null) ? Math.min(100, (Math.abs(parseFloat(val)) / Math.abs(ST.maxVal)) * 100) : 0;
    const delay   = Math.min(i * 12, 200);

    // Context columns
    let ctxCols = `<td><div class="num">${fmt(p.min_per_game, '1f')}</div></td>`;
    for (const colKey of cat.cols) {
      const cd  = COL_DEF[colKey];
      if (!cd) continue;
      const cls = numCls(colKey, p[colKey]);
      ctxCols += `<td><div class="num ${cls}">${fmt(p[colKey], cd.fmt)}</div></td>`;
    }

    // Primary value display
    const isOverallCol = ST.isOverall;
    const primValCls   = isOverallCol ? 'prim-val overall' : 'prim-val';

    return `<tr data-id="${p.player_id}" style="animation:rowIn .25s both;animation-delay:${delay}ms">
      <td class="c-rank"><div class="rank-n ${rankCls}">${rank}</div></td>
      <td class="c-player">
        <div class="pcell">
          <img class="pimg" src="https://cdn.nba.com/headshots/nba/latest/1040x760/${p.player_id}.png" onerror="this.style.opacity=0" alt="">
          <span class="pname">${p.player_name}</span>
          <span class="tag" style="margin-left:2px">${p.position_group||'—'}</span>
        </div>
      </td>
      ${ctxCols}
      <td class="c-primary">
        <div class="prim-cell">
          <div class="bar"><div class="bar-f" style="width:${barPct.toFixed(1)}%"></div></div>
          <div class="${primValCls}">${fmt(val, ST.sortFmt)}</div>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.querySelectorAll('tr[data-id]').forEach(r => {
    r.addEventListener('click', () => openDrawer(parseInt(r.dataset.id)));
  });
}

// ── Pagination ────────────────────────────
function renderPagination() {
  const pages = Math.ceil(ST.total / ST.per);
  const pg    = document.getElementById('pagination');
  if (pages <= 1) { pg.style.display = 'none'; return; }
  pg.style.display = 'flex';
  const cur = ST.page;
  let html = `<button class="pg-btn" ${cur===1?'disabled':''} onclick="gp(${cur-1})">←</button>`;
  for (let p = 1; p <= pages; p++) {
    if (p===1||p===pages||Math.abs(p-cur)<=1) {
      html += `<button class="pg-btn ${p===cur?'cur':''}" onclick="gp(${p})">${p}</button>`;
    } else if (Math.abs(p-cur)===2) {
      html += `<span style="color:var(--text3);font-family:var(--fm);font-size:10px;padding:0 3px">…</span>`;
    }
  }
  html += `<button class="pg-btn" ${cur===pages?'disabled':''} onclick="gp(${cur+1})">→</button>`;
  pg.innerHTML = html;
}
function gp(p) { ST.page = p; fetchPlayers(); document.querySelector('.table-wrap').scrollTop = 0; }
window.gp = gp;

      ['PM Gravity',        fmt(m.playmaking_gravity,'2f')],
      ['Pass→Score %',      fmt(m.pass_to_score_pct,'pct')],
      ['Drive & Dish %',    fmt(m.drive_and_dish_rate,'pct')],
      ['Sec AST / 75',      fmt(m.secondary_ast_per75,'2f')],
      ['ISO PPP',           fmt(s.iso_ppp,'2f')],
      ['P&R BH PPP',        fmt(s.pnr_bh_ppp,'2f')],
      ['Transition PPP',    fmt(s.transition_ppp,'2f')],
    ].map(dr).join('');

    // Defense
    document.getElementById('d-def').innerHTML = [
      ['Def Delta (overall)',fmt(m.def_delta_overall,'3f')],
      ['Def Delta (2PT)',    fmt(m.def_delta_2pt,'3f')],
      ['Def Delta (3PT)',    fmt(m.def_delta_3pt,'3f')],
      ['Rim Protection',     fmt(m.rim_protection_score,'1f')],
      ['Disruption / 75',    fmt(m.def_disruption_rate,'2f')],
      ['Box Out Rate / 75',  fmt(m.box_out_rate,'2f')],
      ['DREB %',             fmt(s.dreb_pct,'pct')],
      ['DEF Rating',         fmt(s.def_rating,'1f')],
    ].map(dr).join('');

    // Hustle
    document.getElementById('d-hus').innerHTML = [
      ['Hustle Composite/75', fmt(m.hustle_composite,'2f')],
      ['Motor Score',         fmt(m.motor_score,'2f')],
      ['Screen AST Pts/75',   fmt(m.screen_assist_rate,'2f')],
      ['Loose Balls / 75',    fmt(m.loose_ball_rate,'2f')],
      ['Box Outs / 75',       fmt(m.box_out_rate,'2f')],
      ['Deflections',         fmt(s.deflections,'1f')],
      ['Charges Drawn',       fmt(s.charges_drawn,'1f')],
    ].map(dr).join('');

  } catch(e) { console.error(e); }
}

function dr([label, val]) {
  return `<div class="d-row">
    <span class="d-row-lbl">${label}</span>
    <span class="d-row-val">${val}</span>
  </div>`;
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('drawer').classList.remove('on');
  document.querySelectorAll('tr[data-id]').forEach(r => r.classList.remove('selected'));
}

// ── Events ────────────────────────────────
document.getElementById('d-close').addEventListener('click', closeDrawer);
document.getElementById('overlay').addEventListener('click', closeDrawer);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

document.getElementById('pos-btns').addEventListener('click', e => {
  const btn = e.target.closest('.pos-btn');
  if (!btn) return;
  document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ST.pos = btn.dataset.pos; ST.page = 1; fetchPlayers();
});

let st;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(st);
  st = setTimeout(() => { ST.search = e.target.value.trim(); ST.page = 1; fetchPlayers(); }, 300);
});

let mt;
document.getElementById('min-min').addEventListener('input', e => {
  clearTimeout(mt);
  mt = setTimeout(() => { ST.minMin = parseInt(e.target.value)||0; ST.page = 1; fetchPlayers(); }, 400);
});

// ── Init ──────────────────────────────────
// Detect season from API
fetch(`${API}/api/seasons`).then(r => r.json()).then(seasons => {
  if (seasons && seasons.length) {
    ST.season = seasons[0].season;
    document.getElementById('season-label').textContent = ST.season;
  }
}).catch(() => {});

renderSidebar();
updateViewLabel();
renderHeader();
fetchPlayers();
</script>
</body>
</html>
