<link rel="stylesheet" href="/night-mode.css">
<style>
/* ── Reset & tokens ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0c0c0d;--ink2:#2a2a2e;--ink3:#6b6b78;--ink4:#a8a8b3;
  --paper:     #F5F0E8;--paper2:#eeecea;--paper3:#e5e2dc;--rule:#d8d5cf;
  --orange:#e8530a;--orange-lt:#fff0ea;--green:#1a7a4a;--red:#c0392b;
  --ff-serif:'DM Serif Display',Georgia,serif;
  --ff-sans:'Instrument Sans',system-ui,sans-serif;
  --ff-mono:'DM Mono','Courier New',monospace;
  --nav-h:56px;
  font-size:15px;
}
html{scroll-behavior:smooth;overflow-x:clip}
body{position:relative;font-family:var(--ff-sans);background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:clip;}
body::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.022;pointer-events:none;z-index:9999;}

/* ── Nav ─────────────────────────────────────────────────────── */
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--paper);border-bottom:1px solid var(--rule);display:flex;align-items:center;padding:0 24px;gap:32px;z-index:100;will-change:transform;}
.nav-wordmark{font-family:var(--ff-serif);font-size:20px;color:var(--ink);letter-spacing:-.01em;text-decoration:none;flex-shrink:0;display:flex;align-items:center;gap:0;}
.nav-logo{height:26px;width:auto;margin-right:8px;}
.nav-wordmark span { color: var(--orange); }
.nav-tabs { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: flex; gap: 2px; }
.nav-tab{font-family:var(--ff-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);text-decoration:none;padding:6px 14px;border-radius:4px;transition:color .15s,background .15s;display:inline-block;}
.nav-tab:hover{color:var(--ink);background:var(--paper2);}
.nav-tab.active{color:var(--ink);background:var(--paper3);}

/* ── Layout ──────────────────────────────────────────────────── */
.page{padding-top:var(--nav-h);max-width:960px;margin:0 auto;padding-bottom:80px;}

/* ── Scoreboard header ───────────────────────────────────────── */
.game-sb{display:flex;align-items:center;justify-content:center;padding:36px 24px 28px;gap:0;}
.sb-team{display:flex;align-items:center;gap:12px;flex:1;}
.sb-team.home{flex-direction:row-reverse;}
.sb-logo{width:60px;height:60px;object-fit:contain;}
.sb-logo-fallback{width:60px;height:60px;font-size:28px;display:flex;align-items:center;justify-content:center;}
.sb-team-info{display:flex;flex-direction:column;gap:2px;}
.sb-abbr{font-family:var(--ff-mono);font-size:13px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;}
.sb-record{font-family:var(--ff-mono);font-size:10px;color:var(--ink4);}
.sb-score{font-size:52px;font-weight:700;letter-spacing:-2px;font-family:var(--ff-serif);min-width:64px;text-align:center;line-height:1;}
.sb-score.win{color:var(--ink);}
.sb-score.loss{color:var(--rule);}
.sb-abbr.loser,.sb-team.loser .sb-record{opacity:.5;}
.sb-center{display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 28px;flex-shrink:0;}
.sb-status{font-family:var(--ff-mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink4);}
.sb-status.live{color:#e74c3c;}
.sb-clock{font-family:var(--ff-mono);font-size:11px;color:var(--ink3);font-weight:500;}

/* ── Tabs ────────────────────────────────────────────────────── */
.game-tabs{display:flex;border-bottom:1px solid var(--rule);padding:0 24px;}
.game-tab{font-family:var(--ff-sans);font-size:13px;font-weight:500;padding:10px 16px;border:none;border-bottom:2px solid transparent;background:none;color:var(--ink3);cursor:pointer;margin-bottom:-1px;transition:color .15s;}
.game-tab:hover{color:var(--ink2);}
.game-tab.active{color:var(--ink);border-bottom-color:var(--ink);}
.tab-panel{display:none;padding:0 24px;}
.tab-panel.active{display:block;}

/* ── Box Score ───────────────────────────────────────────────── */
.box-team-toggle{display:flex;gap:6px;padding:16px 0 12px;}
.box-team-btn{font-family:var(--ff-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border:1px solid var(--rule);border-radius:4px;background:transparent;color:var(--ink3);cursor:pointer;transition:all .12s;}
.box-team-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.box-wrap{overflow-x:auto;}
table.box-table{width:100%;border-collapse:collapse;font-size:12px;}
table.box-table thead th{font-family:var(--ff-mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);text-align:right;padding:8px 10px;background:var(--paper2);border-bottom:1px solid var(--rule);white-space:nowrap;cursor:pointer;user-select:none;}
table.box-table thead th:first-child{text-align:left;}
table.box-table thead th:hover{color:var(--ink);}
table.box-table thead th.sorted{color:var(--orange);}
table.box-table tbody td{padding:7px 10px;border-bottom:1px solid var(--paper3);text-align:right;color:var(--ink2);white-space:nowrap;font-variant-numeric:tabular-nums;}
table.box-table tbody td:first-child{text-align:left;font-weight:500;color:var(--ink);}
table.box-table tbody tr:hover{background:var(--paper2);}
table.box-table tfoot td{font-family:var(--ff-mono);font-size:10px;font-weight:500;text-align:right;padding:8px 10px;border-top:1px solid var(--rule);color:var(--ink2);background:var(--paper2);}
table.box-table tfoot td:first-child{text-align:left;}
.player-cell{display:flex;align-items:center;gap:8px;}
.player-headshot-sm{width:28px;height:20px;object-fit:cover;object-position:top;border-radius:3px;background:var(--paper3);}
.dnp-row td{color:var(--ink4);font-style:italic;}

/* ── PBP ─────────────────────────────────────────────────────── */
.pbp-tabs{display:flex;gap:4px;padding:14px 0 10px;overflow-x:auto;}
.pbp-q-btn{font-family:var(--ff-mono);font-size:10px;letter-spacing:.05em;padding:5px 12px;border:1px solid var(--rule);border-radius:4px;background:transparent;color:var(--ink3);cursor:pointer;flex-shrink:0;transition:all .12s;}
.pbp-q-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.pbp-quarter-panel{display:none;}
.pbp-quarter-panel.active{display:block;}
.pbp-row{display:flex;align-items:baseline;gap:10px;padding:6px 0;border-bottom:1px solid var(--paper3);font-size:12px;}
.pbp-clock{font-family:var(--ff-mono);font-size:10px;color:var(--ink4);width:42px;flex-shrink:0;text-align:right;}
.pbp-score-snap{font-family:var(--ff-mono);font-size:10px;width:56px;flex-shrink:0;text-align:center;color:var(--ink3);}
.pbp-desc{flex:1;color:var(--ink2);line-height:1.4;}
.pbp-desc .made{color:var(--green);font-weight:600;}
.pbp-desc .miss{color:var(--ink4);}
.pbp-desc .tov{color:var(--red);}
.pbp-desc .period-marker{font-family:var(--ff-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);}
.pbp-team-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.pbp-actor{width:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;align-self:center;}
.pbp-headshot{width:20px;height:20px;border-radius:50%;object-fit:cover;object-position:top center;background:var(--paper3);}


/* ── Reviews tab ─────────────────────────────────────────────── */
.reviews-panel { padding: 0 24px 48px; }
.reviews-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 0 16px; border-bottom: 1px solid var(--rule);
  margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
}
.reviews-agg {
  display: flex; align-items: center; gap: 10px;
}
.reviews-agg-val {
  font-family: var(--ff-serif); font-size: 2rem;
  color: #00C030; line-height: 1;
}
.reviews-agg-stars { font-size: 16px; color: #00C030; letter-spacing: -1px; }
.reviews-agg-count { font-family: var(--ff-mono); font-size: 11px; color: var(--ink3); }
.reviews-agg-empty { font-family: var(--ff-mono); font-size: 12px; color: var(--ink4); }

/* Write section */
.reviews-write {
  background: var(--paper2); border: 1px solid var(--rule);
  border-radius: 6px; padding: 18px 20px; margin-bottom: 24px;
}
.reviews-write-title {
  font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--ink3); margin-bottom: 12px;
}
.star-picker-inline {
  display: flex; gap: 4px; margin-bottom: 12px;
  user-select: none; align-items: center;
}
.star-picker-inline svg {
  width: 28px; height: 28px; cursor: pointer; flex-shrink: 0;
}
.review-write-textarea {
  width: 100%; min-height: 80px;
  padding: 10px 12px; resize: vertical;
  font-family: var(--ff-sans); font-size: 13px;
  line-height: 1.5; color: var(--ink);
  background: var(--paper); border: 1px solid var(--rule);
  border-radius: 4px; outline: none;
  transition: border-color 0.15s; margin-bottom: 10px;
  display: block;
}
.review-write-textarea:focus { border-color: var(--orange); }
.review-write-textarea::placeholder { color: var(--ink4); }
.reviews-write-actions { display: flex; align-items: center; gap: 10px; }
.btn-review-submit {
  font-family: var(--ff-sans); font-size: 13px; font-weight: 600;
  padding: 8px 18px; background: var(--orange); color: #fff;
  border: none; border-radius: 4px; cursor: pointer;
  transition: opacity 0.15s;
}
.btn-review-submit:hover { opacity: 0.85; }
.btn-review-submit:disabled { opacity: 0.4; cursor: default; }
.btn-review-delete {
  font-family: var(--ff-sans); font-size: 12px; color: var(--ink3);
  background: none; border: none; cursor: pointer; margin-left: auto;
}
.btn-review-delete:hover { color: var(--red); }
.review-signin-prompt { font-size: 13px; color: var(--ink3); line-height: 1.5; }
.review-signin-prompt a { color: var(--orange); font-weight: 600; text-decoration: none; }

/* Review list */
.review-item {
  display: grid; grid-template-columns: 36px 1fr;
  gap: 12px; padding: 16px 0;
  border-bottom: 1px solid var(--paper3);
  animation: fadeUp 0.2s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(4px); }
  to   { opacity:1; transform:translateY(0); }
}
.review-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  object-fit: cover; border: 1.5px solid var(--rule);
  background: var(--paper3); display: flex;
  align-items: center; justify-content: space-evenly;
  font-size: 14px; color: var(--ink3); flex-shrink: 0;
  overflow: hidden;
}
.review-avatar img { width: 100%; height: 100%; border-radius: 50%; }
.avatar-wrap { position: relative; flex-shrink: 0; display: inline-flex; }
.avatar-team-badge {
  position: absolute; bottom: -2px; right: -2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--paper); border: 1.5px solid var(--paper);
  object-fit: contain; pointer-events: none;
}
.review-body { min-width: 0; }
.review-top {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 5px; flex-wrap: wrap;
}
.review-name { font-size: 13px; font-weight: 600; color: var(--ink); }
.review-stars { font-size: 12px; color: #00C030; letter-spacing: -1px; }
.review-date { font-family: var(--ff-mono); font-size: 10px; color: var(--ink4); margin-left: auto; }
.review-text { font-size: 13px; line-height: 1.55; color: var(--ink2); }
.reviews-empty { padding: 32px 0; text-align: center; font-family: var(--ff-mono); font-size: 12px; color: var(--ink4); }

/* Sort toggle */
.reviews-sort {
  display: flex; gap: 4px; margin-bottom: 12px;
}
.reviews-sort-btn {
  font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.05em;
  text-transform: uppercase; padding: 5px 10px; border-radius: 4px;
  border: 1px solid var(--rule); background: none; color: var(--ink3);
  cursor: pointer; transition: color 0.12s, border-color 0.12s, background 0.12s;
}
.reviews-sort-btn:hover { color: var(--ink); border-color: var(--ink3); }
.reviews-sort-btn.active { background: var(--paper3); color: var(--ink); border-color: var(--paper3); }

/* Like button */
.review-footer {
  display: flex; align-items: center; margin-top: 8px;
}
.btn-like {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--ff-mono); font-size: 11px;
  color: var(--ink4); background: none; border: none;
  cursor: pointer; padding: 2px 0; transition: color 0.12s;
}
.btn-like:hover { color: var(--ink3); }
.btn-like.liked { color: var(--orange); }
.btn-like svg { width: 14px; height: 14px; flex-shrink: 0; }

.btn-load-more {
  display: block; width: 100%; margin-top: 16px;
  padding: 10px; font-family: var(--ff-mono); font-size: 11px;
  letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--ink3); background: none;
  border: 1px solid var(--rule); border-radius: 4px;
  cursor: pointer; transition: border-color 0.15s, color 0.15s;
}
.btn-load-more:hover { border-color: var(--orange); color: var(--orange); }
.reviews-loading { padding: 32px 0; text-align: center; font-family: var(--ff-mono); font-size: 12px; color: var(--ink4); }

/* Reply section */
.btn-reply, .btn-share {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--ff-mono); font-size: 11px;
  color: var(--ink4); background: none; border: none;
  cursor: pointer; padding: 2px 0 2px 12px; transition: color 0.12s;
}
.btn-reply:hover, .btn-share:hover { color: var(--ink3); }
.btn-reply svg, .btn-share svg { width: 13px; height: 13px; flex-shrink: 0; }
.btn-share.copied { color: var(--orange); }
.reply-section { display: none; padding-left: 48px; }
.reply-section.open { display: block; }
.reply-item {
  display: grid; grid-template-columns: 26px 1fr;
  gap: 8px; padding: 7px 0;
  border-top: 1px solid var(--paper3);
}
.reply-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--paper3); display: flex; align-items: center;
  justify-content: space-evenly; font-size: 11px; color: var(--ink3);
  flex-shrink: 0; overflow: hidden;
}
.reply-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
.reply-body { min-width: 0; }
.reply-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; flex-wrap: wrap; }
.reply-name { font-size: 12px; font-weight: 600; color: var(--ink); text-decoration: none; }
.reply-name:hover { text-decoration: underline; }
.reply-date { font-family: var(--ff-mono); font-size: 10px; color: var(--ink4); }
.reply-text { font-size: 12px; line-height: 1.5; color: var(--ink2); margin: 0; }
.btn-delete-reply {
  background: none; border: none; cursor: pointer;
  color: var(--ink4); font-size: 13px; padding: 0 2px;
  margin-left: auto; line-height: 1; transition: color 0.12s;
}
.btn-delete-reply:hover { color: var(--red); }
.btn-show-more-replies {
  font-family: var(--ff-mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--ink3); background: none; border: none;
  cursor: pointer; padding: 6px 0; display: block; transition: color 0.12s;
}
.btn-show-more-replies:hover { color: var(--orange); }
.reply-form {
  display: flex; gap: 6px; margin-top: 8px;
  border-top: 1px solid var(--paper3); padding-top: 8px;
}
.reply-input {
  flex: 1; font-family: var(--ff-sans); font-size: 12px;
  padding: 6px 10px; border: 1px solid var(--rule); border-radius: 6px;
  background: var(--paper); color: var(--ink); outline: none;
}
.reply-input:focus { border-color: var(--orange); }
.btn-send-reply {
  font-family: var(--ff-mono); font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.04em; padding: 6px 12px; background: var(--orange);
  color: #fff; border: none; border-radius: 6px; cursor: pointer; transition: opacity 0.12s;
}
.btn-send-reply:hover { opacity: 0.85; }
.reply-sign-in { font-family: var(--ff-mono); font-size: 11px; color: var(--ink4); padding: 8px 0 4px; border-top: 1px solid var(--paper3); margin-top: 4px; }
.reply-loading { font-family: var(--ff-mono); font-size: 11px; color: var(--ink4); padding: 8px 0; }

/* ── Stat tags ────────────────────────────────────────────────── */
.review-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.review-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--paper); border: 1px solid var(--rule);
  border-radius: 20px; padding: 2px 8px 2px 3px;
  font-family: var(--ff-mono); font-size: 11px; color: var(--ink2);
}
.tag-headshot { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; background: var(--paper3); flex-shrink: 0; }
.tag-val { font-weight: 600; color: var(--ink); }
.tag-lbl { color: var(--ink3); margin-left: 1px; }
.write-tags-row {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 5px; margin-bottom: 10px; min-height: 26px;
}
.write-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--paper); border: 1px solid var(--rule);
  border-radius: 20px; padding: 2px 5px 2px 3px;
  font-family: var(--ff-mono); font-size: 11px; color: var(--ink2);
}
.write-tag-x {
  background: none; border: none; cursor: pointer;
  color: var(--ink4); font-size: 14px; line-height: 1; padding: 0 1px;
}
.write-tag-x:hover { color: var(--red); }
.btn-add-tag {
  display: inline-flex; align-items: center; justify-content: space-evenly;
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px dashed var(--ink4); background: none; cursor: pointer;
  color: var(--ink4); font-size: 16px; line-height: 1;
  transition: border-color 0.15s, color 0.15s;
}
.btn-add-tag:hover { border-color: var(--orange); color: var(--orange); }
.btn-attended {
  display: inline-flex; align-items: center; justify-content: space-evenly;
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px dashed var(--ink4); background: none; cursor: pointer;
  color: var(--ink4); transition: border-color 0.15s, color 0.15s, background 0.15s;
  flex-shrink: 0;
}
.btn-attended svg { width: 13px; height: 13px; }
.btn-attended:hover { border-color: var(--ink2); color: var(--ink2); }
.btn-attended.on {
  border-style: solid; border-color: var(--ink2);
  background: var(--ink2); color: var(--paper);
}
.attended-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--paper); border: 1px solid var(--rule);
  border-radius: 20px; padding: 2px 8px 2px 6px;
  font-family: var(--ff-mono); font-size: 11px; color: var(--ink3);
}
.attended-badge svg { width: 11px; height: 11px; flex-shrink: 0; }
/* Tag picker popover */
.tag-picker {
  position: fixed; z-index: 9000; width: 272px;
  background: var(--paper); border: 1px solid var(--rule);
  border-radius: 8px; box-shadow: 0 6px 24px rgba(0,0,0,0.15);
  overflow: hidden;
}
.tag-picker-tabs { display: flex; border-bottom: 1px solid var(--rule); }
.tag-picker-tab {
  flex: 1; display: flex; align-items: center; justify-content: space-evenly;
  gap: 5px; padding: 9px 10px; cursor: pointer;
  font-family: var(--ff-mono); font-size: 11px; font-weight: 600;
  color: var(--ink3); background: var(--paper2); border: none;
  border-bottom: 2px solid transparent; transition: background 0.12s, color 0.12s;
}
.tag-picker-tab.active { background: var(--paper); color: var(--ink); border-bottom-color: var(--orange); }
.tag-picker-body { max-height: 232px; overflow-y: auto; }
.tag-picker-back {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; border-bottom: 1px solid var(--paper3);
  cursor: pointer; font-size: 12px; color: var(--ink3);
  background: none; border-top: none; border-left: none; border-right: none;
  width: 100%; text-align: left; font-family: var(--ff-sans);
}
.tag-picker-back:hover { color: var(--ink); background: var(--paper2); }
.tag-picker-player {
  display: flex; align-items: center; gap: 8px;

}
.tag-picker-player:hover { background: var(--paper2); }
.tp-headshot { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; background: var(--paper3); flex-shrink: 0; }
.tp-name { font-size: 12px; color: var(--ink); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tp-mins { font-family: var(--ff-mono); font-size: 10px; color: var(--ink4); }
.tag-picker-stat {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 14px; cursor: pointer; transition: background 0.1s;
}
.tag-picker-stat:hover { background: var(--paper2); }
.tps-label { font-size: 12px; color: var(--ink2); }
.tps-val { font-family: var(--ff-mono); font-size: 12px; font-weight: 600; color: var(--ink); }
.tag-picker-msg { padding: 20px 12px; text-align: center; font-family: var(--ff-mono); font-size: 11px; color: var(--ink4); }

/* ── Loading / Error ─────────────────────────────────────────── */
.loading-state,.error-state{display:flex;align-items:center;justify-content:center;padding:60px 24px;color:var(--ink4);font-family:var(--ff-mono);font-size:12px;gap:8px;}
.loading-spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--rule);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.live-dot{width:7px;height:7px;border-radius:50%;background:#e74c3c;animation:pulse 1.4s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}

/* ── Nav auth ─────────────────────────────────────────────── */
.nav-auth {
  margin-left: auto;
  display: flex;

  gap: 10px;
  flex-shrink: 0;
}
.nav-auth-avatar {

  border-radius: 50%;

/* ── Mobile ──────────────────────────────────────────────────── */
@media (max-width: 640px) {
  :root { --nav-h: 88px; }

<body>
<nav>
  <a class="nav-wordmark" href="/"><img class="nav-logo" src="/logo.png" alt="">ydk<span>ball</span></a>
  <div class="nav-tabs">
    <a class="nav-tab" href="/">Home</a>
    <a class="nav-tab" href="/reviews">BasketBoxd</a>
    <a class="nav-tab" href="/stats">Stats</a>
  </div>
  <div class="nav-auth" id="nav-auth-slot"></div>
</nav>

<div class="page">
  <div id="game-scoreboard"><div class="loading-state"><span class="loading-spinner"></span>Loading game…</div></div>
  <div class="game-tabs" id="game-tabs" style="display:none;"></div>
  <div id="game-panels"></div>
</div>

<script>
const API = window.location.protocol === 'file:' ? 'http://localhost:5000' : '';
const params = new URLSearchParams(window.location.search);
const GAME_ID = params.get('gameId');
let POLL_TIMER = null;
let ACTIVE_TAB = params.get('tab') || 'pbp';
let BOX_TEAM = 'away';
let BOX_SORT = {key:'pts',dir:-1};
let GAME_DATA = null;
let PBP_ACTIVE_Q = null; // null = follow latest; number = user-selected quarter

// ── Boot ─────────────────────────────────────────────────────────
if (!GAME_ID) { document.getElementById('game-scoreboard').innerHTML = '<div class="error-state">No game ID.</div>'; }
else { loadGame(); }

async function loadGame() {
  try {
    const [boxRes, pbpRes] = await Promise.all([
      fetch(`${API}/api/live/boxscore/${GAME_ID}`),
      fetch(`${API}/api/live/pbp/${GAME_ID}`),
    ]);
    const box = boxRes.ok ? await boxRes.json() : null;
    const pbp = pbpRes.ok ? await pbpRes.json() : null;
    GAME_DATA = {box, pbp};
    render(box, pbp);
    if (box && box.gameStatus === 2) {
      if (POLL_TIMER) clearTimeout(POLL_TIMER);
      POLL_TIMER = setTimeout(loadGame, 15000);
    } else if (POLL_TIMER) {
      clearTimeout(POLL_TIMER); POLL_TIMER = null;
    }
  } catch(e) {
    document.getElementById('game-scoreboard').innerHTML = `<div class="error-state">Failed to load game.</div>`;
  }
}

// ── Main render ───────────────────────────────────────────────────
function render(box, pbp) {
  if (!box && !pbp) { document.getElementById('game-scoreboard').innerHTML = '<div class="error-state">Game data unavailable.</div>'; return; }
  const awayAbbr = box?.awayTeam?.teamTricode || '';
  const homeAbbr = box?.homeTeam?.teamTricode || '';
  if (awayAbbr && homeAbbr) {
    const { awayColor, homeColor } = resolveTeamColors(awayAbbr, homeAbbr);
    document.documentElement.style.setProperty('--away-color', awayColor);
    document.documentElement.style.setProperty('--home-color', homeColor);
  }
  renderScoreboard(box);
  renderTabs(box);
  renderPanels(box, pbp);
}

function renderScoreboard(box) {
  const el = document.getElementById('game-scoreboard');
  if (!box) { el.innerHTML = ''; return; }
  const away = box.awayTeam || {};
  const home = box.homeTeam || {};
  const awayAbbr = away.teamTricode || away.teamAbbreviation || '???';
  const homeAbbr = home.teamTricode || home.teamAbbreviation || '???';
  const awayScore = parseInt(away.score ?? 0);
  const homeScore = parseInt(home.score ?? 0);
  const isLive = box.gameStatus === 2;
  const isUpcoming = box.gameStatus === 1;
  const awayWon = !isLive && !isUpcoming && awayScore > homeScore;
  const homeWon = !isLive && !isUpcoming && homeScore > awayScore;

  let statusHtml;
  if (isLive) {
    const period = box.period || 1;
    const pLabel = period > 4 ? `OT${period-4}` : `Q${period}`;
    const clock = fmtClock(box.gameClock || '');
    statusHtml = `<div class="sb-status live" style="display:flex;align-items:center;gap:5px;"><div class="live-dot"></div>LIVE</div>
      <div class="sb-clock">${pLabel}${clock ? ' · '+clock : ''}</div>`;
  } else if (isUpcoming) {
    statusHtml = `<div class="sb-status">UPCOMING</div><div class="sb-clock">—</div>`;
  } else {
    statusHtml = `<div class="sb-status">FINAL</div><div class="sb-clock">—</div>`;
  }

  // Update page title
  if (!isUpcoming) document.title = `${awayAbbr} ${awayScore} – ${homeScore} ${homeAbbr} — ydkball`;

  const reviewRow = ''; // Reviews moved to tab

  el.innerHTML = `
    <div class="game-sb">
      <div class="sb-team away ${!isUpcoming && !isLive && !awayWon ? 'loser' : ''}">
        ${teamLogo(awayAbbr)}
        <div class="sb-team-info">
          <span class="sb-abbr ${!isUpcoming && !isLive && !awayWon ? 'loser' : ''}">${awayAbbr}</span>
          ${away.wins != null ? `<span class="sb-record">${away.wins}–${away.losses}</span>` : ''}
        </div>
        <span class="sb-score ${isUpcoming ? '' : awayWon ? 'win' : homeWon ? 'loss' : ''}">${isUpcoming ? '' : awayScore}</span>
      </div>
      <div class="sb-center">${statusHtml}</div>
      <div class="sb-team home ${!isUpcoming && !isLive && !homeWon ? 'loser' : ''}">
        <span class="sb-score ${isUpcoming ? '' : homeWon ? 'win' : awayWon ? 'loss' : ''}">${isUpcoming ? '' : homeScore}</span>
        <div class="sb-team-info" style="text-align:right;">
          <span class="sb-abbr ${!isUpcoming && !isLive && !homeWon ? 'loser' : ''}">${homeAbbr}</span>
          ${home.wins != null ? `<span class="sb-record">${home.wins}–${home.losses}</span>` : ''}
        </div>
        ${teamLogo(homeAbbr)}
      </div>
    </div>
  `;

  if (!isLive && !isUpcoming) loadAggRating();
}

function teamLogo(abbr) {
  return `<img class="sb-logo" src="https://cdn.nba.com/logos/nba/${nbaTeamId(abbr)}/global/L/logo.svg"
    alt="${abbr}" onerror="this.outerHTML='<div class=\\'sb-logo-fallback\\'>🏀</div>'">`;
}

function renderTabs(box) {
  const container = document.getElementById('game-tabs');
  const isFinal = box && box.gameStatus === 3;
  const tabs = [
    {id:'pbp', label:'Play-by-Play'},
    {id:'box', label:'Box Score'},
    ...(isFinal ? [{id:'reviews', label:'Reviews'}] : []),
  ];

  // Set default tab from URL param only on first render; preserve user's selection on polls
  if (!ACTIVE_TAB || !tabs.find(t => t.id === ACTIVE_TAB)) {
    const urlTab = new URLSearchParams(window.location.search).get('tab');
    ACTIVE_TAB = (urlTab && tabs.find(t => t.id === urlTab)) ? urlTab : 'pbp';
  }

  container.style.display = '';
  container.innerHTML = tabs.map(t =>
    `<button class="game-tab ${t.id===ACTIVE_TAB ? 'active' : ''}" data-tab="${t.id}">${t.label}</button>`
  ).join('');
  container.querySelectorAll('.game-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      ACTIVE_TAB = btn.dataset.tab;
      container.querySelectorAll('.game-tab').forEach(b => b.classList.toggle('active', b===btn));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id===`panel-${ACTIVE_TAB}`));
      if (ACTIVE_TAB === 'reviews' && !document.getElementById('panel-reviews').dataset.loaded) {
        loadReviewsPanel();
      }
    });
  });
}

function renderPanels(box, pbp) {
  const el = document.getElementById('game-panels');
  const isFinal = box && box.gameStatus === 3;
  el.innerHTML = `
    <div class="tab-panel ${ACTIVE_TAB==='pbp'?'active':''}" id="panel-pbp">${buildPbp(pbp, box)}</div>
    <div class="tab-panel ${ACTIVE_TAB==='box'?'active':''}" id="panel-box">${buildBox(box)}</div>
    ${isFinal ? `<div class="tab-panel ${ACTIVE_TAB==='reviews'?'active':''}" id="panel-reviews"><div class="reviews-panel"><div class="reviews-loading">Loading reviews…</div></div></div>` : ''}
  `;
  if (isFinal && ACTIVE_TAB === 'reviews') loadReviewsPanel();

  // Box score team toggle
  el.querySelectorAll('.box-team-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      BOX_TEAM = btn.dataset.team;
      el.querySelectorAll('.box-team-btn').forEach(b => b.classList.toggle('active', b===btn));
      el.querySelectorAll('.box-team-rows').forEach(r => r.style.display = r.dataset.team===BOX_TEAM ? '' : 'none');
    });
  });

  // PBP quarter tabs
  el.querySelectorAll('.pbp-q-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      PBP_ACTIVE_Q = parseInt(btn.dataset.q);
      el.querySelectorAll('.pbp-q-btn').forEach(b => b.classList.toggle('active', b===btn));
      el.querySelectorAll('.pbp-quarter-panel').forEach(p => p.classList.toggle('active', p.dataset.q===btn.dataset.q));
    });
  });
}

// ── Box Score ─────────────────────────────────────────────────────
function buildBox(box) {
  if (!box || (!box.homeTeam && !box.awayTeam)) return '<div class="loading-state">Box score unavailable.</div>';
  const away = box.awayTeam || {};
  const home = box.homeTeam || {};
  const awayAbbr = away.teamTricode || 'AWY';
  const homeAbbr = home.teamTricode || 'HME';
  const awayPlayers = sortPlayers(away.players || []);
  const homePlayers = sortPlayers(home.players || []);

  const cols = [
    {key:'name',label:'Player',align:'left'},
    {key:'min',label:'MIN'},{key:'pts',label:'PTS'},{key:'reb',label:'REB'},
    {key:'ast',label:'AST'},{key:'stl',label:'STL'},{key:'blk',label:'BLK'},
    {key:'tov',label:'TOV'},{key:'pf',label:'PF'},
    {key:'fg',label:'FG'},{key:'3p',label:'3P'},{key:'ft',label:'FT'},
    {key:'pm',label:'+/-'},
  ];

  const header = `<thead><tr>${cols.map(c => `<th${c.align?` style="text-align:left"`:''} data-key="${c.key}">${c.label}</th>`).join('')}</tr></thead>`;

  function playerRows(players, team) {
    const rows = players.map(p => {
      const s = p.statistics || {};
      const min = fmtMin(s.minutes || '');
      const dnp = min === '0:00' || !min;
      if (dnp) return `<tr class="dnp-row"><td><div class="player-cell">${p.name || ''}</div></td><td colspan="${cols.length-1}" style="color:var(--ink4);font-size:11px;">DNP</td></tr>`;
      const pm = s.plusMinusPoints ?? 0;
      const pmColor = pm > 0 ? 'var(--green)' : pm < 0 ? 'var(--red)' : 'var(--ink3)';
      return `<tr>
        <td><div class="player-cell">
          ${p.personId ? `<img class="player-headshot-sm" src="https://cdn.nba.com/headshots/nba/latest/260x190/${p.personId}.png" onerror="this.style.display='none'">` : ''}
          <span>${p.name || ''}</span>
        </div></td>
        <td>${min}</td>
        <td><b>${s.points||0}</b></td>
        <td>${(s.reboundsTotal||0)}</td>
        <td>${s.assists||0}</td>
        <td>${s.steals||0}</td>
        <td>${s.blocks||0}</td>
        <td>${s.turnovers||0}</td>
        <td>${s.foulsPersonal||0}</td>
        <td>${s.fieldGoalsMade||0}-${s.fieldGoalsAttempted||0}</td>
        <td>${s.threePointersMade||0}-${s.threePointersAttempted||0}</td>
        <td>${s.freeThrowsMade||0}-${s.freeThrowsAttempted||0}</td>
        <td style="color:${pmColor};font-weight:700;">${pm>0?'+':''}${pm}</td>
      </tr>`;
    }).join('');
    return `<tbody class="box-team-rows" data-team="${team}" style="display:${BOX_TEAM===team?'':'none'}">${rows}</tbody>`;
  }

  return `
    <div class="box-team-toggle">
      <button class="box-team-btn ${BOX_TEAM==='away'?'active':''}" data-team="away">${awayAbbr}</button>
      <button class="box-team-btn ${BOX_TEAM==='home'?'active':''}" data-team="home">${homeAbbr}</button>
    </div>
    <div class="box-wrap">
      <table class="box-table">${header}<tbody>${''}</tbody>
        ${playerRows(awayPlayers,'away')}
        ${playerRows(homePlayers,'home')}
      </table>
    </div>`;
}

function sortPlayers(players) {
  return [...players].sort((a,b) => {
    const aMin = parseMinSecs(a.statistics?.minutes||'');
    const bMin = parseMinSecs(b.statistics?.minutes||'');
    return bMin - aMin;
  });
}
function parseMinSecs(s) {
  const m = (s||'').match(/PT(\d+)M([\d.]+)S/);
  if (m) return parseInt(m[1])*60+parseFloat(m[2]);
  if (s.includes(':')) { const p=s.split(':'); return parseInt(p[0])*60+parseInt(p[1]); }
  return 0;
}
function fmtMin(s) {
  const m = (s||'').match(/PT(\d+)M([\d.]+)S/);
  if (m) return `${m[1]}:${String(Math.floor(parseFloat(m[2]))).padStart(2,'0')}`;
  return s||'0:00';
}

// ── Play-by-Play ──────────────────────────────────────────────────
function buildPbp(pbp, box) {
  if (!pbp) return '<div class="loading-state">Play-by-play unavailable.</div>';
  const actions = (pbp.actions || pbp.game?.actions || []);
  if (!actions.length) return '<div class="loading-state">No plays yet.</div>';

  const awayAbbr = box?.awayTeam?.teamTricode || '';
  const homeAbbr = box?.homeTeam?.teamTricode || '';

  // Group by period
  const periods = {};
  const periodOrder = [];
  actions.forEach(a => {
    const p = a.period ?? 1;
    if (!periods[p]) { periods[p] = []; periodOrder.push(p); }
    periods[p].push(a);
  });
  // Deduplicate periods
  const uniqPeriods = [...new Set(periodOrder)];
  const maxPeriod = Math.max(...uniqPeriods);
  // If the user hasn't picked a quarter (or their pick no longer exists), follow the latest
  const activePeriod = (PBP_ACTIVE_Q && uniqPeriods.includes(PBP_ACTIVE_Q)) ? PBP_ACTIVE_Q : maxPeriod;

  const tabHtml = `<div class="pbp-tabs">${uniqPeriods.map(p => {
    const label = p <= 4 ? `Q${p}` : `OT${p-4}`;
    const plays = periods[p];
    const last = [...plays].reverse().find(a => a.scoreHome != null && a.scoreAway != null);
    const score = last ? `${last.scoreAway}–${last.scoreHome}` : '';
    return `<button class="pbp-q-btn ${p===activePeriod?'active':''}" data-q="${p}">${label}${score ? `<br><span style="font-size:9px;opacity:.7">${score}</span>` : ''}</button>`;
  }).join('')}</div>`;

  const panelsHtml = uniqPeriods.map(p => {
    const plays = [...(periods[p]||[])].reverse(); // most recent first
    const rows = plays.map(a => buildPbpRow(a, awayAbbr, homeAbbr)).filter(Boolean).join('');
    return `<div class="pbp-quarter-panel ${p===activePeriod?'active':''}" data-q="${p}">${rows || '<div style="padding:16px;color:var(--ink4);font-size:12px;">No plays.</div>'}</div>`;
  }).join('');

  return tabHtml + panelsHtml;
}

function buildPbpRow(a, awayAbbr, homeAbbr) {
  const type = (a.actionType||'').toLowerCase();
  const desc = a.description || '';
  if (!desc || type === 'period' || type === 'game') {
    return `<div class="pbp-row"><div class="pbp-clock"></div><div class="pbp-score-snap"></div><div class="pbp-desc"><span class="period-marker">${desc}</span></div></div>`;
  }
  const clock = fmtClock(a.clock||'');
  const score = (a.scoreAway != null && a.scoreHome != null) ? `${a.scoreAway}–${a.scoreHome}` : '';

  // Color-code description
  let descHtml = desc;
  if ((type==='2pt'||type==='3pt') && a.shotResult==='Made') descHtml = `<span class="made">${desc}</span>`;
  else if ((type==='2pt'||type==='3pt') && a.shotResult==='Missed') descHtml = `<span class="miss">${desc}</span>`;
  else if (type==='turnover') descHtml = `<span class="tov">${desc}</span>`;

  // Team dot color
  const tc = a.teamTricode || '';
  let dotColor = 'var(--ink4)';
  if (tc === awayAbbr) dotColor = 'var(--away-color)';
  else if (tc === homeAbbr) dotColor = 'var(--home-color)';

  const dot = `<div class="pbp-team-dot" style="background:${dotColor}"></div>`;
  const actor = a.personId
    ? `<img class="pbp-headshot" src="https://cdn.nba.com/headshots/nba/latest/260x190/${a.personId}.png" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'pbp-team-dot',style:'background:${dotColor}'}))">`
    : dot;

  return `<div class="pbp-row">
    <div class="pbp-clock">${clock}</div>
    <div class="pbp-score-snap">${score}</div>
    <div class="pbp-actor">${actor}</div>
    <div class="pbp-desc">${descHtml}</div>
  </div>`;
}

// ── Helpers ───────────────────────────────────────────────────────
function fmtClock(s) {
  if (!s) return '';
  const m = s.match(/PT(\d+)M([\d.]+)S/);
  if (m) return `${m[1]}:${String(Math.floor(parseFloat(m[2]))).padStart(2,'0')}`;
  return s;
}

// Rough NBA team ID lookup for logo CDN
const TEAM_IDS = {
  ATL:1610612737,BOS:1610612738,BKN:1610612751,CHA:1610612766,CHI:1610612741,
  CLE:1610612739,DAL:1610612742,DEN:1610612743,DET:1610612765,GSW:1610612744,
  HOU:1610612745,IND:1610612754,LAC:1610612746,LAL:1610612747,MEM:1610612763,
  MIA:1610612748,MIL:1610612749,MIN:1610612750,NOP:1610612740,NYK:1610612752,
  OKC:1610612760,ORL:1610612753,PHI:1610612755,PHX:1610612756,POR:1610612757,
  SAC:1610612758,SAS:1610612759,TOR:1610612761,UTA:1610612762,WAS:1610612764,
};
function nbaTeamId(abbr) { return TEAM_IDS[abbr] || 0; }
</script>
<script>

function fmtShortDate(str) {
  if (!str) return '';
  const d = new Date(str);
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function starsText(r10, size = 13) {
  const n = r10 / 2;
  let s = '';
  for (let i = 1; i <= 5; i++) {
    const f = Math.min(Math.max(n - (i-1), 0), 1);
    if (f >= 1) {
      s += `<span style="color:${STAR_ON}">★</span>`;
    } else if (f >= 0.5) {
      s += `<span style="background:linear-gradient(to right,${STAR_ON} 50%,${STAR_OFF} 50%);-webkit-background-clip:text;background-clip:text;color:transparent">★</span>`;
    } else {
      s += `<span style="color:${STAR_OFF}">★</span>`;
    }
  }
  return `<span style="font-size:${size}px;letter-spacing:-1px">${s}</span>`;
}

// ── Aggregate rating display in scoreboard header ─────────
async function loadAggRating() { /* no-op: shown in reviews tab */ }

// ── Load the reviews panel ────────────────────────────────
async function loadReviewsPanel(append = false) {
  const panel = document.getElementById('panel-reviews');
  if (!panel) return;
  const container = panel.querySelector('.reviews-panel') || panel;

  if (!append) {
    _reviewOffset = 0;
    _currentTags  = [];
    _attended     = false;
    closeTagPicker();
    container.innerHTML = '<div class="reviews-loading">Loading…</div>';
    panel.dataset.loaded = '1';
  }

  const [gameRes, revRes] = await Promise.all([
    fetch(`/api/games/${GAME_ID}`),
    fetch(`/api/games/${GAME_ID}/reviews?limit=15&offset=${_reviewOffset}&sort=${_reviewSort}`),
  ]);

  const gameData = gameRes.ok ? await gameRes.json() : {};
  const revData  = revRes.ok  ? await revRes.json()  : {};
  const g        = gameData.game || {};
  const reviews  = revData.reviews || [];
  _reviewTotal   = revData.total || 0;
  _reviewOffset  += reviews.length;

  if (!append) {
    container.innerHTML = renderReviewsContent(g, reviews, revData.has_more);
    buildStarPicker();
    wireWriteSection();
  } else {
    // Append new reviews before load-more button
    const list = container.querySelector('.review-list');
    const btn  = container.querySelector('.btn-load-more');
    if (list) reviews.forEach(r => list.insertAdjacentHTML('beforeend', reviewItemHTML(r)));
    if (btn) {
      if (revData.has_more) {
        btn.textContent = `Load more (${_reviewTotal - _reviewOffset} remaining)`;
      } else {
        btn.remove();
      }
    }
  }
}

function renderReviewsContent(g, reviews, hasMore) {
  // Aggregate
  let aggHtml;
  if (g.review_count > 0) {
    const stars = (g.avg_stars || 0).toFixed(2);
    aggHtml = `
      <div class="reviews-agg">
        <span class="reviews-agg-val">${stars}</span>
        <span class="reviews-agg-stars">${starsText(g.avg_stars * 2, 16)}</span>
        <span class="reviews-agg-count">${g.review_count} review${g.review_count !== 1 ? 's' : ''}</span>
      </div>`;
  } else {
    aggHtml = `<div class="reviews-agg"><span class="reviews-agg-empty">No ratings yet — be the first.</span></div>`;
  }

  // Write section
  const writeHtml = _reviewUser
    ? `<div class="reviews-write" id="reviews-write-section">
        <div class="reviews-write-title" id="write-title">Rate This Game</div>
        <div class="star-picker-inline" id="star-picker-inline"></div>
        <textarea class="review-write-textarea" id="review-textarea" placeholder="Write a review (optional)…"></textarea>
        <div class="write-tags-row" id="write-tags-row"></div>
        <div class="reviews-write-actions">
          <button class="btn-review-submit" id="btn-review-submit">Submit</button>
        </div>
      </div>`
    : `<div class="reviews-write">
        <p class="review-signin-prompt">
          <a href="/auth/google/login?next=${encodeURIComponent(window.location.pathname + '?tab=reviews')}">Sign in</a> to rate and review this game.
        </p>
      </div>`;

  // Sort toggle + review list
  const sortHtml = reviews.length > 0 ? `
    <div class="reviews-sort">
      <button class="reviews-sort-btn${_reviewSort === 'likes' ? ' active' : ''}" data-sort="likes">Most Liked</button>
      <button class="reviews-sort-btn${_reviewSort === 'date'  ? ' active' : ''}" data-sort="date">Most Recent</button>
    </div>` : '';
  const listHtml = reviews.length === 0
    ? '<div class="reviews-empty">No reviews yet.</div>'
    : `${sortHtml}<div class="review-list">${reviews.map(reviewItemHTML).join('')}</div>`;

  const loadMoreHtml = hasMore
    ? `<button class="btn-load-more">Load more (${_reviewTotal - _reviewOffset} remaining)</button>`
    : '';

  return `
    <div class="reviews-header">
      ${aggHtml}
    </div>
    ${writeHtml}
    ${listHtml}
    ${loadMoreHtml}
  `;
}

    <path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"/>

      ${(r.tags && r.tags.length) || r.attended ? `<div class="review-tags">
        ${r.attended ? `<span class="attended-badge">${_PERSON_SVG}attended</span>` : ''}
        ${r.tags ? r.tags.map(t => tagPillHTML(t)).join('') : ''}
      </div>` : ''}
      <div class="review-footer">

          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="9" width="14" height="9" rx="1.5"/><path d="M10 1v10M7 4l3-3 3 3"/></svg>

function wireWriteSection() {
  const panel = document.getElementById('panel-reviews');
  if (!panel) return;

  // Load-more
  const loadMoreBtn = panel.querySelector('.btn-load-more');
  if (loadMoreBtn) loadMoreBtn.addEventListener('click', () => loadReviewsPanel(true));

  // Sort toggle
  panel.querySelectorAll('.reviews-sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      _reviewSort = btn.dataset.sort;
      loadReviewsPanel(false);
    });
  });

  // Like + reply buttons — wire once, use event delegation so re-renders stay covered
  if (!_likesWired) {
    _likesWired = true;
    panel.addEventListener('click', async e => {
      // Like
      const likeBtn = e.target.closest('.btn-like');
      if (likeBtn) {
        if (!_reviewUser) {
          window.location.href = `/auth/google/login?next=${encodeURIComponent(window.location.pathname + '?tab=reviews')}`;
          return;
        }
        const reviewId = likeBtn.dataset.reviewId;
        const res = await fetch(`/api/reviews/${reviewId}/like`, { method: 'POST' });
        if (!res.ok) return;
        const data = await res.json();
        likeBtn.classList.toggle('liked', data.liked);
        const svg = likeBtn.querySelector('svg');
        if (svg) svg.setAttribute('fill', data.liked ? 'currentColor' : 'none');
        const countEl = likeBtn.querySelector('.like-count');
        if (countEl) countEl.textContent = data.like_count > 0 ? data.like_count : '';
        return;
      }
      // Toggle reply section
      const replyBtn = e.target.closest('.btn-reply');
      if (replyBtn) {
        toggleReplies(parseInt(replyBtn.dataset.reviewId));
        return;
      }
      // Share screenshot
      const shareBtn = e.target.closest('.btn-share');
      if (shareBtn) {
        const item = shareBtn.closest('.review-item');
        if (item) shareReviewItem(item, shareBtn);
        return;
      }
      // Show more replies
      const showMoreBtn = e.target.closest('.btn-show-more-replies');
      if (showMoreBtn) {
        loadMoreReplies(parseInt(showMoreBtn.dataset.reviewId));
        return;
      }
      // Delete reply
      const delBtn = e.target.closest('.btn-delete-reply');
      if (delBtn) {
        deleteReply(parseInt(delBtn.dataset.reviewId), parseInt(delBtn.dataset.replyId), delBtn.closest('.reply-item'));
        return;
      }
      // Send reply (Enter key is handled separately)
      const sendBtn = e.target.closest('.btn-send-reply');
      if (sendBtn) {
        const section = sendBtn.closest('.reply-section');
        submitReply(parseInt(section.dataset.reviewId), section.querySelector('.reply-input'));
        return;
      }
    });
    // Submit reply on Enter
    panel.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const input = e.target.closest('.reply-input');
      if (!input) return;
      e.preventDefault();
      const section = input.closest('.reply-section');
      submitReply(parseInt(section.dataset.reviewId), input);
    });
  }

  if (!_reviewUser) return;

  // Initial empty tag row
  renderWriteTags();

  // Check if user already reviewed — pre-fill
  fetch(`/api/games/${GAME_ID}/reviews?limit=100`)
    .then(r => r.json())
    .then(data => {
      const existing = (data.reviews || []).find(r => r.user_id === _reviewUser.id);
      if (existing) {
        _pickedRating = existing.rating;
        applyStarColors(_pickedRating);
        const ta = document.getElementById('review-textarea');
        const title = document.getElementById('write-title');
        const btn = document.getElementById('btn-review-submit');
        if (ta) ta.value = existing.review_text || '';
        if (title) title.textContent = 'Your Review';
        if (btn) {
          btn.textContent = 'Update';
          // Add delete button
          const del = document.createElement('button');
          del.className = 'btn-review-delete';
          del.textContent = 'Delete review';
          del.addEventListener('click', deleteReview);
          btn.parentElement.appendChild(del);
        }
        // Pre-fill tags + attended
        if (existing.tags && existing.tags.length) {
          _currentTags = existing.tags.slice();
        }
        _attended = !!existing.attended;
        renderWriteTags();
      }
    }).catch(() => {});

  // Submit
  const submitBtn = document.getElementById('btn-review-submit');
  if (submitBtn) submitBtn.addEventListener('click', submitReview);
}

// ── Star picker ───────────────────────────────────────────
function buildStarPicker() {
  const picker = document.getElementById('star-picker-inline');
  if (!picker || picker.dataset.built) return;

  // 5 SVG stars, each split into left/right halves via dataset
  for (let star = 1; star <= 5; star++) {
    const id  = 'gp' + star;
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 20 20');
    svg.dataset.star = star;
    svg.innerHTML = `
      <defs>
        <linearGradient id="${id}" x1="0" x2="1" y1="0" y2="0">
          <stop class="sl" offset="50%" stop-color="${STAR_OFF}"/>
          <stop class="sr" offset="50%" stop-color="${STAR_OFF}"/>
        </linearGradient>
      </defs>
      <polygon points="10,2 12.4,7.8 18.5,8.2 14,12.2 15.5,18 10,14.8 4.5,18 6,12.2 1.5,8.2 7.6,7.8"
               fill="url(#${id})"/>`;
    picker.appendChild(svg);
  }

  picker.addEventListener('mousemove', e => {
    const svg = e.target.closest('svg[data-star]');
    if (!svg) return;
    const rect  = svg.getBoundingClientRect();
    const isLeft = (e.clientX - rect.left) < rect.width / 2;
    const star  = parseInt(svg.dataset.star);
    _applyPickerColors(isLeft ? star * 2 - 1 : star * 2);
  });
  picker.addEventListener('mouseleave', () => _applyPickerColors(_pickedRating));
  picker.addEventListener('click', e => {
    const svg = e.target.closest('svg[data-star]');
    if (!svg) return;
    const rect  = svg.getBoundingClientRect();
    const isLeft = (e.clientX - rect.left) < rect.width / 2;
    const star  = parseInt(svg.dataset.star);
    _pickedRating = isLeft ? star * 2 - 1 : star * 2;
    _applyPickerColors(_pickedRating);
  });
  picker.dataset.built = '1';
  _applyPickerColors(_pickedRating);
}

function _applyPickerColors(rating) {
  const picker = document.getElementById('star-picker-inline');
  if (!picker) return;
  picker.querySelectorAll('svg[data-star]').forEach(svg => {
    const star = parseInt(svg.dataset.star);
    const lv = star * 2 - 1, rv = star * 2;
    svg.querySelector('.sl').setAttribute('stop-color', rating >= lv ? STAR_ON : STAR_OFF);
    svg.querySelector('.sr').setAttribute('stop-color', rating >= rv ? STAR_ON : STAR_OFF);
  });
}

function applyStarColors(rating) { _applyPickerColors(rating); }

// ── Submit / Delete ───────────────────────────────────────
async function submitReview() {
  if (!_pickedRating) { showReviewToast('Pick a star rating first.'); return; }
  const btn  = document.getElementById('btn-review-submit');
  const text = document.getElementById('review-textarea')?.value.trim() || null;
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const r = await fetch(`/api/games/${GAME_ID}/reviews`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({rating: _pickedRating, review_text: text, tags: _currentTags, attended: _attended}),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    showReviewToast('Review saved!');
    _reviewOffset = 0; _pickedRating = 0;
    loadReviewsPanel(false);
  } catch(e) {
    showReviewToast('Error: ' + e.message);
    btn.disabled = false; btn.textContent = 'Submit';
  }
}

// ── Reply helpers ──────────────────────────────────────────
function _replyAvatarEl(name, avatarUrl) {
  const initials = name ? name[0].toUpperCase() : '?';
  const img = avatarUrl
    ? `<img src="${avatarUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover" onerror="this.style.display='none'">`
    : '';
  return `<div class="reply-avatar">${img || initials}</div>`;
}

function _replyItemHTML(reply, reviewId, currentUserId) {
  const isOwn = currentUserId && reply.user_id === currentUserId;
  const delBtn = isOwn
    ? `<button class="btn-delete-reply" data-review-id="${reviewId}" data-reply-id="${reply.id}" title="Delete">×</button>`
    : '';
  return `<div class="reply-item" data-reply-id="${reply.id}">
    ${_replyAvatarEl(reply.display_name, reply.avatar_url)}
    <div class="reply-body">
      <div class="reply-meta">
        <a href="/profile/${reply.user_id}" class="reply-name" onclick="event.stopPropagation()">${reply.display_name}</a>
        <span class="reply-date">${fmtShortDate(reply.created_at)}</span>
        ${delBtn}
      </div>
      <p class="reply-text">${reply.reply_text}</p>
    </div>
  </div>`;
}

function _renderReplySection(section, replies, total) {
  const reviewId = parseInt(section.dataset.reviewId);
  const offset   = parseInt(section.dataset.offset || 0);
  const remaining = total - offset;
  const uid = _reviewUser ? _reviewUser.id : null;

  const threadHtml = replies.map(r => _replyItemHTML(r, reviewId, uid)).join('');
  const showMore = remaining > 0
    ? `<button class="btn-show-more-replies" data-review-id="${reviewId}">Show ${remaining} more repl${remaining === 1 ? 'y' : 'ies'}</button>`
    : '';
  const form = _reviewUser
    ? `<div class="reply-form">
         <input class="reply-input" type="text" placeholder="Write a reply…" maxlength="1000">
         <button class="btn-send-reply">Post</button>
       </div>`
    : `<div class="reply-sign-in"><a href="/auth/google/login?next=${encodeURIComponent(window.location.pathname + window.location.search)}" style="color:var(--orange)">Sign in</a> to reply</div>`;

  section.innerHTML = `<div class="reply-thread" id="reply-thread-${reviewId}">${threadHtml}</div>${showMore}${form}`;
}

async function toggleReplies(reviewId) {
  const section = document.getElementById(`reply-section-${reviewId}`);
  if (!section) return;
  if (section.classList.contains('open')) {
    section.classList.remove('open');
    return;
  }
  section.classList.add('open');
  if (section.dataset.loaded === '1') return;
  section.innerHTML = '<div class="reply-loading">Loading…</div>';
  try {
    const data = await fetch(`${API}/api/reviews/${reviewId}/replies?limit=3&offset=0`).then(r => r.json());
    const replies = data.replies || [];
    section.dataset.loaded  = '1';
    section.dataset.total   = data.total || 0;
    section.dataset.offset  = replies.length;
    _renderReplySection(section, replies, data.total || 0);
  } catch { section.innerHTML = '<div class="reply-loading">Could not load replies.</div>'; }
}

async function loadMoreReplies(reviewId) {
  const section = document.getElementById(`reply-section-${reviewId}`);
  if (!section) return;
  const offset = parseInt(section.dataset.offset || 0);
  const data = await fetch(`${API}/api/reviews/${reviewId}/replies?limit=10&offset=${offset}`).then(r => r.json());
  const replies = data.replies || [];
  const newOffset = offset + replies.length;
  section.dataset.offset = newOffset;
  section.dataset.total  = data.total || 0;
  const thread = section.querySelector(`#reply-thread-${reviewId}`);
  const uid = _reviewUser ? _reviewUser.id : null;
  replies.forEach(r => thread.insertAdjacentHTML('beforeend', _replyItemHTML(r, reviewId, uid)));
  const btn = section.querySelector('.btn-show-more-replies');
  const remaining = (data.total || 0) - newOffset;
  if (remaining > 0) {
    if (btn) btn.textContent = `Show ${remaining} more repl${remaining === 1 ? 'y' : 'ies'}`;
  } else {
    if (btn) btn.remove();
  }
}

async function submitReply(reviewId, inputEl) {
  if (!inputEl) return;
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.disabled = true;
  try {
    const res = await fetch(`${API}/api/reviews/${reviewId}/replies`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reply_text: text }),
    });
    if (!res.ok) { inputEl.disabled = false; return; }
    const reply = await res.json();
    if (!reply.avatar_url && _reviewUser) reply.avatar_url = _reviewUser.avatar_url;
    const section = document.getElementById(`reply-section-${reviewId}`);
    const thread  = section.querySelector(`#reply-thread-${reviewId}`);
    const uid = _reviewUser ? _reviewUser.id : null;
    thread.insertAdjacentHTML('beforeend', _replyItemHTML(reply, reviewId, uid));
    section.dataset.offset = parseInt(section.dataset.offset || 0) + 1;
    section.dataset.total  = parseInt(section.dataset.total  || 0) + 1;
    inputEl.value = '';
    inputEl.disabled = false;
    inputEl.focus();
  } catch { inputEl.disabled = false; }
}

async function deleteReply(reviewId, replyId, itemEl) {
  if (!itemEl) return;
  const res = await fetch(`${API}/api/reviews/${reviewId}/replies/${replyId}`, { method: 'DELETE' });
  if (!res.ok) return;
  itemEl.remove();
  const section = document.getElementById(`reply-section-${reviewId}`);
  if (section) {
    section.dataset.offset = Math.max(0, parseInt(section.dataset.offset || 0) - 1);
    section.dataset.total  = Math.max(0, parseInt(section.dataset.total  || 0) - 1);
  }
}

async function deleteReview() {
  if (!confirm('Delete your review?')) return;
  try {
    const r = await fetch(`/api/games/${GAME_ID}/reviews`, {method:'DELETE'});
    if (!r.ok) throw new Error((await r.json()).error);
    showReviewToast('Review deleted.');
    _reviewOffset = 0; _pickedRating = 0;
    loadReviewsPanel(false);
  } catch(e) { showReviewToast('Error: ' + e.message); }
}

function showReviewToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#0c0c0d;color:#fff;font-size:13px;padding:9px 16px;border-radius:4px;z-index:9999;font-family:var(--ff-sans);animation:fadeUp 0.2s ease';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

// ── Stat tag system ────────────────────────────────────────
const STAT_OPTS = [
  { key: 'points',            label: 'PTS', fmt: s => s.points },
  { key: 'reboundsTotal',     label: 'REB', fmt: s => s.reboundsTotal },
  { key: 'assists',           label: 'AST', fmt: s => s.assists },
  { key: 'steals',            label: 'STL', fmt: s => s.steals },
  { key: 'blocks',            label: 'BLK', fmt: s => s.blocks },
  { key: 'turnovers',         label: 'TOV', fmt: s => s.turnovers },
  { key: 'threePointersMade', label: '3PM', fmt: s => `${s.threePointersMade}/${s.threePointersAttempted}` },
  { key: 'fieldGoalsMade',    label: 'FG',  fmt: s => `${s.fieldGoalsMade}/${s.fieldGoalsAttempted}` },
  { key: 'freeThrowsMade',    label: 'FT',  fmt: s => `${s.freeThrowsMade}/${s.freeThrowsAttempted}` },
  { key: 'plusMinusPoints',   label: '+/-', fmt: s => { const v = +s.plusMinusPoints; return v >= 0 ? `+${v}` : `${v}`; } },
];

function _esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function _headshotUrl(pid) { return `https://cdn.nba.com/headshots/nba/latest/260x190/${pid}.png`; }
function _teamLogoUrl(abbr) {
  const id = TEAM_IDS[abbr];
  return id ? `https://cdn.nba.com/logos/nba/${id}/global/L/logo.svg` : '';
}
function _parseMins(str) {
  const m = String(str || '').match(/PT(\d+)M/);
  return m ? parseInt(m[1]) : 0;
}

const _PERSON_SVG = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="10" cy="6.5" r="3"/>
  <path d="M3 18c0-3.866 3.134-7 7-7s7 3.134 7 7"/>
</svg>`;

function tagPillHTML(t) {
  return `<span class="review-tag">
    <img class="tag-headshot" src="${_headshotUrl(t.player_id)}" onerror="this.style.display='none'" alt="">
    <span class="tag-val">${_esc(t.stat_display)}</span>
    <span class="tag-lbl">${_esc(t.stat_label)}</span>
  </span>`;
}

function renderWriteTags() {
  const row = document.getElementById('write-tags-row');
  if (!row) return;
  let html = _currentTags.map((t, i) => `
    <span class="write-tag">
      <img class="tag-headshot" src="${_headshotUrl(t.player_id)}" onerror="this.style.display='none'" alt="">
      <span class="tag-val">${_esc(t.stat_display)}</span>
      <span class="tag-lbl">${_esc(t.stat_label)}</span>
      <button class="write-tag-x" data-tag-idx="${i}" title="Remove">×</button>
    </span>`).join('');
  if (_currentTags.length < 5) {
    html += `<button class="btn-add-tag" id="btn-add-tag" title="Add a stat context tag">+</button>`;
  }
  html += `<button class="btn-attended${_attended ? ' on' : ''}" id="btn-attended" title="${_attended ? 'Remove — I was there' : 'I was at this game'}">${_PERSON_SVG}</button>`;
  row.innerHTML = html;
  const addBtn = document.getElementById('btn-add-tag');
  if (addBtn) addBtn.addEventListener('click', e => { e.stopPropagation(); openTagPicker(addBtn); });
  document.getElementById('btn-attended').addEventListener('click', e => {
    e.stopPropagation();
    _attended = !_attended;
    renderWriteTags();
  });
  row.querySelectorAll('.write-tag-x').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      _currentTags.splice(parseInt(btn.dataset.tagIdx), 1);
      renderWriteTags();
    });
  });
}

function closeTagPicker() {
  if (_pickerEl) { _pickerEl.remove(); _pickerEl = null; }
  document.removeEventListener('click', _pickerOutsideClick, true);
}

function _pickerOutsideClick(e) {
  if (_pickerEl && !_pickerEl.contains(e.target)) {
    const addBtn = document.getElementById('btn-add-tag');
    if (addBtn && addBtn.contains(e.target)) return;
    closeTagPicker();
  }
}

function _positionPicker(anchor) {
  if (!_pickerEl || !anchor) return;
  const rect = anchor.getBoundingClientRect();
  let top = rect.bottom + 6, left = rect.left;
  if (left + 272 > window.innerWidth - 8) left = window.innerWidth - 272 - 8;
  if (left < 8) left = 8;
  if (top + 290 > window.innerHeight - 8) top = rect.top - 290 - 6;
  _pickerEl.style.top = top + 'px';
  _pickerEl.style.left = left + 'px';
}

async function openTagPicker(anchor) {
  closeTagPicker();
  _pickerEl = document.createElement('div');
  _pickerEl.className = 'tag-picker';
  _pickerEl.innerHTML = `<div class="tag-picker-msg">Loading…</div>`;
  document.body.appendChild(_pickerEl);
  _positionPicker(anchor);
  setTimeout(() => document.addEventListener('click', _pickerOutsideClick, true), 10);

  if (!_boxscoreData) {
    const res = await fetch(`/api/live/boxscore/${GAME_ID}`);
    if (res.ok) _boxscoreData = await res.json();
  }
  if (!_boxscoreData) {
    _pickerEl.innerHTML = `<div class="tag-picker-msg">Could not load boxscore.</div>`;
    return;
  }
  if (!_pickerActiveTeam) _pickerActiveTeam = _boxscoreData.awayTeam?.teamTricode;
  _pickerSelectedPlayer = null;
  _pickerEl.addEventListener('click', _pickerClick);
  _renderPickerContent();
}

function _pickerClick(e) {
  const tab = e.target.closest('.tag-picker-tab');
  if (tab) { _pickerActiveTeam = tab.dataset.team; _pickerSelectedPlayer = null; _renderPickerContent(); return; }
  const back = e.target.closest('.tag-picker-back');
  if (back) { _pickerSelectedPlayer = null; _renderPickerContent(); return; }
  const playerRow = e.target.closest('.tag-picker-player');
  if (playerRow) { _pickerSelectedPlayer = _pickerPlayers[parseInt(playerRow.dataset.idx)]; _renderPickerContent(); return; }
  const statRow = e.target.closest('.tag-picker-stat');
  if (statRow) { _confirmStatTag(parseInt(statRow.dataset.idx)); return; }
}

function _renderPickerContent() {
  if (!_pickerEl || !_boxscoreData) return;
  const away = _boxscoreData.awayTeam, home = _boxscoreData.homeTeam;
  const isAway = _pickerActiveTeam === away.teamTricode;
  const activeTeam = isAway ? away : home;

  const tabsHtml = `<div class="tag-picker-tabs">
    <button class="tag-picker-tab${isAway?' active':''}" data-team="${_esc(away.teamTricode)}">
      <img src="${_teamLogoUrl(away.teamTricode)}" width="16" height="16" style="object-fit:contain" onerror="this.style.display='none'"> ${_esc(away.teamTricode)}
    </button>
    <button class="tag-picker-tab${!isAway?' active':''}" data-team="${_esc(home.teamTricode)}">
      <img src="${_teamLogoUrl(home.teamTricode)}" width="16" height="16" style="object-fit:contain" onerror="this.style.display='none'"> ${_esc(home.teamTricode)}
    </button>
  </div>`;

  if (_pickerSelectedPlayer) {
    const p = _pickerSelectedPlayer, s = p.statistics || {};
    _pickerStats = STAT_OPTS.map(opt => {
      let val; try { val = String(opt.fmt(s)); } catch { val = '—'; }
      return { ...opt, display: val };
    });
    const statsHtml = _pickerStats.map((opt, i) =>
      `<div class="tag-picker-stat" data-idx="${i}">
        <span class="tps-label">${_esc(opt.label)}</span>
        <span class="tps-val">${_esc(opt.display)}</span>
      </div>`).join('');
    _pickerEl.innerHTML = `${tabsHtml}
      <div class="tag-picker-body">
        <button class="tag-picker-back">← ${_esc(p.name)}</button>
        ${statsHtml}
      </div>`;
  } else {
    _pickerPlayers = (activeTeam.players || []).filter(p => _parseMins(p.statistics?.minutes) >= 1);
    const playersHtml = _pickerPlayers.length
      ? _pickerPlayers.map((p, i) =>
          `<div class="tag-picker-player" data-idx="${i}">
            <img class="tp-headshot" src="${_headshotUrl(p.personId)}" onerror="this.src=''" alt="">
            <span class="tp-name">${_esc(p.name)}</span>
            <span class="tp-mins">${_parseMins(p.statistics?.minutes)}m</span>
          </div>`).join('')
      : `<div class="tag-picker-msg">No players found.</div>`;
    _pickerEl.innerHTML = `${tabsHtml}<div class="tag-picker-body">${playersHtml}</div>`;
  }
  _pickerEl.addEventListener('click', _pickerClick);
}

function _confirmStatTag(idx) {
  const opt = _pickerStats[idx], player = _pickerSelectedPlayer;
  if (!opt || !player) return;
  if (_currentTags.length >= 5) { showReviewToast('Max 5 tags per review.'); closeTagPicker(); return; }
  const dup = _currentTags.find(t => t.player_id === String(player.personId) && t.stat_label === opt.label);
  if (!dup) {
    _currentTags.push({
      player_id:    String(player.personId),
      player_name:  player.name,
      team_abbr:    _pickerActiveTeam,
      stat_label:   opt.label,
      stat_display: opt.display,
    });
  }
  renderWriteTags();
  closeTagPicker();
}

// ── Nav auth ──────────────────────────────────────────────
async function initNavAuth() {
  const slot = document.getElementById('nav-auth-slot');
  if (!slot) return;
  try {
    const res  = await fetch('/auth/me');
    const data = await res.json();
    const user = data.user;
    _reviewUser = user || null;
    if (user) {
      slot.innerHTML = `
        <a href="/profile" style="text-decoration:none;cursor:pointer">${user.avatar_url ? `<img class="nav-auth-avatar" src="${user.avatar_url}" alt="">` : ''}</a>
        <button class="nav-signout-btn" onclick="navSignOut()">Sign out</button>
      `;
      if (typeof user.night_mode !== 'undefined') {
        const enabled = !!user.night_mode;
        localStorage.setItem('ydkball_night', enabled ? '1' : '0');
        document.documentElement.classList.toggle('night-mode', enabled);
      }
    } else {
      slot.innerHTML = `<a class="nav-signin-btn" href="/auth/google/login?next=${encodeURIComponent(window.location.pathname)}">Sign in</a>`;
    }
  } catch {
    slot.innerHTML = `<a class="nav-signin-btn" href="/auth/google/login">Sign in</a>`;
  }
}
function navSignOut() {
  window.location.href = '/auth/logout?next=' + encodeURIComponent(window.location.pathname);
}
initNavAuth();

// ── Share helpers ─────────────────────────────────────────────
async function preloadImages(el) {
  await Promise.all([...el.querySelectorAll('img')].map(async img => {
    try {
      const r = await fetch(img.src, { mode: 'cors', cache: 'no-store' });
      if (r.ok) img.src = URL.createObjectURL(await r.blob());
    } catch {}
  }));
}

// ── Share (screenshot to clipboard) ──────────────────────────
async function shareReviewItem(item, btn) {
  const isDark = document.documentElement.classList.contains('night-mode');
  const bgColor = isDark ? '#222228' : '#F5F0E8';

  const wrapper = document.createElement('div');
  Object.assign(wrapper.style, {
    position: 'fixed', top: '-9999px', left: '-9999px',
    width: item.offsetWidth + 'px',
    background: bgColor,
    padding: '20px',
    borderRadius: '12px',
    boxSizing: 'border-box',
    fontFamily: 'Instrument Sans, sans-serif',
  });

  const clone = item.cloneNode(true);
  clone.style.cssText = '';
  const footer = clone.querySelector('.review-footer');
  if (footer) footer.remove();
  wrapper.appendChild(clone);

  const brand = document.createElement('div');
  Object.assign(brand.style, {
    marginTop: '14px', fontSize: '11px', color: isDark ? '#888' : '#aaa',
    textAlign: 'right', fontFamily: 'DM Mono, monospace',
  });
  brand.textContent = 'ydkball.net';
  wrapper.appendChild(brand);

  document.body.appendChild(wrapper);

  const origHTML = btn.innerHTML;
  btn.textContent = '…';
  btn.disabled = true;

  try {
    await preloadImages(wrapper);
    const canvas = await html2canvas(wrapper, {
      useCORS: true,
      scale: 2,
      backgroundColor: bgColor,
    });
    document.body.removeChild(wrapper);
    canvas.toBlob(async blob => {
      try {
        const file = new File([blob], 'review.png', { type: 'image/png' });
        if (navigator.canShare?.({ files: [file] })) {
          await navigator.share({ files: [file] });
        } else {
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        }
        btn.classList.add('copied');
        btn.innerHTML = `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 10l4 4 8-8"/></svg>`;
        setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = origHTML; btn.disabled = false; }, 2000);
      } catch (err) {
        if (err.name !== 'AbortError') window.open(canvas.toDataURL(), '_blank');
        btn.innerHTML = origHTML;
        btn.disabled = false;
      }
    });
  } catch {
    if (document.body.contains(wrapper)) document.body.removeChild(wrapper);
    btn.innerHTML = origHTML;
    btn.disabled = false;
  }
}
</script>
