<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:       #0c0c0d;
  --ink2:      #2a2a2e;
  --ink3:      #6b6b78;
  --ink4:      #a8a8b3;
  --paper:     #F5F0E8;
  --paper2:    #eeecea;
  --paper3:    #e5e2dc;
  --rule:      #d8d5cf;
  --orange:    #e8530a;
  --orange-lt: #fff0ea;
  --green:     #1a7a4a;
  --green-lt:  #e8f5ee;
  --red:       #c0392b;

  --ff-serif: 'DM Serif Display', Georgia, serif;
  --ff-sans:  'Instrument Sans', system-ui, sans-serif;
  --ff-mono:  'DM Mono', 'Courier New', monospace;
  --nav-h: 56px;
  font-size: 15px;
}

html { scroll-behavior: smooth; overflow-x: clip; }
body {
  font-family: var(--ff-sans);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Nav ── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h); background: var(--paper);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center;
  padding: 0 24px; gap: 32px; z-index: 100;
}
.nav-wordmark {
  font-family: var(--ff-serif); font-size: 20px;
  color: var(--ink); letter-spacing: -0.01em;
  text-decoration: none; flex-shrink: 0;
  display: flex; align-items: center; gap: 0;
}
.nav-logo { height: 26px; width: auto; margin-right: 8px; }
.nav-wordmark span { color: var(--orange); }
.nav-tabs { display: flex; gap: 2px; flex: 1 1 0; min-width: 0; overflow: hidden; }
.nav-tab {
  font-family: var(--ff-mono); font-size: 11px; font-weight: 400;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3);
  background: none; border: none; padding: 6px 14px; cursor: pointer;
  border-radius: 4px; transition: color 0.15s, background 0.15s;
  text-decoration: none; display: inline-block;
}
.nav-tab:hover { color: var(--ink); background: var(--paper2); }
.nav-tab.active { color: var(--ink); background: var(--paper3); }
.nav-auth { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.nav-auth-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--rule); }
.nav-auth-name { font-family: var(--ff-mono); font-size: 11px; color: var(--ink3); }
.nav-signin-btn { font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 12px; background: var(--orange); color: #fff; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; transition: opacity 0.15s; }
.nav-signin-btn:hover { opacity: 0.85; }
.nav-signout-btn { font-family: var(--ff-mono); font-size: 10px; color: var(--ink3); background: none; border: none; cursor: pointer; padding: 4px 6px; }

/* ── Page ── */
.page {
  padding-top: calc(var(--nav-h) + 40px);
  max-width: 860px; margin: 0 auto;
  padding-left: 24px; padding-right: 24px;
  padding-bottom: 80px;
}

.page-header {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; margin-bottom: 32px; text-align: center;
}
.page-title { font-family: var(--ff-serif); font-size: 32px; letter-spacing: -0.02em; }
.page-subtitle { font-family: var(--ff-mono); font-size: 11px; color: var(--ink3); letter-spacing: 0.04em; }

/* ── Controls bar ── */
.controls-bar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 28px; flex-wrap: wrap; justify-content: center;
}
.season-select {
  font-family: var(--ff-mono); font-size: 11px; color: var(--ink2);
  background: var(--paper2); border: 1px solid var(--rule);
  border-radius: 4px; padding: 6px 10px; cursor: pointer; outline: none;
}
.season-select:focus { border-color: var(--orange); }

/* ── Player pickers ── */
.pickers {
  display: grid; grid-template-columns: 1fr auto 1fr;
  gap: 16px; align-items: start; margin-bottom: 28px;
}
.vs-divider {
  font-family: var(--ff-serif); font-size: 22px; color: var(--ink4);
  display: flex; align-items: center; padding-top: 8px;
}

.picker-wrap { position: relative; }
.picker-label {
  font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--ink4); margin-bottom: 6px;
}
.picker-search {
  width: 100%; font-family: var(--ff-sans); font-size: 13px;
  background: var(--paper2); border: 1px solid var(--rule);
  border-radius: 6px; padding: 9px 12px; color: var(--ink);
  outline: none; transition: border-color 0.15s;
}
.picker-search:focus { border-color: var(--orange); }
.picker-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--paper); border: 1px solid var(--rule);
  border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,.10);
  max-height: 260px; overflow-y: auto; z-index: 50; display: none;
}
.picker-dropdown.open { display: block; }
.picker-option {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; cursor: pointer; transition: background 0.1s;
}
.picker-option:hover, .picker-option.focused { background: var(--paper2); }
.picker-headshot {
  width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
  object-position: top; background: var(--paper3); flex-shrink: 0;
  border: 1px solid var(--rule);
}
.picker-option-name { font-family: var(--ff-sans); font-size: 13px; color: var(--ink); flex: 1; }
.picker-option-meta { font-family: var(--ff-mono); font-size: 10px; color: var(--ink4); }

/* Selected player card */
.player-card {
  display: none; align-items: center; gap: 14px;
  padding: 14px; background: var(--paper2);
  border: 1px solid var(--rule); border-radius: 8px; margin-top: 8px;
}
.player-card.visible { display: flex; }
.player-card-headshot {
  width: 56px; height: 56px; border-radius: 50%; object-fit: cover;
  object-position: top; background: var(--paper3); flex-shrink: 0;
  border: 2px solid var(--rule);
}
.player-card-name { font-family: var(--ff-serif); font-size: 16px; color: var(--ink); line-height: 1.2; }
.player-card-meta { font-family: var(--ff-mono); font-size: 10px; color: var(--ink3); margin-top: 3px; letter-spacing: 0.04em; }
.player-card-clear {
  margin-left: auto; background: none; border: none; cursor: pointer;
  font-size: 18px; color: var(--ink4); padding: 4px 6px;
  border-radius: 4px; line-height: 1; transition: color 0.1s, background 0.1s;
}
.player-card-clear:hover { color: var(--ink); background: var(--paper3); }

/* ── Stat group tabs ── */
.group-tabs {
  display: flex; gap: 4px; flex-wrap: wrap;
  margin-bottom: 4px; justify-content: center;
}
.group-tab {
  font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--ink3);
  background: none; border: 1px solid transparent;
  border-radius: 4px; padding: 5px 12px; cursor: pointer;
  transition: all 0.15s;
}
.group-tab:hover { color: var(--ink); background: var(--paper2); }
.group-tab.active { color: var(--ink); background: var(--paper3); border-color: var(--rule); }

/* ── Custom stat picker ── */
.custom-panel {
  display: none; background: var(--paper2); border: 1px solid var(--rule);
  border-radius: 8px; padding: 16px; margin-bottom: 16px;
}
.custom-panel.visible { display: block; }
.custom-search-input {
  width: 100%; font-family: var(--ff-sans); font-size: 12px;
  background: var(--paper); border: 1px solid var(--rule);
  border-radius: 4px; padding: 7px 10px; color: var(--ink);
  outline: none; margin-bottom: 10px;
}
.custom-search-input:focus { border-color: var(--orange); }
.custom-chips { display: flex; flex-wrap: wrap; gap: 4px; min-height: 24px; margin-bottom: 10px; }
.custom-chip {
  font-family: var(--ff-mono); font-size: 10px; background: var(--ink); color: var(--paper);
  padding: 3px 8px 3px 10px; border-radius: 12px; display: flex; align-items: center;
  gap: 4px; cursor: pointer;
}
.custom-chip:hover { background: var(--orange); }
.custom-chip-x { opacity: 0.6; font-size: 11px; }
.custom-stat-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 2px;
  max-height: 200px; overflow-y: auto;
}
.custom-stat-item {
  font-family: var(--ff-sans); font-size: 12px; color: var(--ink2);
  padding: 5px 8px; border-radius: 4px; cursor: pointer;
  transition: background 0.1s;
}
.custom-stat-item:hover { background: var(--paper3); }
.custom-stat-item.selected { background: var(--orange-lt); color: var(--orange); }

/* ── Comparison table ── */
.compare-empty {
  text-align: center; padding: 64px 24px;
  font-family: var(--ff-mono); font-size: 12px; color: var(--ink4);
}
.compare-empty-icon { font-size: 40px; opacity: 0.3; margin-bottom: 12px; }

.compare-table-wrap { margin-top: 16px; }
.compare-header {
  display: grid; grid-template-columns: 1fr 160px 1fr;
  gap: 0; align-items: center;
  padding: 12px 0 12px; border-bottom: 2px solid var(--rule);
  margin-bottom: 4px;
}
.compare-header-player {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--ff-serif); font-size: 18px;
}
.compare-header-player.right { justify-content: flex-end; flex-direction: row-reverse; }
.compare-header-headshot {
  width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
  object-position: top; background: var(--paper3);
  border: 2px solid var(--rule); flex-shrink: 0;
}
.compare-header-name { line-height: 1.2; }
.compare-header-meta { font-family: var(--ff-mono); font-size: 10px; color: var(--ink3); margin-top: 2px; letter-spacing: 0.04em; }
.compare-header-center {
  text-align: center; font-family: var(--ff-mono); font-size: 9px;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink4);
}

.compare-row {
  display: grid; grid-template-columns: 1fr 160px 1fr;
  align-items: center; border-bottom: 1px solid var(--paper3);
  min-height: 44px;
}
.compare-row:last-child { border-bottom: none; }
.compare-row:hover { background: var(--paper2); }

.compare-cell {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 0;
}
.compare-cell.right { justify-content: flex-end; flex-direction: row-reverse; }

.compare-val {
  font-family: var(--ff-mono); font-size: 15px; color: var(--ink2);
  min-width: 50px; text-align: center;
}
.compare-cell.right .compare-val { text-align: center; }

.compare-badge {
  font-family: var(--ff-mono); font-size: 11px; font-weight: 500;
  padding: 3px 8px; border-radius: 12px; white-space: nowrap;
  opacity: 0; transition: opacity 0.2s;
}
.compare-badge.win { background: var(--green-lt); color: var(--green); opacity: 1; }
.compare-badge.big-win { background: var(--green); color: #fff; opacity: 1; }

.compare-stat-label {
  text-align: center; padding: 8px 4px;
  font-family: var(--ff-mono); font-size: 11px;
  color: var(--ink3); letter-spacing: 0.04em;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink4); }

@media (max-width: 600px) {
  .pickers { grid-template-columns: 1fr; }
  .vs-divider { display: none; }
  .compare-header, .compare-row { grid-template-columns: 1fr 120px 1fr; }
  .compare-val { font-size: 13px; min-width: 36px; }
  .compare-badge { font-size: 10px; padding: 2px 6px; }
  :root { --nav-h: 88px; }
  nav { height: auto; padding: 0 16px; flex-wrap: wrap; gap: 0; align-items: center; }
  .nav-wordmark { padding: 13px 0; }
  .nav-auth { padding: 13px 0; }
  .nav-tabs {
    order: 10; flex: 0 0 100%; overflow-x: auto; scrollbar-width: none;
    flex-wrap: nowrap; border-top: 1px solid var(--rule);
    padding: 7px 0 9px; gap: 0;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab { white-space: nowrap; padding: 5px 12px; }
}
</style>
</head>

// ── Format helpers ───────────────────────────────────────────────
function fmt(val, format) {
  if (val === null || val === undefined) return '—';
  switch (format) {
    case '1f':  return (+val).toFixed(1);
    case '2f':  return (+val).toFixed(2);
    case 'pct': return ((+val) * 100).toFixed(1) + '%';
    case 'pm':  return (val >= 0 ? '+' : '') + (+val).toFixed(1);
    case 'int': return Math.round(val).toString();
    default:    return String(val);
  }
}

function fmtDiff(diff, format, invert) {
  const better = invert ? diff < 0 : diff > 0;
  if (!better) return '';
  const abs = Math.abs(diff);
  let str;
  switch (format) {
    case 'pct': str = '+' + (abs * 100).toFixed(1) + '%'; break;
    case '2f':  str = '+' + abs.toFixed(2); break;
    case 'int': str = '+' + Math.round(abs); break;
    case 'pm':  str = '+' + abs.toFixed(1); break;
    default:    str = '+' + abs.toFixed(1);
  }
  return str;
}

  container.innerHTML = filtered.map(s => `

      renderCustomStatGrid(document.getElementById('custom-search').value.toLowerCase().trim());
      renderComparison();
    });
  });
}

// ── Comparison render ────────────────────────────────────────────
function getActiveStats() {
  if (ST.activeGroup === 'custom') {
    return ST.customStats.map(key => ALL_STATS.find(s => s.key === key)).filter(Boolean);
  }
  return STAT_GROUPS.find(g => g.id === ST.activeGroup)?.stats || [];
}

function renderComparison() {
  const output = document.getElementById('compare-output');
  const a = ST.playerA, b = ST.playerB;

  if (!a || !b) {
    output.innerHTML = `
      <div class="compare-empty">
        <div class="compare-empty-icon">⇄</div>
        Select two players to compare their stats
      </div>`;
    return;
  }

  const stats = getActiveStats();
  if (stats.length === 0) {
    output.innerHTML = `<div class="compare-empty"><div class="compare-empty-icon">+</div>Add stats using the panel above</div>`;
    return;
  }

  const aImg = `https://cdn.nba.com/headshots/nba/latest/260x190/${a.player_id}.png`;
  const bImg = `https://cdn.nba.com/headshots/nba/latest/260x190/${b.player_id}.png`;

  const rows = stats.map(stat => {
    const va = a.stats[stat.key];
    const vb = b.stats[stat.key];
    const hasA = va !== null && va !== undefined;
    const hasB = vb !== null && vb !== undefined;

    let aBadge = '', bBadge = '';
    if (hasA && hasB) {
      const diff = (+va) - (+vb);
      const aWins = stat.invert ? diff < 0 : diff > 0;
      const bWins = stat.invert ? diff > 0 : diff < 0;
      const absDiff = Math.abs(diff);
      // Big win threshold: >5% of absolute value of larger number (or fixed thresholds)
      const bigThreshold = Math.max(Math.abs(+va), Math.abs(+vb)) * 0.05 + 0.01;
      const isBig = absDiff > bigThreshold;
      if (aWins) {
        const str = fmtDiff(diff, stat.fmt, stat.invert);
        aBadge = `<span class="compare-badge ${isBig ? 'big-win' : 'win'}">${str}</span>`;
      } else if (bWins) {
        const str = fmtDiff(-diff, stat.fmt, stat.invert);
        bBadge = `<span class="compare-badge ${isBig ? 'big-win' : 'win'}">${str}</span>`;
      }
    }

    return `
      <div class="compare-row">
        <div class="compare-cell">
          <span class="compare-val">${fmt(va, stat.fmt)}</span>
          ${aBadge}
        </div>
        <div class="compare-stat-label">${stat.label}</div>
        <div class="compare-cell right">
          ${bBadge}
          <span class="compare-val">${fmt(vb, stat.fmt)}</span>
        </div>
      </div>`;
  }).join('');

  output.innerHTML = `
    <div class="compare-table-wrap">
      <div class="compare-header">
        <div class="compare-header-player">
          <img class="compare-header-headshot" src="${aImg}" alt="" onerror="this.style.display='none'">
          <div>
            <div class="compare-header-name">${a.player_name}</div>
            <div class="compare-header-meta">${a.team_abbr || ''} · ${a.position_group || ''}</div>
          </div>
        </div>
        <div class="compare-header-center">${ST.season}</div>
        <div class="compare-header-player right">
          <img class="compare-header-headshot" src="${bImg}" alt="" onerror="this.style.display='none'">
          <div style="text-align:right">
            <div class="compare-header-name">${b.player_name}</div>
            <div class="compare-header-meta">${b.team_abbr || ''} · ${b.position_group || ''}</div>
          </div>
        </div>
      </div>
      ${rows}
    </div>`;
}

// ── Player picker logic ──────────────────────────────────────────
let pickerTimers = {};

async function searchPlayers(q) {
  if (!q || q.length < 2) return [];
  try {
    const params = new URLSearchParams({ season: ST.season, season_type: ST.seasonType, q, limit: 12 });
    const res = await fetch(`${API}/api/players?${params}`);
    const data = await res.json();
    return data.players || [];
  } catch { return []; }
}

function setupPicker(side) {
  const input    = document.getElementById(`picker-${side}-input`);
  const dropdown = document.getElementById(`picker-${side}-dropdown`);
  const card     = document.getElementById(`card-${side}`);
  const cardImg  = document.getElementById(`card-${side}-img`);
  const cardName = document.getElementById(`card-${side}-name`);
  const cardMeta = document.getElementById(`card-${side}-meta`);
  const clearBtn = document.getElementById(`card-${side}-clear`);
  let focused = -1;

  input.addEventListener('input', () => {
    clearTimeout(pickerTimers[side]);
    const q = input.value.trim();
    if (!q) { dropdown.classList.remove('open'); dropdown.innerHTML = ''; return; }
    pickerTimers[side] = setTimeout(async () => {
      const players = await searchPlayers(q);
      focused = -1;
      if (!players.length) {
        dropdown.innerHTML = '<div style="padding:12px;font-family:var(--ff-mono);font-size:11px;color:var(--ink4)">No players found</div>';
        dropdown.classList.add('open');
        return;
      }
      dropdown.innerHTML = players.map((p, i) => `
        <div class="picker-option" data-idx="${i}" data-id="${p.player_id}">
          <img class="picker-headshot" src="https://cdn.nba.com/headshots/nba/latest/260x190/${p.player_id}.png" alt="" onerror="this.style.display='none'">
          <span class="picker-option-name">${p.player_name}</span>
          <span class="picker-option-meta">${p.team_abbr || ''} · ${p.position_group || ''}</span>
        </div>
      `).join('');
      dropdown.classList.add('open');
      dropdown.querySelectorAll('.picker-option').forEach(opt => {
        opt.addEventListener('mousedown', e => {
          e.preventDefault();
          const idx = +opt.dataset.idx;
          selectPlayer(side, players[idx]);
        });
      });
    }, 200);
  });

  input.addEventListener('keydown', e => {
    const opts = dropdown.querySelectorAll('.picker-option');
    if (!opts.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      focused = Math.min(focused + 1, opts.length - 1);
      opts.forEach((o, i) => o.classList.toggle('focused', i === focused));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      focused = Math.max(focused - 1, 0);
      opts.forEach((o, i) => o.classList.toggle('focused', i === focused));
    } else if (e.key === 'Enter' && focused >= 0) {
      opts[focused].dispatchEvent(new MouseEvent('mousedown'));
    } else if (e.key === 'Escape') {
      dropdown.classList.remove('open');
    }
  });

  input.addEventListener('blur', () => {
    setTimeout(() => dropdown.classList.remove('open'), 150);
  });

  clearBtn.addEventListener('click', () => {
    ST[side === 'a' ? 'playerA' : 'playerB'] = null;
    card.classList.remove('visible');
    input.value = '';
    renderComparison();
  });

  async function selectPlayer(side, p) {
    dropdown.classList.remove('open');
    input.value = p.player_name;

    // Fetch full stats
    try {
      const params = new URLSearchParams({ player_id: p.player_id, season: ST.season, season_type: ST.seasonType });
      const res = await fetch(`${API}/api/stats?${params}`);
      const data = await res.json();
      const stats = data.stats || {};
      const player = { ...p, stats };
      ST[side === 'a' ? 'playerA' : 'playerB'] = player;

      cardImg.src = `https://cdn.nba.com/headshots/nba/latest/260x190/${p.player_id}.png`;
      cardName.textContent = p.player_name;
      cardMeta.textContent = `${p.team_abbr || ''} · ${p.position_group || ''} · ${ST.season}`;
      card.classList.add('visible');
      renderComparison();
    } catch(e) {
      console.error(e);
    }
  }
}

  const reloads = [];
  if (ST.playerA) reloads.push(reloadPlayer('a'));
  if (ST.playerB) reloads.push(reloadPlayer('b'));
  await Promise.all(reloads);
  renderComparison();
}

async function reloadPlayer(side) {
  const player = side === 'a' ? ST.playerA : ST.playerB;
  if (!player) return;
  try {
    const params = new URLSearchParams({ player_id: player.player_id, season: ST.season, season_type: ST.seasonType });
    const res = await fetch(`${API}/api/stats?${params}`);
    const data = await res.json();
    if (data.stats) {
      player.stats = data.stats;
      const meta = document.getElementById(`card-${side}-meta`);
      if (meta) meta.textContent = `${player.team_abbr || ''} · ${player.position_group || ''} · ${ST.season}`;
    }
  } catch(e) { console.error(e); }
}

// ── Load seasons from API ────────────────────────────────────────
async function loadSeasons() {
  await populateSeasonDropdown(document.getElementById('season-select'), ST.season);
  ST.season = document.getElementById('season-select').value;
  // Sync season-type dropdown to computed default
  const stSel = document.getElementById('season-type-select');
  stSel.value = ST.seasonType;
}

// ── Nav auth ─────────────────────────────────────────────────────
async function initNavAuth() {
  const slot = document.getElementById('nav-auth-slot');
  try {
    const res = await fetch('/auth/me');
    const data = await res.json();
    const user = data.user;
    if (user) {
      slot.innerHTML = `
        <a href="/profile" style="text-decoration:none;cursor:pointer">${user.avatar_url ? `<img class="nav-auth-avatar" src="${user.avatar_url}" alt="">` : ''}</a>
        <button class="nav-signout-btn" onclick="navSignOut()">Sign out</button>
      `;
    } else {
      slot.innerHTML = `<a class="nav-signin-btn" href="/auth/google/login?next=${encodeURIComponent(window.location.pathname)}">Sign in</a>`;
    }
  } catch {
    slot.innerHTML = `<a class="nav-signin-btn" href="/auth/google/login">Sign in</a>`;
  }
}
async function navSignOut() {
  await fetch('/auth/logout', { method: 'POST' });
  window.location.reload();
}

// ── Init ─────────────────────────────────────────────────────────
loadSeasons();
renderGroupTabs();
renderCustomPanel();
setupPicker('a');
setupPicker('b');
initNavAuth();
renderComparison();
</script>
</body>
</html>
