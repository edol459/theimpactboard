<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WoWY · ydkball</title>
<meta name="description" content="See how NBA teams perform with and without each player on the floor.">
<meta property="og:site_name" content="ydkball">
<meta property="og:title" content="WoWY · ydkball">
<meta property="og:description" content="See how NBA teams perform with and without each player on the floor.">
<meta property="og:image" content="https://ydkball.net/logo.png">
<meta property="og:url" content="https://ydkball.net/wowy">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="WoWY · ydkball">
<meta name="twitter:description" content="See how NBA teams perform with and without each player on the floor.">
<meta name="twitter:image" content="https://ydkball.net/logo.png">
<link rel="icon" type="image/png" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:       #0c0c0d;
  --ink2:      #2a2a2e;
  --ink3:      #6b6b78;
  --ink4:      #a8a8b3;
  --paper:     #F5F0E8;
  --paper2:    #eeecea;
  --paper3:    #e5e2dc;
  --rule:      #d8d5cf;
  --orange:    #e8530a;
  --orange-lt: #fff0ea;
  --green:     #1a7a4a;
  --red:       #c0392b;
  --ff-serif: 'DM Serif Display', Georgia, serif;
  --ff-sans:  'Instrument Sans', system-ui, sans-serif;
  --ff-mono:  'DM Mono', 'Courier New', monospace;
  --nav-h: 56px;
  font-size: 15px;
}
html { scroll-behavior: smooth; overflow-x: clip; -webkit-text-size-adjust: 100%; }
body {
  position: relative;
  font-family: var(--ff-sans);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: clip;
}
body::before {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.022; pointer-events: none; z-index: 9999;
}
nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h); background: var(--paper);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center;
  padding: 0 24px; gap: 32px; z-index: 100;
  will-change: transform;
}
.nav-wordmark {
  font-family: var(--ff-serif); font-size: 20px;
  color: var(--ink); letter-spacing: -0.01em;
  text-decoration: none; flex-shrink: 0;
  display: flex; align-items: center; gap: 0;
}
.nav-logo { height: 26px; width: auto; margin-right: 8px; }
.nav-wordmark span { color: var(--orange); }
.nav-tabs { display: flex; gap: 2px; flex: 1 1 0; min-width: 0; overflow: hidden; }
.nav-tab {
  font-family: var(--ff-mono); font-size: 11px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink3); background: none; border: none;
  padding: 6px 14px; cursor: pointer; border-radius: 4px;
  transition: color 0.15s, background 0.15s;
  text-decoration: none; display: inline-block;
}
.nav-tab:hover  { color: var(--ink); background: var(--paper2); }
.nav-tab.active { color: var(--ink); background: var(--paper3); }

.app { padding-top: var(--nav-h); display: flex; min-height: 100vh; }

/* ── Sidebar ─────────────────────────────────────────────────── */
.sidebar {
  width: 252px; flex-shrink: 0;
  border-right: 1px solid var(--rule);
  display: flex; flex-direction: column;
  position: sticky; top: var(--nav-h);
  height: calc(100vh - var(--nav-h));
  overflow: hidden;
}
.sidebar-head {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
}
.sidebar-title {
  font-family: var(--ff-serif); font-size: 22px;
  color: var(--ink); margin-bottom: 14px;
}
.ctrl-label {
  font-family: var(--ff-mono); font-size: 9px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink4); display: block; margin-bottom: 5px;
}
.ctrl-select {
  width: 100%; font-family: var(--ff-sans); font-size: 13px;
  background: var(--paper2); color: var(--ink);
  border: 1px solid var(--rule); border-radius: 6px;
  padding: 7px 10px; cursor: pointer; outline: none;
  margin-bottom: 10px; transition: border-color 0.15s;
}
.ctrl-select:focus { border-color: var(--orange); }


.players-scroll { flex: 1; overflow-y: auto; padding: 12px 10px; }
.players-scroll-label {
  font-family: var(--ff-mono); font-size: 9px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink4); display: block; padding: 0 8px 10px;
}
.player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.player-card {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 9px 4px 7px;
  border-radius: 8px; border: 1.5px solid transparent;
  cursor: pointer; transition: all 0.12s;
  background: var(--paper2); position: relative; user-select: none;
}
.player-card:hover { border-color: var(--rule); background: var(--paper3); }
.player-card.selected { border-color: var(--orange); background: var(--orange-lt); }
.player-card-check {
  position: absolute; top: 5px; right: 5px;
  width: 13px; height: 13px; background: var(--orange);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.12s;
}
.player-card.selected .player-card-check { opacity: 1; }
.player-card-check::after {
  content: ''; width: 6px; height: 3.5px;
  border-left: 1.5px solid #fff; border-bottom: 1.5px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
}
.player-headshot {
  width: 52px; height: 52px; border-radius: 50%;
  object-fit: cover; background: var(--paper3);
  border: 2px solid var(--rule); display: block; transition: border-color 0.12s;
}
.player-card.selected .player-headshot { border-color: var(--orange); }
.player-headshot-fallback {
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--paper3); border: 2px solid var(--rule);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--ff-mono); font-size: 13px; color: var(--ink3);
}
.player-card-name {
  font-family: var(--ff-sans); font-size: 10px; font-weight: 600;
  color: var(--ink2); text-align: center; line-height: 1.2;
}
.player-card-pos { font-family: var(--ff-mono); font-size: 9px; color: var(--ink4); }

.sidebar-footer {
  padding: 10px 18px; border-top: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.sel-count { font-family: var(--ff-mono); font-size: 10px; color: var(--ink3); }
.btn-clear {
  font-family: var(--ff-mono); font-size: 10px;
  letter-spacing: 0.05em; text-transform: uppercase;
  background: none; border: none; color: var(--ink4);
  cursor: pointer; padding: 0; transition: color 0.12s;
}
.btn-clear:hover { color: var(--orange); }


/* ── Main ────────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.state-msg {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; padding: 80px 32px;
  font-family: var(--ff-mono); font-size: 12px;
  color: var(--ink3); letter-spacing: 0.04em;
  text-align: center; line-height: 1.9;
}
.state-icon { font-size: 32px; opacity: 0.3; }
.spin {
  display: inline-block; width: 20px; height: 20px;
  border: 2px solid var(--rule); border-top-color: var(--orange);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.results-head {
  padding: 16px 28px 14px; border-bottom: 1px solid var(--rule);
  display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; flex-shrink: 0;
}
.results-title { font-family: var(--ff-serif); font-size: 20px; color: var(--ink); flex: 1; }
.results-meta { font-family: var(--ff-mono); font-size: 10px; color: var(--ink4); letter-spacing: 0.04em; }

.sel-strip {
  display: flex; gap: 10px; align-items: center;
  padding: 12px 28px; border-bottom: 1px solid var(--rule);
  background: var(--paper2); flex-wrap: wrap; flex-shrink: 0;
}
.sel-strip-label {
  font-family: var(--ff-mono); font-size: 9px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink4); white-space: nowrap;
}
.sel-avatar { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.sel-avatar img {
  width: 32px; height: 32px; border-radius: 50%;
  object-fit: cover; border: 2px solid var(--orange); background: var(--paper3);
}
.sel-avatar-name {
  font-family: var(--ff-sans); font-size: 10px; font-weight: 600; color: var(--ink2);
}

/* ── WOWY table ──────────────────────────────────────────────── */
.table-scroll { flex: 1; overflow: auto; }
table.wt {
  width: 100%; border-collapse: collapse;
  font-family: var(--ff-sans); font-size: 13px; min-width: 360px;
}
table.wt thead { position: sticky; top: 0; z-index: 2; background: var(--paper); }
table.wt thead th {
  font-family: var(--ff-mono); font-size: 10px;
  letter-spacing: 0.07em; text-transform: uppercase; font-weight: 500;
  padding: 10px 14px 8px; text-align: center; color: var(--ink3);
  border-bottom: 1px solid var(--rule); white-space: nowrap;
}
table.wt thead th.th-lineup { text-align: left; }

table.wt tbody tr { border-bottom: 1px solid var(--paper3); transition: background 0.1s; }
table.wt tbody tr:last-child { border-bottom: none; }
table.wt tbody tr:hover { background: var(--paper2); }
table.wt tbody tr.row-diff {
  background: var(--paper2);
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}
table.wt tbody td {
  padding: 13px 14px; text-align: center; color: var(--ink); vertical-align: middle;
}
table.wt tbody td.td-lineup { text-align: left; }

.wowy-lineup { display: flex; gap: 12px; align-items: center; }
.wc { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.wc img {
  width: 44px; height: 44px; border-radius: 50%;
  object-fit: cover; background: var(--paper3);
}
.wc-name {
  font-family: var(--ff-sans); font-size: 10px;
  font-weight: 600; text-align: center; line-height: 1.1;
}
.wc.on  img      { border: 2px solid var(--orange); }
.wc.on  .wc-name { color: var(--orange); }
.wc.off img      { border: 2px solid var(--rule); filter: grayscale(0.8) opacity(0.4); }
.wc.off .wc-name { color: var(--ink4); text-decoration: line-through; }

.td-min { font-family: var(--ff-mono); font-size: 12px; color: var(--ink3); }
.net-pos { color: var(--green); font-weight: 700; }
.net-neg { color: var(--red);   font-weight: 700; }
.net-neu { color: var(--ink3); }

.diff-pos { color: var(--green); font-weight: 700; }
.diff-neg { color: var(--red);   font-weight: 700; }
.diff-label {
  font-family: var(--ff-mono); font-size: 10px;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink3); font-weight: 500;
}

.null-dash { color: var(--paper3); }

/* ── Mode tabs ───────────────────────────────────────────────── */
.mode-tabs {
  display: flex; gap: 3px; padding: 10px 28px;
  border-bottom: 1px solid var(--rule);
  background: var(--paper2); flex-shrink: 0;
}
.mode-tab {
  font-family: var(--ff-mono); font-size: 10px;
  letter-spacing: 0.07em; text-transform: uppercase;
  padding: 5px 13px; border-radius: 4px;
  border: 1px solid transparent;
  cursor: pointer; color: var(--ink3); background: none;
  transition: all 0.13s; white-space: nowrap;
}
.mode-tab:hover { color: var(--ink); background: var(--paper3); }
.mode-tab.active {
  color: var(--ink); background: var(--paper);
  border-color: var(--rule);
}

/* ── Shot profile heatmap ────────────────────────────────────── */
.shot-heatmap-wrap {
  display: flex; gap: 20px; padding: 16px 28px 8px;
  justify-content: center; flex-wrap: wrap; flex-shrink: 0;
}
.shot-zone-wrap {
  padding: 16px 28px 4px; flex-shrink: 0;
}
.court-3d-outer {
  perspective: 700px;
  perspective-origin: 50% 110%;
  display: flex; justify-content: center;
}
.court-3d-inner {
  transform: rotateX(44deg);
  transform-origin: bottom center;
  filter: drop-shadow(0 18px 22px rgba(0,0,0,0.32));
}
.zone-tooltip {
  position: fixed; display: none; pointer-events: none;
  background: rgba(20,20,25,0.92); color: #f0ede6;
  font-family: var(--ff-mono); font-size: 10px; line-height: 1.7;
  padding: 6px 10px; border-radius: 5px; z-index: 900;
  white-space: nowrap;
}
.shot-court-block {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
}
.shot-court-label {
  font-family: var(--ff-mono); font-size: 10px;
  letter-spacing: 0.07em; text-transform: uppercase; color: var(--ink2);
}
.shot-court-sublabel {
  font-family: var(--ff-mono); font-size: 9px; color: var(--ink4);
}
.shot-legend {
  display: flex; align-items: center; gap: 8px;
  padding: 0 28px 10px; font-family: var(--ff-mono);
  font-size: 9px; color: var(--ink4); flex-shrink: 0;
}
.shot-legend { gap: 4px; }

/* ── Mode note ───────────────────────────────────────────────── */
.adj-note {
  font-family: var(--ff-mono); font-size: 10px;
  color: var(--ink4); letter-spacing: 0.03em;
  padding: 10px 28px 0; line-height: 1.6;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink4); }

/* ── Nav auth ─────────────────────────────────────────────── */
.nav-auth {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.nav-auth-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  object-fit: cover;
  border: 1.5px solid var(--rule);
}
.nav-auth-name {
  font-family: var(--ff-mono);
  font-size: 11px;
  color: var(--ink3);
  letter-spacing: 0.03em;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.nav-signin-btn {
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 5px 12px;
  background: var(--orange);
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  text-decoration: none;
  transition: opacity 0.15s;
  white-space: nowrap;
}
.nav-signin-btn:hover { opacity: 0.85; }
.nav-signout-btn {
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: 0.04em;
  color: var(--ink3);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 6px;
  transition: color 0.15s;
}
.nav-signout-btn:hover { color: var(--ink); }

/* Drawer handle never used — desktop only */
.drawer-handle { display: none; }
/* Sidebar left, main right on desktop (DOM order reversed for mobile) */
.sidebar { order: -1; }
.main    { order:  0; }

/* ── Mobile ──────────────────────────────────────────────────── */
@media (max-width: 768px) {
  :root { --nav-h: 88px; }
  nav { height: auto; padding: 0 16px; flex-wrap: wrap; gap: 0; align-items: center; }
  .nav-wordmark { padding: 13px 0; }
  .nav-auth { padding: 13px 0; }
  .nav-tabs {
    order: 10; flex: 0 0 100%; overflow-x: auto; scrollbar-width: none;
    flex-wrap: nowrap; border-top: 1px solid var(--rule);
    padding: 7px 0 9px; gap: 0;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab { white-space: nowrap; padding: 5px 12px; }

  /* Sidebar becomes a sticky top control strip */
  .app { flex-direction: column; }
  .sidebar {
    width: 100%; height: auto; order: -1;
    position: sticky; top: var(--nav-h); z-index: 80;
    border-right: none; border-bottom: 1px solid var(--rule);
    background: var(--paper); overflow: visible;
  }

  /* Team + season selects side by side */
  .sidebar-head {
    display: flex; gap: 10px; padding: 14px 14px;
    align-items: flex-end;
  }
  .sidebar-head > * {max-width: 120px; min-width: 0; }
  .sidebar-head > *:first-child { flex: 2; }
  .sidebar-title { display: none; }
  .ctrl-select { margin-bottom: 0; font-size: 12px; padding: 6px 8px; }
  .ctrl-label { font-size: 8px; }

  /* Player filmstrip — horizontal scroll */
  .players-scroll {
    overflow-x: auto; overflow-y: hidden;
    padding: 8px 14px 10px;
    border-top: 1px solid var(--rule);
    scrollbar-width: none; max-height: none;
  }
  .players-scroll::-webkit-scrollbar { display: none; }
  .players-scroll-label { display: none; }
  .player-grid { display: flex; flex-direction: row; gap: 8px; width: max-content; }
  .player-card { width: 62px; padding: 6px 4px 5px; gap: 3px; }
  .player-headshot { width: 42px; height: 42px; }
  .player-headshot-fallback { width: 42px; height: 42px; font-size: 11px; }
  .player-card-name { font-size: 9px; }
  .player-card-pos { display: none; }
  .sidebar-footer { display: none !important; }

  /* Results */
  .main { min-width: 0; overflow: visible; }
  .results-head { padding: 12px 14px 10px; }
  .mode-tabs { padding: 8px 14px; overflow-x: auto; flex-wrap: nowrap; scrollbar-width: none; }
  .mode-tabs::-webkit-scrollbar { display: none; }
  .sel-strip { padding: 8px 14px; gap: 8px; }
  .sel-avatar img { width: 28px; height: 28px; }
  .sel-avatar-name { font-size: 9px; }

  /* Compact table */
  table.wt { min-width: 0; font-size: 12px; }
  table.wt thead th { padding: 8px 6px 7px; font-size: 9px; letter-spacing: 0.04em; }
  table.wt thead th:first-child { padding-left: 14px; }
  table.wt thead th:last-child  { padding-right: 14px; }
  table.wt tbody td { padding: 10px 6px; }
  table.wt tbody td:first-child { padding-left: 14px; }
  table.wt tbody td:last-child  { padding-right: 14px; }
  table.wt thead th.th-lineup,
  table.wt tbody td.td-lineup { width: 1px; white-space: nowrap; }
  .wowy-lineup { gap: 6px; }
  .wc img { width: 30px; height: 30px; }
  .wc-name { font-size: 9px; }
  .td-min { font-size: 11px; }
  .table-scroll { overflow-x: auto; }
}

</style>
</head>
<body>

<nav>
  <a class="nav-wordmark" href="/"><img class="nav-logo" src="/logo.png" alt="">ydk<span>ball</span></a>
  <div class="nav-tabs">
    <a class="nav-tab" href="/reviews">BasketBoxd</a>
    <a class="nav-tab" href="/stats">Stats Hub</a>
    <a class="nav-tab active" href="/wowy">WoWY</a>
    <a class="nav-tab" href="/compare">Compare</a>
  </div>
  <div class="nav-auth" id="nav-auth-slot"></div>
</nav>

<div class="app">
  <main class="main" id="main"></main>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-title">WoWY</div>
      <label class="ctrl-label" for="team-select">Team</label>
      <select class="ctrl-select" id="team-select">
        <option value="">— select team —</option>
      </select>
      <label class="ctrl-label" for="season-select">Season</label>
      <select class="ctrl-select" id="season-select"></select>
    </div>
    <div class="players-scroll" id="players-scroll">
      <div class="state-msg" style="padding:40px 16px;flex:0;">
        <div class="state-icon">🏀</div><span>Select a team above</span>
      </div>
    </div>
    <div class="sidebar-footer" id="sidebar-footer" style="display:none;">
      <span class="sel-count" id="sel-count">0 selected</span>
      <button class="btn-clear" id="btn-clear">Clear</button>
    </div>
  </aside>
</div>

<script src="/season-config.js"></script>
<script>
const TEAMS = [
  {abbr:'ATL',name:'Atlanta Hawks'},      {abbr:'BOS',name:'Boston Celtics'},
  {abbr:'BKN',name:'Brooklyn Nets'},      {abbr:'CHA',name:'Charlotte Hornets'},
  {abbr:'CHI',name:'Chicago Bulls'},      {abbr:'CLE',name:'Cleveland Cavaliers'},
  {abbr:'DAL',name:'Dallas Mavericks'},   {abbr:'DEN',name:'Denver Nuggets'},
  {abbr:'DET',name:'Detroit Pistons'},    {abbr:'GSW',name:'Golden State Warriors'},
  {abbr:'HOU',name:'Houston Rockets'},    {abbr:'IND',name:'Indiana Pacers'},
  {abbr:'LAC',name:'LA Clippers'},        {abbr:'LAL',name:'Los Angeles Lakers'},
  {abbr:'MEM',name:'Memphis Grizzlies'},  {abbr:'MIA',name:'Miami Heat'},
  {abbr:'MIL',name:'Milwaukee Bucks'},    {abbr:'MIN',name:'Minnesota Timberwolves'},

  {abbr:'PHI',name:'Philadelphia 76ers'}, {abbr:'PHX',name:'Phoenix Suns'},

];

// ── Load ───────────────────────────────────────────────────────
async function loadRoster() {
  const team   = teamSel.value;
  const season = seasonSel.value;
  if (!team) return;

  selected.clear();
  roster     = [];
  allLineups = [];
  document.querySelectorAll('.player-card.selected').forEach(c => c.classList.remove('selected'));
  selCount.textContent = '0 selected';

  sidebarFooter.style.display = 'none';
  playersScroll.innerHTML = `<div class="state-msg" style="padding:40px 16px;flex:0;"><span class="spin"></span></div>`;
  setMain('spin', 'Loading roster…');

  try {
    const res  = await fetch(`/api/wowy/roster?team=${team}&season=${season}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    roster = data.roster || [];
    renderGrid();
    sidebarFooter.style.display = 'flex';
  } catch(e) {
    playersScroll.innerHTML = `<div class="state-msg" style="padding:40px 16px;flex:0;color:var(--red)">⚠ ${e.message}</div>`;
    setMain('icon', '⚠', e.message);
    return;
  }

  // Lineups load separately so the player grid appears immediately
  await loadLineups();
}

async function loadLineups() {
  const team   = teamSel.value;
  const season = seasonSel.value;
  if (!team) return;

  lineupsReady = false;
  lineupsError = false;
  allLineups   = [];

  setMain('spin', 'Fetching lineup data…');

  try {
    const res  = await fetch(`/api/wowy/lineups?team=${encodeURIComponent(team)}&season=${encodeURIComponent(season)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    allLineups = data.lineups || [];
    allLineups.forEach(l => { l.pids = new Set(l.pids); });
    maybeUpdateRoster(data.lineups);
    lineupsReady = true;
    if (selected.size) buildWOWY();
    else showReadyState();
  } catch(e) {
    lineupsError = true;
    setMain('icon', '⚠', e.message);
  }
}

function maybeUpdateRoster(lineupRows) {
  if (roster.length || !lineupRows || !lineupRows.length) return;
  const seen = new Map();
  for (const raw of lineupRows) {
    if (!raw._ids || !raw._names) continue;
    raw._ids.forEach((pid, i) => {
      if (!seen.has(pid)) seen.set(pid, raw._names[i]);
    });
  }
  if (!seen.size) return;
  roster = [...seen.entries()]
    .map(([pid, name]) => ({ player_id: pid, player_name: name, number: '', position: '' }))
    .sort((a, b) => a.player_name.localeCompare(b.player_name));
  renderGrid();
  sidebarFooter.style.display = 'flex';
}

teamSel.addEventListener('change', loadRoster);
seasonSel.addEventListener('change', () => { if (teamSel.value) loadRoster(); });
populateSeasonDropdown(seasonSel, computeCurrentSeason());

// ── Player grid ────────────────────────────────────────────────
function renderGrid() {
  playersScroll.innerHTML = '';
  if (!roster.length) {
    playersScroll.innerHTML = `<div class="state-msg" style="padding:40px 16px;flex:0;">No roster data</div>`;
    return;
  }
  const lbl = document.createElement('div');
  lbl.className = 'players-scroll-label';
  lbl.textContent = 'Select players (1–5)';
  playersScroll.appendChild(lbl);

  const grid = document.createElement('div');
  grid.className = 'player-grid';
  roster.forEach(p => {
    const card = document.createElement('div');
    card.className = 'player-card';
    card.dataset.pid = p.player_id;
    const last = lastName(p.player_name);
    const init = initials(p.player_name);
    card.innerHTML = `
      <div class="player-card-check"></div>
      <img class="player-headshot"
        src="https://cdn.nba.com/headshots/nba/latest/260x190/${p.player_id}.png"
        alt="${last}"
        onerror="this.outerHTML='<div class=\\'player-headshot-fallback\\'>${init}</div>'">
      <div class="player-card-name">${last}</div>
      <div class="player-card-pos">${p.position || ''}</div>
    `;
    card.addEventListener('click', () => togglePlayer(p.player_id, card));
    grid.appendChild(card);
  });
  playersScroll.appendChild(grid);
}

function togglePlayer(pid, card) {
  if (selected.has(pid)) {
    selected.delete(pid);
    card.classList.remove('selected');
  } else {
    if (currentMode === 'stat' || currentMode === 'shot') {
      // Single-anchor modes: swap to the newly clicked player
      document.querySelectorAll('.player-card.selected').forEach(c => c.classList.remove('selected'));
      selected.clear();
    } else if (selected.size >= 5) {
      return;
    }
    selected.add(pid);
    card.classList.add('selected');
  }
  selCount.textContent = `${selected.size} selected`;
  buildWOWY();
}

btnClear.addEventListener('click', () => {
  selected.clear();
  document.querySelectorAll('.player-card.selected').forEach(c => c.classList.remove('selected'));
  selCount.textContent = '0 selected';

// ── Ready state ────────────────────────────────────────────────
function showReadyState() {
  let prompt;
  if (!teamSel.value) {
    prompt = 'Select a team to get started';
  } else if (currentMode === 'stat') {
    prompt = 'Select 1 player as the anchor to see teammate stat shifts';
  } else if (currentMode === 'shot') {
    prompt = 'Select 1 player to see the shot profile comparison';
  } else {
    prompt = 'Select 1–5 players to see every WoWY combination';
  }
  main.innerHTML = `
    <div class="results-head">
      <div class="results-title">WoWY</div>
    </div>
    <div class="mode-tabs">
      ${MODES.map(m => `<button class="mode-tab${currentMode===m.key?' active':''}" data-mode="${m.key}">${m.label}</button>`).join('')}
    </div>
    <div class="state-msg" style="flex:1;"><div class="state-icon">👆</div><span>${prompt}</span></div>
  `;
  document.querySelectorAll('.mode-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentMode = btn.dataset.mode;
      if (selected.size) buildWOWY();
      else showReadyState();
    });
  });
}

// ── WOWY computation ───────────────────────────────────────────
function buildWOWY() {
  if (!selected.size) {
    if (lineupsReady) showReadyState();
    else setMain('icon', '👆', 'Select 1–5 players to see every WoWY combination');
    return;
  }
  if (!lineupsReady) {
    if (lineupsError) setMain('icon', '⚠', 'Lineup data failed to load. Try reloading the team.');
    else setMain('spin', 'Fetching lineup data…');
    return;
  }

  const selArr = [...selected];
  const subsets = allSubsets(selArr);
  const lineups = allLineups;

  const rows = subsets.map(onSet => {
    const offSet = new Set(selArr.filter(p => !onSet.has(p)));

    const matching = lineups.filter(l => {
      for (const p of onSet)  if (!l.pids.has(p)) return false;
      for (const p of offSet) if (l.pids.has(p))  return false;
      return true;
    });

    if (!matching.length) return null;

    const totalMin = matching.reduce((s, l) => s + (l.min || 0), 0);
    const wavg = key => {
      const coveredMin = matching.reduce((s, l) => l[key] != null ? s + (l.min || 0) : s, 0);
      if (!coveredMin) return null;
      const val = matching.reduce((s, l) => l[key] != null ? s + l[key] * (l.min || 0) : s, 0);
      return Math.round((val / coveredMin) * 10) / 10;
    };

    return {
      onSet,
      min:  Math.round(totalMin),
      ortg: wavg('ortg'),
      drtg: wavg('drtg'),
      net:  wavg('net'),
    };
  }).filter(Boolean);

  if (!rows.length) {
    setMain('icon', '🔍', 'No data found for this combination.<br>Try different players or season.');
    return;
  }

  rows.sort((a, b) => b.onSet.size - a.onSet.size || b.min - a.min);
  renderResults(rows);
}

// ── Render ─────────────────────────────────────────────────────
function renderResults(rows) {
  const rosterMap  = {};
  roster.forEach(p => { rosterMap[p.player_id] = p; });
  const selArr     = [...selected];
  const selPlayers = selArr.map(pid => rosterMap[pid]).filter(Boolean);
  const season     = seasonSel.value;

  const fmt = v => v == null ? '<span class="null-dash">—</span>' : v.toFixed(1);
  const nc  = v => v == null ? '' : v > 0 ? 'net-pos' : v < 0 ? 'net-neg' : 'net-neu';

  const allOnRow  = rows.find(r => r.onSet.size === selArr.length);
  const allOffRow = rows.find(r => r.onSet.size === 0);
  let diffHtml = '';
  if (allOnRow && allOffRow) {
    const dOrtg = allOnRow.ortg != null && allOffRow.ortg != null ? +(allOnRow.ortg - allOffRow.ortg).toFixed(1) : null;
    const dDrtg = allOnRow.drtg != null && allOffRow.drtg != null ? +(allOnRow.drtg - allOffRow.drtg).toFixed(1) : null;
    const dNet  = allOnRow.net  != null && allOffRow.net  != null ? +(allOnRow.net  - allOffRow.net ).toFixed(1) : null;
    const dc   = v => v == null ? '' : v > 0 ? 'diff-pos' : v < 0 ? 'diff-neg' : '';
    const dfmt = v => v == null ? '—' : (v > 0 ? '+' : '') + v.toFixed(1);
    diffHtml = `<tr class="row-diff">
      <td class="td-lineup"><span class="diff-label">On − Off</span></td>
      <td></td>
      <td class="${dc(dOrtg)}">${dfmt(dOrtg)}</td>
      <td class="${dc(dDrtg)}">${dfmt(dDrtg)}</td>
      <td class="${dc(dNet)}">${dfmt(dNet)}</td>
    </tr>`;
  }

  const selStripHtml = `
    <div class="sel-strip">
      <span class="sel-strip-label">Selected</span>
      ${selPlayers.map(p => `
        <div class="sel-avatar">
          <img src="https://cdn.nba.com/headshots/nba/latest/260x190/${p.player_id}.png"
               alt="${lastName(p.player_name)}" onerror="this.style.display='none'">
          <span class="sel-avatar-name">${lastName(p.player_name)}</span>
        </div>`).join('')}
    </div>`;

  main.innerHTML = `
    <div class="results-head">
      <div class="results-title">WoWY Combinations</div>
      <div class="results-meta">Low-leverage removed · ${season} · Regular Season · ${rows.length} combination${rows.length!==1?'s':''}</div>
    </div>
    <div class="mode-tabs">
      ${MODES.map(m => `<button class="mode-tab${currentMode===m.key?' active':''}" data-mode="${m.key}">${m.label}</button>`).join('')}
    </div>
    ${selStripHtml}
    <div id="wowy-body"></div>
  `;

  document.querySelectorAll('.mode-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentMode = btn.dataset.mode;
      document.querySelectorAll('.mode-tab').forEach(b => b.classList.toggle('active', b.dataset.mode === currentMode));
      // Single-anchor modes only allow 1 player — if >1 selected, keep only the first
      if ((currentMode === 'stat' || currentMode === 'shot') && selected.size > 1) {
        const first = [...selected][0];
        selected.clear();
        selected.add(first);
        document.querySelectorAll('.player-card.selected').forEach(c => {
          if (parseInt(c.dataset.pid) !== first) c.classList.remove('selected');
        });
        selCount.textContent = '1 selected';
        buildWOWY();
        return;
      }
      refreshBody(rows, rosterMap, selArr, selPlayers, season, fmt, nc, diffHtml);
    });
  });

  refreshBody(rows, rosterMap, selArr, selPlayers, season, fmt, nc, diffHtml);
}

// ── Raw WoWY body ──────────────────────────────────────────────
function renderRawBody(rows, rosterMap, selArr, fmt, nc, diffHtml) {
  return `
    <div class="table-scroll">
      <table class="wt">
        <thead>
          <tr>
            <th class="th-lineup">Lineup</th>
            <th>MIN</th>
            <th>ORtg</th>
            <th>DRtg</th>
            <th>Net</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => {
            const chips = selArr.map(pid => {
              const isOn = r.onSet.has(pid);
              const p    = rosterMap[pid];
              if (!p) return '';
              const last = lastName(p.player_name);
              return `<div class="wc ${isOn?'on':'off'}">
                <img src="https://cdn.nba.com/headshots/nba/latest/260x190/${pid}.png"
                     alt="${last}" onerror="this.style.display='none'">
                <span class="wc-name">${last}</span>
              </div>`;
            }).join('');
            return `<tr>
              <td class="td-lineup"><div class="wowy-lineup">${chips}</div></td>

              <td>${fmt(r.ortg)}</td>
              <td>${fmt(r.drtg)}</td>

          }).join('')}
          ${diffHtml}
        </tbody>
      </table>
    </div>`;
}

// ── Switch between modes ───────────────────────────────────────
function refreshBody(rows, rosterMap, selArr, selPlayers, season, fmt, nc, diffHtml) {
  const body = document.getElementById('wowy-body');
  if (currentMode === 'raw') {
    body.innerHTML = renderRawBody(rows, rosterMap, selArr, fmt, nc, diffHtml);
  } else if (currentMode === 'shot') {
    renderShotProfileBody(rows, rosterMap, selArr, season);
  } else if (currentMode === 'stat') {
    renderStatLineBody(rows, rosterMap, selArr, season);
  }
}

// ── Court heatmap renderer ─────────────────────────────────────
function drawCourtHeatmap(canvas, shots, totalPoss) {
  if (!canvas) return;
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');

  // NBA shot chart coordinate system (tenths of a foot, basket at origin)
  const X_MIN = -250, X_MAX = 250;
  const Y_MIN = -52,  Y_MAX = 420;
  const XR = X_MAX - X_MIN;  // 500
  const YR = Y_MAX - Y_MIN;  // 472

  const px = x => (x - X_MIN) / XR * W;
  const py = y => H - (y - Y_MIN) / YR * H;

  // Court background
  ctx.fillStyle = '#f5f1ea';
  ctx.fillRect(0, 0, W, H);

  // ── Shot dots ───────────────────────────────────────────────
  // Draw missed shots first (underneath), then made shots on top
  const missed = shots.filter(s => !s.made);
  const made   = shots.filter(s =>  s.made);
  const r = Math.max(1.5, W / 160);  // dot radius scales with canvas size

  for (const s of missed) {
    ctx.beginPath();
    ctx.arc(px(s.x), py(s.y), r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(90, 150, 230, 0.45)';
    ctx.fill();
  }
  for (const s of made) {
    ctx.beginPath();
    ctx.arc(px(s.x), py(s.y), r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 210, 55, 0.88)';
    ctx.fill();
  }

  // ── Court lines ─────────────────────────────────────────────
  const lw = Math.max(1, W / 280);
  ctx.lineWidth   = lw;
  ctx.strokeStyle = '#7a7060';

  // Paint (key)
  ctx.beginPath();
  ctx.rect(px(-80), py(142), px(80) - px(-80), py(-52) - py(142));
  ctx.stroke();

  // Free throw circle — solid upper half, dashed lower half
  const ftR = 60 / XR * W;
  ctx.beginPath();
  ctx.arc(px(0), py(142), ftR, Math.PI, 0, true);
  ctx.stroke();
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.arc(px(0), py(142), ftR, 0, Math.PI, true);
  ctx.stroke();
  ctx.setLineDash([]);

  // Restricted area arc (above the basket)
  ctx.beginPath();
  ctx.arc(px(0), py(0), 40 / XR * W, Math.PI, 0, true);
  ctx.stroke();

  // Hoop
  ctx.strokeStyle = '#c0392b';
  ctx.lineWidth   = lw * 1.5;
  ctx.beginPath();
  ctx.arc(px(0), py(0), 7.5 / XR * W, 0, Math.PI * 2);
  ctx.stroke();

  // 3pt line
  ctx.strokeStyle = '#7a7060';
  ctx.lineWidth   = lw;
  // Straight corner segments
  ctx.beginPath(); ctx.moveTo(px(-220), py(-52)); ctx.lineTo(px(-220), py(92.5)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px( 220), py(-52)); ctx.lineTo(px( 220), py(92.5)); ctx.stroke();
  // Arc — from left corner, over the top, to right corner
  const arc3R = 237.5 / XR * W;
  const ang1  = Math.atan2(py(92.5) - py(0), px(-220) - px(0));
  const ang2  = Math.atan2(py(92.5) - py(0), px( 220) - px(0));
  ctx.beginPath();
  ctx.arc(px(0), py(0), arc3R, ang1, ang2, false);
  ctx.stroke();

  // Baseline
  ctx.beginPath(); ctx.moveTo(px(-250), py(-52)); ctx.lineTo(px(250), py(-52)); ctx.stroke();
}

// ── Zone differential chart ────────────────────────────────────
// Top-down half-court SVG, styled to match the site's warm editorial palette.
// Neutral zones are transparent (maple court shows through); hot/cold zones
// get semi-transparent color overlays. Hover events work natively on SVG shapes.
function drawZoneDiffChart(container, onShots, offShots, onPoss, offPoss) {
  if (!container) return;
  if (container._threeRenderer) { try { container._threeRenderer.dispose(); } catch(e){} container._threeRenderer = null; }
  container.innerHTML = '';

  // ── Court constants (NBA tenths of feet) ──────────────────────
  const RA=40, PW=80, FTY=142, TR=238, CX=220;
  const CY = Math.sqrt(TR*TR - CX*CX); // ≈ 90.8
  const cA = Math.atan2(CY, CX);

  // ── Zone classification ────────────────────────────────────────
  function zoneOf(s) {
    const d = Math.sqrt(s.x*s.x + s.y*s.y);
    if (d <= RA) return 'ra';
    if (Math.abs(s.x) <= PW && s.y <= FTY) return 'paint';
    if (s.is3) return s.y <= CY ? 'c3' : 'ab3';
    return 'mid';
  }

  // ── Count shots per zone ──────────────────────────────────────
  const onC={ra:0,paint:0,mid:0,c3:0,ab3:0};
  const offC={ra:0,paint:0,mid:0,c3:0,ab3:0};
  for (const s of onShots)  onC[zoneOf(s)]++;
  for (const s of offShots) offC[zoneOf(s)]++;
  const onR   = z => onPoss  > 0 ? onC[z]/onPoss*100  : 0;
  const offR  = z => offPoss > 0 ? offC[z]/offPoss*100 : 0;
  const delta = z => onR(z) - offR(z);

  // ── Zone color ────────────────────────────────────────────────
  // Neutral → transparent (maple surface shows through).
  // Colors are semi-opaque so court lines remain visible underneath.
  function zoneColor(z) {
    const d = delta(z);
    if (d > 4.0)  return 'rgba(118,20,182,0.78)';              // purple — heavy increase
    if (d > 1.5)  { const n=(d-1.5)/2.5;
      return `rgba(${Math.round(210+n*20)},${Math.round(40-n*20)},${Math.round(28-n*18)},0.76)`; } // red
    if (d < -4.0) return 'rgba(80,148,228,0.75)';              // icy blue — heavy decrease
    if (d < -1.5) { const n=(-d-1.5)/2.5;
      return `rgba(${Math.round(30-n*8)},${Math.round(88+n*28)},${Math.round(205+n*35)},0.76)`; }  // blue
    return 'rgba(0,0,0,0)';                                     // neutral — transparent
  }

  // ── SVG coordinate helpers ────────────────────────────────────
  // Crop at courtY=290 (~50 units above the 3pt arc top at 238).
  // svgH = 290 + 52 = 342.  viewBox "0 0 500 342"
  //   svgX = courtX + 250   (-250 → 0,  250 → 500)
  //   svgY = courtY + 52    ( -52 → 0,  290 → 342)
  const SVG_H = 342;
  const sx = x => (x + 250).toFixed(1);
  const sy = y => (y + 52).toFixed(1);

  function arcSVG(r, a0, a1, cx=0, cy=0, n=60) {
    const pts = [];
    for (let i=0; i<=n; i++) {
      const a = a0+(a1-a0)*i/n;
      pts.push(sx(cx+r*Math.cos(a))+','+sy(cy+r*Math.sin(a)));
    }
    return pts.join(' ');
  }

  // ── Pre-build arc strings ─────────────────────────────────────
  // 3pt arc: right corner (CX,CY) → top (0,TR) → left corner (-CX,CY) [CCW in math]
  const arc3  = arcSVG(TR, cA, Math.PI-cA);
  const cyS   = sy(CY);   // SVG Y of the corner-3 / AB3 boundary

  // AB3 polygon: 3pt arc (inner boundary) + sidelines up to midcourt
  const ab3pts = `${arc3} 0,${cyS} 0,${SVG_H} 500,${SVG_H} 500,${cyS}`;

  // FT circle: upper half (toward basket) = dashed; lower half = solid
  const ftSolid = arcSVG(60, 0, Math.PI, 0, FTY);    // curves away from basket
  const ftDash  = arcSVG(60, Math.PI, 2*Math.PI, 0, FTY); // curves toward basket

  // ── Build SVG ─────────────────────────────────────────────────
  // Court surface: warm maple tone. Lines: dark warm ink.
  const SURFACE = '#dfd2b2';
  const LINES   = 'rgba(38,28,14,0.68)';
  const BASKET  = 'rgba(38,28,14,0.80)';

  const svg = `<svg viewBox="0 0 500 ${SVG_H}" xmlns="http://www.w3.org/2000/svg"
     style="width:100%;height:auto;display:block;" overflow="hidden">

  <!-- Court surface -->
  <rect x="0" y="0" width="500" height="${SVG_H}" fill="${SURFACE}" />

  <!-- Zone color overlays (painter order: mid → ab3 → c3 → paint → ra) -->
  <polygon data-zone="mid"   points="0,0 500,0 500,${SVG_H} 0,${SVG_H}"
           fill="${zoneColor('mid')}" />
  <polygon data-zone="ab3"   points="${ab3pts}"
           fill="${zoneColor('ab3')}" />
  <polygon data-zone="c3"    points="0,0 ${sx(-CX)},0 ${sx(-CX)},${cyS} 0,${cyS}"
           fill="${zoneColor('c3')}" />
  <polygon data-zone="c3"    points="${sx(CX)},0 500,0 500,${cyS} ${sx(CX)},${cyS}"
           fill="${zoneColor('c3')}" />
  <rect    data-zone="paint" x="${sx(-PW)}" y="0" width="${PW*2}" height="${sy(FTY)}"
           fill="${zoneColor('paint')}" />
  <circle  data-zone="ra"    cx="250" cy="${sy(0)}" r="${RA}"
           fill="${zoneColor('ra')}" />

  <!-- Court lines (on top of zones, pointer-events off) -->
  <g stroke="${LINES}" stroke-width="2" fill="none" pointer-events="none" stroke-linejoin="round">
    <!-- Outer court boundary -->
    <rect x="0" y="0" width="500" height="${SVG_H}" />
    <!-- Paint box -->
    <rect x="${sx(-PW)}" y="0" width="${PW*2}" height="${sy(FTY)}" />
    <!-- FT circle -->
    <polyline points="${ftSolid}" />
    <polyline points="${ftDash}" stroke-dasharray="5,5" stroke-opacity="0.55" />
    <!-- 3pt corner straight lines -->
    <line x1="${sx(-CX)}" y1="0" x2="${sx(-CX)}" y2="${cyS}" />
    <line x1="${sx( CX)}" y1="0" x2="${sx( CX)}" y2="${cyS}" />
    <!-- 3pt arc -->
    <polyline points="${arc3}" />
    <!-- RA arc (facing midcourt) -->
    <polyline points="${arcSVG(RA, 0, Math.PI, 0, 0)}" />
  </g>

  <!-- Basket ring + backboard -->
  <g stroke="${BASKET}" stroke-width="2" fill="none" pointer-events="none">
    <polyline points="${arcSVG(7.5, 0, 2*Math.PI, 0, 0, 28)}" />
    <line x1="${sx(-30)}" y1="${sy(-7.5)}" x2="${sx(30)}" y2="${sy(-7.5)}" />
  </g>
</svg>`;

  // ── Legend row ────────────────────────────────────────────────
  const legendItems = [
    { color:'rgba(118,20,182,0.85)',  label:'Heavy ↑' },
    { color:'rgba(210,38,22,0.85)',   label:'Moderate ↑' },
    { color:'rgba(0,0,0,0)',          label:'Neutral', border:true },
    { color:'rgba(30,90,210,0.85)',   label:'Moderate ↓' },
    { color:'rgba(80,148,228,0.85)',  label:'Heavy ↓' },
  ];
  const legendHTML = legendItems.map(({color,label,border}) =>
    `<span style="display:inline-flex;align-items:center;gap:4px;">` +
    `<span style="width:9px;height:9px;border-radius:2px;background:${color};` +
    `flex-shrink:0;border:1px solid rgba(38,28,14,${border?'0.30':'0.10'});display:inline-block;"></span>` +
    `<span style="font-family:var(--ff-mono);font-size:9px;letter-spacing:0.04em;color:var(--ink3);">${label}</span>` +
    `</span>`
  ).join('<span style="color:var(--rule);margin:0 2px;">·</span>');

  // ── Inject ────────────────────────────────────────────────────
  container.innerHTML =
    `<div style="border-radius:6px;overflow:hidden;border:1px solid #cec3a8;">${svg}</div>` +
    `<div style="display:flex;flex-wrap:wrap;align-items:center;gap:6px;` +
    `margin-top:8px;padding:0 2px;">${legendHTML}</div>`;

  // ── Tooltip ───────────────────────────────────────────────────
  const ZNAMES = {ra:'Restricted Area',paint:'Paint (non-RA)',mid:'Mid-Range',c3:'Corner 3',ab3:'Above-Break 3'};
  let tip = document.getElementById('zone-tip');
  if (!tip) { tip=document.createElement('div'); tip.id='zone-tip'; tip.className='zone-tooltip'; document.body.appendChild(tip); }

  function showTip(z, e) {
    const d = delta(z), sign = d>=0?'+':'';
    const col = d>4?'#c084fc': d>1.5?'#f87171': d<-4?'#7dd3fc': d<-1.5?'#60a5fa':'#94a3b8';
    tip.innerHTML =
      `<strong style="color:${col}">${ZNAMES[z]}</strong><br>` +
      `On:&nbsp;&nbsp;${onR(z).toFixed(1)} FGA/100<br>` +
      `Off:&nbsp;${offR(z).toFixed(1)} FGA/100<br>` +
      `<span style="color:${col};font-size:11px">${sign}${d.toFixed(1)} per 100 poss</span>`;
    tip.style.display='block';
    tip.style.left=(e.clientX+14)+'px';
    tip.style.top =(e.clientY-10)+'px';
  }

  if (container._moveListener)  container.removeEventListener('mousemove',  container._moveListener);
  if (container._leaveListener) container.removeEventListener('mouseleave', container._leaveListener);
  container._moveListener  = e => { const z=e.target?.dataset?.zone; z?showTip(z,e):tip.style.display='none'; };
  container._leaveListener = () => tip.style.display='none';
  container.addEventListener('mousemove',  container._moveListener);
  container.addEventListener('mouseleave', container._leaveListener);
}

// ── Stat Line body ─────────────────────────────────────────────
async function renderStatLineBody(rows, rosterMap, selArr, season) {
  const body = document.getElementById('wowy-body');

  if (!selArr.length) {
    body.innerHTML = `<div class="state-msg" style="flex:0;padding:48px 28px;">Select at least one player to use as the anchor.</div>`;
    return;
  }

  const anchorId = selArr[0];
  const anchorPlayer = rosterMap[anchorId];
  const anchorName = anchorPlayer ? anchorPlayer.player_name : `Player ${anchorId}`;

  body.innerHTML = `<div class="state-msg" style="flex:0;padding:48px 28px;"><span class="spin"></span><span>Loading stat line…</span></div>`;

  let data;
  try {
    const res = await fetch(`/api/wowy/stat-line?anchor=${anchorId}&season=${encodeURIComponent(season)}`);
    data = await res.json();
  } catch(e) {
    body.innerHTML = `<div class="state-msg" style="flex:0;padding:48px 28px;color:var(--red)">⚠ ${e.message}</div>`;
    return;
  }
  if (data.error) {
    body.innerHTML = `<div class="state-msg" style="flex:0;padding:48px 28px;color:var(--red)">⚠ ${data.error}</div>`;
    return;
  }

  const teammates = data.teammates || [];
  if (!teammates.length) {
    body.innerHTML = `<div class="state-msg" style="flex:0;padding:48px 28px;">No teammate data found for ${anchorName}.</div>`;
    return;
  }

  const fmt1 = v => v == null ? '<span class="null-dash">—</span>' : v.toFixed(1);
  const fmt2 = v => v == null ? '<span class="null-dash">—</span>' : v.toFixed(1);
  const fmtPct = v => v == null ? '<span class="null-dash">—</span>' : v.toFixed(1) + '%';

  const diffCell = (v, isHigherBetter = true) => {
    if (v == null) return '<span class="null-dash">—</span>';
    const sign = v > 0 ? '+' : '';
    const cls = v > 0.05 ? (isHigherBetter ? 'net-pos' : 'net-neg')
              : v < -0.05 ? (isHigherBetter ? 'net-neg' : 'net-pos')
              : 'net-neu';
    return `<span class="${cls}">${sign}${v.toFixed(1)}</span>`;
  };
  const diffPct = (v, isHigherBetter = true) => {
    if (v == null) return '<span class="null-dash">—</span>';
    const sign = v > 0 ? '+' : '';
    const cls = v > 0.05 ? (isHigherBetter ? 'net-pos' : 'net-neg')
              : v < -0.05 ? (isHigherBetter ? 'net-neg' : 'net-pos')
              : 'net-neu';
    return `<span class="${cls}">${sign}${v.toFixed(1)}%</span>`;
  };

  const statGroup = (on, off, diff, fmt, isHigherBetter = true) =>
    `<td class="stat-on">${fmt(on)}</td><td class="stat-off">${fmt(off)}</td><td class="stat-diff">${isHigherBetter ? diffCell(diff) : diffCell(diff, false)}</td>`;

  const statGroupPct = (on, off, diff, isHigherBetter = true) =>
    `<td class="stat-on">${fmtPct(on)}</td><td class="stat-off">${fmtPct(off)}</td><td class="stat-diff">${diffPct(diff, isHigherBetter)}</td>`;

  body.innerHTML = `
    <style>
      .stat-anchor-note { padding: 10px 28px 6px; font-size: 11px; color: var(--ink3); font-family: var(--ff-mono); letter-spacing: 0.04em; flex-shrink: 0; }
      .stat-anchor-note strong { color: var(--ink); }
      .stat-group-header { text-align: center; border-bottom: 1px solid var(--rule); font-size: 9px; letter-spacing: 0.08em; color: var(--ink3); padding-bottom: 2px; }
      .stat-on  { color: var(--ink2); }
      .stat-off { color: var(--ink3); }
      .stat-diff { font-weight: 600; }
      .th-sub { font-size: 8.5px; color: var(--ink3); font-weight: 400; letter-spacing: 0.05em; display: block; margin-top: 1px; }
      .td-teammate { white-space: nowrap; min-width: 120px; }
      .teammate-chip { display: flex; align-items: center; gap: 6px; }
      .teammate-chip img { width: 28px; height: 21px; object-fit: cover; border-radius: 3px; }
    </style>
    <div class="stat-anchor-note">Anchor: <strong>${anchorName}</strong> — each row shows a teammate's individual stats with/without the anchor on the floor.</div>
    <div class="table-scroll">
      <table class="wt">
        <thead>
          <tr>
            <th rowspan="2" class="td-teammate">Teammate</th>
            <th rowspan="2" title="Possessions with anchor on floor">ON<br><span class="th-sub">poss</span></th>
            <th rowspan="2" title="Possessions without anchor on floor">OFF<br><span class="th-sub">poss</span></th>
            <th colspan="3" class="stat-group-header">Pts/100</th>
            <th colspan="3" class="stat-group-header">eFG%</th>
            <th colspan="3" class="stat-group-header">AST/100</th>
            <th colspan="3" class="stat-group-header">REB/100</th>
            <th colspan="3" class="stat-group-header">TOV/100</th>
            <th colspan="3" class="stat-group-header">3PA/100</th>
            <th colspan="3" class="stat-group-header">3P%</th>
          </tr>
          <tr>
            <th class="stat-on">ON</th><th class="stat-off">OFF</th><th class="stat-diff">Δ</th>
            <th class="stat-on">ON</th><th class="stat-off">OFF</th><th class="stat-diff">Δ</th>
            <th class="stat-on">ON</th><th class="stat-off">OFF</th><th class="stat-diff">Δ</th>
            <th class="stat-on">ON</th><th class="stat-off">OFF</th><th class="stat-diff">Δ</th>
            <th class="stat-on">ON</th><th class="stat-off">OFF</th><th class="stat-diff">Δ</th>
            <th class="stat-on">ON</th><th class="stat-off">OFF</th><th class="stat-diff">Δ</th>
            <th class="stat-on">ON</th><th class="stat-off">OFF</th><th class="stat-diff">Δ</th>
          </tr>
        </thead>
        <tbody>
          ${teammates.map(t => {
            const img = `<img src="https://cdn.nba.com/headshots/nba/latest/260x190/${t.player_id}.png" alt="" onerror="this.style.display='none'">`;
            return `<tr>
              <td class="td-teammate"><div class="teammate-chip">${img}<span>${lastName(t.player_name)}</span></div></td>
              <td class="td-min">${(t.on_poss||0).toLocaleString()}</td>
              <td class="td-min">${(t.off_poss||0).toLocaleString()}</td>
              ${statGroup(t.pts_on, t.pts_off, t.pts_diff, fmt2)}
              ${statGroupPct(t.efg_on, t.efg_off, t.efg_diff)}
              ${statGroup(t.ast_on, t.ast_off, t.ast_diff, fmt2)}
              ${statGroup(t.reb_on, t.reb_off, t.reb_diff, fmt2)}
              ${statGroup(t.tov_on, t.tov_off, t.tov_diff, fmt2, false)}
              ${statGroup(t.fg3a_on, t.fg3a_off, t.fg3a_diff, fmt2)}
              ${statGroupPct(t.fg3p_on, t.fg3p_off, t.fg3p_diff)}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── Generate all 2^N subsets ───────────────────────────────────
function allSubsets(arr) {
  const result = [];
  const n = arr.length;
  for (let mask = 0; mask < (1 << n); mask++) {
    const subset = new Set();
    for (let i = 0; i < n; i++) {
      if (mask & (1 << i)) subset.add(arr[i]);
    }
    result.push(subset);
  }
  return result;
}

// ── Helpers ───────────────────────────────────────────────────
function setMain(type, a, b) {
  if (type === 'spin') {
    main.innerHTML = `<div class="state-msg"><span class="spin"></span><span>${a}</span></div>`;
  } else {
    main.innerHTML = `<div class="state-msg"><div class="state-icon">${a}</div><span>${b||a}</span></div>`;
  }
}
function lastName(full) {
  if (!full) return '';
  const p = full.trim().split(' ');
  return p.length > 1 ? p.slice(1).join(' ') : full;
}
function initials(full) {
  return (full||'').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
}

// Show mode tabs immediately on page load (before any team is selected)
showReadyState();
// Re-run when team dropdown changes so prompt text updates
teamSel.addEventListener('change', () => { if (!teamSel.value) showReadyState(); });
</script>
<script>
// ── Nav auth (shared across all pages) ───────────────────────
async function initNavAuth() {
  const slot = document.getElementById('nav-auth-slot');
  if (!slot) return;
  try {
    const res = await fetch('/auth/me');
    const data = await res.json();
    const user = data.user;
    if (user) {
      slot.innerHTML = `
        <a href="/profile" style="text-decoration:none;cursor:pointer">${user.avatar_url ? `<img class="nav-auth-avatar" src="${user.avatar_url}" alt="">` : ''}</a>
        <button class="nav-signout-btn" onclick="navSignOut()">Sign out</button>
      `;
    } else {
      slot.innerHTML = `<a class="nav-signin-btn" href="/auth/google/login?next=${encodeURIComponent(window.location.pathname)}">Sign in</a>`;
    }
  } catch {
    slot.innerHTML = `<a class="nav-signin-btn" href="/auth/google/login">Sign in</a>`;
  }
}
function navSignOut() {
  window.location.href = '/auth/logout?next=' + encodeURIComponent(window.location.pathname);
}
initNavAuth();

</script>
